<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="design-system.css">

  <style>
    /* ── Page top padding for menubar ── */
    .page { padding-top: 48px; }

    /* ── Mind Map Canvas ── */
    .mm-canvas-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-left: 3px solid var(--accent, #00e5c4);
      border-radius: 12px;
      padding: 32px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      min-height: 420px;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .mm-toolbar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .mm-toolbar-btn {
      height: 32px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px;
      background: none;
      color: var(--text-secondary, #7b96af);
      font-family: var(--font-label, 'DM Mono', monospace);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
      white-space: nowrap;
    }
    .mm-toolbar-btn:hover {
      border-color: rgba(255,255,255,.12);
      color: var(--text-primary, #E0E0E0);
    }
    .mm-toolbar-btn.active {
      border-color: var(--accent, #00e5c4);
      background: rgba(0,229,196,.06);
      color: var(--text-primary, #E0E0E0);
    }
    .mm-toolbar-sep {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,.06);
      margin: 0 4px;
    }
    .mm-canvas-area {
      flex: 1;
      position: relative;
      border-radius: 8px;
      background: rgba(0,0,0,.15);
      border: 1px solid rgba(255,255,255,.04);
      min-height: 340px;
      overflow: hidden;
    }
    .mm-dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }
    .mm-canvas-inner {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform-origin: 0 0;
    }
    .mm-edges-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .mm-edges-svg path {
      fill: none;
      stroke: rgba(0,229,196,.3);
      stroke-width: 2;
    }
    .mm-empty-state {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }
    .mm-empty-title {
      font-family: var(--font-heading, 'Sora', sans-serif);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary, #E0E0E0);
      opacity: .4;
      margin-bottom: 6px;
    }
    .mm-empty-hint {
      font-family: var(--font-body, 'Sora', sans-serif);
      font-size: 13px;
      color: var(--text-tertiary, rgba(255,255,255,.3));
    }

    /* ── Mind Map Nodes ── */
    .mm-node {
      position: absolute;
      width: 240px;
      min-height: 70px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 14px 14px 14px 18px;
      cursor: grab;
      user-select: none;
      transition: box-shadow .15s;
      z-index: 10;
    }
    .mm-node:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      z-index: 11;
    }
    .mm-node.selected {
      border-color: rgba(0,229,196,.4);
      box-shadow: 0 0 0 2px rgba(0,229,196,.15), 0 8px 24px rgba(0,0,0,.3);
      z-index: 12;
    }
    .mm-node.dragging { cursor: grabbing; opacity: .9; z-index: 100; }
    .mm-node::before {
      content: '';
      position: absolute;
      left: 0; top: 12px; bottom: 12px;
      width: 3px;
      border-radius: 2px;
    }
    .mm-node[data-type="plan"]::before { background: var(--accent, #00e5c4); }
    .mm-node[data-type="task"]::before { background: var(--accent-gold, #f8c842); }
    .mm-node[data-type="note"]::before { background: var(--accent-violet, #7b6fff); }
    .mm-node[data-type="workflow"]::before { background: var(--accent-rose, #ff5c8a); }
    .mm-node-type {
      font-family: var(--font-label, 'DM Mono', monospace);
      font-size: 9px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-secondary, #7b96af);
      margin-bottom: 4px;
    }
    .mm-node-title {
      font-family: var(--font-heading, 'Sora', sans-serif);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary, #E0E0E0);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .mm-node-body {
      font-family: var(--font-body, 'Sora', sans-serif);
      font-size: 12px;
      color: var(--text-secondary, #7b96af);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .mm-node-port {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.04);
      border: 2px solid rgba(255,255,255,.08);
      cursor: crosshair;
      z-index: 15;
      transition: all .15s;
    }
    .mm-node-port:hover {
      border-color: rgba(0,229,196,.5);
      background: rgba(0,229,196,.15);
      transform: scale(1.3);
    }
    .mm-node-port.port-r { right: -5px; top: 50%; transform: translateY(-50%); }
    .mm-node-port.port-b { bottom: -5px; left: 50%; transform: translateX(-50%); }
    .mm-node-port.port-l { left: -5px; top: 50%; transform: translateY(-50%); }
    .mm-node-port.port-t { top: -5px; left: 50%; transform: translateX(-50%); }

    /* ── Edit Modal ── */
    .mm-modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 5000;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .mm-modal-overlay.open { display: flex; }
    .mm-modal {
      background: var(--bg-surface-2, #1A1A24);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 24px;
      width: 400px; max-width: 90vw;
      box-shadow: 0 24px 48px rgba(0,0,0,.5);
    }
    .mm-modal h3 {
      font-family: var(--font-heading, 'Sora', sans-serif);
      font-size: 16px; font-weight: 700;
      color: var(--text-primary, #E0E0E0);
      margin-bottom: 16px;
    }
    .mm-modal label {
      display: block;
      font-family: var(--font-label, 'DM Mono', monospace);
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-secondary, #7b96af);
      margin-bottom: 4px; margin-top: 12px;
    }
    .mm-modal input, .mm-modal textarea, .mm-modal select {
      width: 100%;
      padding: 8px 12px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      color: var(--text-primary, #E0E0E0);
      font-family: var(--font-body, 'Sora', sans-serif);
      font-size: 13px;
      outline: none;
      resize: vertical;
    }
    .mm-modal input:focus, .mm-modal textarea:focus, .mm-modal select:focus {
      border-color: rgba(0,229,196,.4);
    }
    .mm-modal textarea { min-height: 80px; }
    .mm-modal-actions {
      display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;
    }
    .mm-modal-actions button {
      padding: 8px 16px;
      border-radius: 8px;
      font-family: var(--font-body, 'Sora', sans-serif);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.08);
      background: none;
      color: var(--text-secondary, #7b96af);
      transition: all .15s;
    }
    .mm-modal-actions button:hover {
      border-color: rgba(255,255,255,.15);
      color: var(--text-primary, #E0E0E0);
    }
    .mm-modal-actions .mm-save {
      border-color: transparent;
      background: rgba(0,229,196,.12);
      color: var(--text-primary, #E0E0E0);
    }
    .mm-modal-actions .mm-save:hover { background: rgba(0,229,196,.2); }
    .mm-modal-actions .mm-delete { color: #ff5c5c; border-color: rgba(255,92,92,.3); }
    .mm-modal-actions .mm-delete:hover { background: rgba(255,92,92,.1); }

    /* ── Zoom display ── */
    .mm-zoom-label {
      font-family: var(--font-label, 'DM Mono', monospace);
      font-size: 10px;
      color: var(--text-secondary, #7b96af);
      padding: 0 6px;
      display: flex;
      align-items: center;
    }
  </style>
</head>

  <script>
    /* ── Clock ── */
    function tickClock() {
      var el = document.getElementById('mbClock');
      if (!el) return;
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      el.textContent = h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + ' ' + ampm;
    }
    tickClock();
    setInterval(tickClock, 1000);

    /* ── Date ── */
    (function() {
      var d = document.getElementById('mbDate');
      if (d) {
        var now = new Date();
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        d.textContent = days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
      }
    })();

    /* ── Toast ── */
    function showToast(msg) {
      var t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2000);
    }

    /* ── Scroll Reveal ── */
    (function() {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.reveal').forEach(function(el) {
        observer.observe(el);
      });
    })();

    /* ── Service Worker ── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
  </script>

  <script>
  /* ── MIND MAP ENGINE ── */
  (function(){
    'use strict';
    var SK='ophtxn_mindmap';
    var canvas=document.getElementById('mmCanvas');
    var nodesEl=document.getElementById('mmNodes');
    var edgesSvg=document.getElementById('mmEdges');
    var emptyEl=document.getElementById('mmEmpty');
    var modal=document.getElementById('mmModal');
    if(!canvas)return;

    /* ── Data ── */
    var state={viewport:{x:0,y:0,zoom:1},nodes:[],edges:[]};
    function load(){try{var s=JSON.parse(localStorage.getItem(SK));if(s&&s.nodes)state=s;}catch(e){}}
    function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
    function uid(){return 'n'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

    /* ── Render ── */
    function render(){
      canvas.style.transform='translate('+state.viewport.x+'px,'+state.viewport.y+'px) scale('+state.viewport.zoom+')';
      var zl=document.getElementById('mmZoomLevel');
      if(zl)zl.textContent=Math.round(state.viewport.zoom*100)+'%';

      nodesEl.innerHTML='';
      state.nodes.forEach(function(n){
        var div=document.createElement('div');
        div.className='mm-node'+(selectedId===n.id?' selected':'');
        div.dataset.id=n.id;
        div.dataset.type=n.type||'note';
        div.style.left=n.x+'px';
        div.style.top=n.y+'px';
        if(n.w)div.style.width=n.w+'px';
        div.innerHTML='<div class="mm-node-type">'+(n.type||'note').toUpperCase()+'</div>'+
          '<div class="mm-node-title">'+(n.title||'Untitled')+'</div>'+
          (n.body?'<div class="mm-node-body">'+n.body+'</div>':'')+
          '<div class="mm-node-port port-r" data-port="r" data-node="'+n.id+'"></div>'+
          '<div class="mm-node-port port-b" data-port="b" data-node="'+n.id+'"></div>'+
          '<div class="mm-node-port port-l" data-port="l" data-node="'+n.id+'"></div>'+
          '<div class="mm-node-port port-t" data-port="t" data-node="'+n.id+'"></div>';
        nodesEl.appendChild(div);
      });

      var paths=edgesSvg.querySelectorAll('path.mm-edge');
      paths.forEach(function(p){p.remove();});
      state.edges.forEach(function(e){
        var from=state.nodes.find(function(n){return n.id===e.from;});
        var to=state.nodes.find(function(n){return n.id===e.to;});
        if(!from||!to)return;
        var fx=from.x+(from.w||240)/2,fy=from.y+40;
        var tx=to.x+(to.w||240)/2,ty=to.y+40;
        var dx=Math.abs(tx-fx)*0.5;
        var d='M'+fx+' '+fy+' C'+(fx+dx)+' '+fy+' '+(tx-dx)+' '+ty+' '+tx+' '+ty;
        var path=document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d',d);
        path.setAttribute('marker-end','url(#arrowhead)');
        path.classList.add('mm-edge');
        path.dataset.edgeId=e.id;
        edgesSvg.appendChild(path);
      });

      if(emptyEl)emptyEl.style.display=state.nodes.length?'none':'block';
    }

    /* ── Tools ── */
    var currentTool='select';
    var selectedId=null;
    var dragNode=null,dragOffset={x:0,y:0};
    var panning=false,panStart={x:0,y:0},panVp={x:0,y:0};
    var connecting=false,connectFrom=null;

    function setTool(t){
      currentTool=t;
      document.querySelectorAll('.mm-tool').forEach(function(b){b.classList.toggle('active',b.dataset.tool===t);});
    }

    /* ── Toolbar Events ── */
    var toolbar=document.getElementById('mmToolbar');
    if(toolbar){
      toolbar.addEventListener('click',function(e){
        var btn=e.target.closest('button');
        if(!btn)return;
        if(btn.dataset.tool){setTool(btn.dataset.tool);return;}
        if(btn.dataset.add){
          var wrap=document.getElementById('mmCanvasWrap');
          var cx=(wrap.offsetWidth/2-state.viewport.x)/state.viewport.zoom;
          var cy=(wrap.offsetHeight/2-state.viewport.y)/state.viewport.zoom;
          cx+=Math.random()*100-50;cy+=Math.random()*100-50;
          state.nodes.push({id:uid(),x:Math.round(cx-120),y:Math.round(cy-40),w:240,type:btn.dataset.add,title:'New '+btn.dataset.add.charAt(0).toUpperCase()+btn.dataset.add.slice(1),body:'',created:Date.now()});
          save();render();return;
        }
        if(btn.id==='mmZoomIn'){state.viewport.zoom=Math.min(3,state.viewport.zoom*1.2);save();render();return;}
        if(btn.id==='mmZoomOut'){state.viewport.zoom=Math.max(0.2,state.viewport.zoom/1.2);save();render();return;}
        if(btn.id==='mmFitAll'){fitAll();return;}
        if(btn.id==='mmClear'){if(confirm('Clear all nodes and connections?')){state.nodes=[];state.edges=[];selectedId=null;save();render();}return;}
      });
    }

    function fitAll(){
      if(!state.nodes.length)return;
      var wrap=document.getElementById('mmCanvasWrap');
      var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
      state.nodes.forEach(function(n){
        if(n.x<minX)minX=n.x;if(n.y<minY)minY=n.y;
        if(n.x+(n.w||240)>maxX)maxX=n.x+(n.w||240);if(n.y+100>maxY)maxY=n.y+100;
      });
      var bw=maxX-minX+100,bh=maxY-minY+100;
      var scale=Math.min((wrap.offsetWidth-80)/bw,(wrap.offsetHeight-120)/bh,1.5);
      scale=Math.max(0.2,Math.min(3,scale));
      state.viewport.zoom=scale;
      state.viewport.x=(wrap.offsetWidth-bw*scale)/2-minX*scale+50;
      state.viewport.y=(wrap.offsetHeight-bh*scale)/2-minY*scale+60;
      save();render();
    }

    /* ── Canvas Events ── */
    var wrap=document.getElementById('mmCanvasWrap');
    wrap.addEventListener('mousedown',function(e){
      if(e.target.closest('.mm-node-port')){
        var port=e.target.closest('.mm-node-port');
        connecting=true;connectFrom=port.dataset.node;
        setTool('connect');
        e.preventDefault();return;
      }
      var nodeEl=e.target.closest('.mm-node');
      if(nodeEl&&currentTool==='select'){
        var id=nodeEl.dataset.id;
        selectedId=id;
        var node=state.nodes.find(function(n){return n.id===id;});
        if(!node)return;
        dragNode=node;
        dragOffset.x=e.clientX/state.viewport.zoom-node.x;
        dragOffset.y=e.clientY/state.viewport.zoom-node.y;
        nodeEl.classList.add('dragging');
        e.preventDefault();render();return;
      }
      if(!nodeEl){
        selectedId=null;
        panning=true;panStart.x=e.clientX;panStart.y=e.clientY;
        panVp.x=state.viewport.x;panVp.y=state.viewport.y;
        wrap.style.cursor='grabbing';
        render();
      }
    });

    document.addEventListener('mousemove',function(e){
      if(dragNode){
        dragNode.x=Math.round(e.clientX/state.viewport.zoom-dragOffset.x-state.viewport.x/state.viewport.zoom);
        dragNode.y=Math.round(e.clientY/state.viewport.zoom-dragOffset.y-state.viewport.y/state.viewport.zoom);
        render();
      }
      if(panning){
        state.viewport.x=panVp.x+(e.clientX-panStart.x);
        state.viewport.y=panVp.y+(e.clientY-panStart.y);
        render();
      }
    });

    document.addEventListener('mouseup',function(e){
      if(dragNode){
        var el=document.querySelector('.mm-node.dragging');
        if(el)el.classList.remove('dragging');
        dragNode=null;save();
      }
      if(panning){panning=false;wrap.style.cursor='';save();}
      if(connecting){
        var port=e.target.closest('.mm-node-port');
        if(port&&port.dataset.node!==connectFrom){
          var exists=state.edges.some(function(ed){return ed.from===connectFrom&&ed.to===port.dataset.node;});
          if(!exists){
            state.edges.push({id:uid(),from:connectFrom,to:port.dataset.node});
            save();
          }
        }
        connecting=false;connectFrom=null;
        setTool('select');render();
      }
    });

    /* Double click to edit */
    wrap.addEventListener('dblclick',function(e){
      var nodeEl=e.target.closest('.mm-node');
      if(nodeEl){openEdit(nodeEl.dataset.id);return;}
      var rect=wrap.getBoundingClientRect();
      var x=(e.clientX-rect.left-state.viewport.x)/state.viewport.zoom;
      var y=(e.clientY-rect.top-state.viewport.y)/state.viewport.zoom;
      var n={id:uid(),x:Math.round(x-120),y:Math.round(y-40),w:240,type:'note',title:'',body:'',created:Date.now()};
      state.nodes.push(n);save();render();
      openEdit(n.id);
    });

    /* Zoom */
    wrap.addEventListener('wheel',function(e){
      e.preventDefault();
      var rect=wrap.getBoundingClientRect();
      var mx=e.clientX-rect.left,my=e.clientY-rect.top;
      var oldZ=state.viewport.zoom;
      var delta=e.deltaY>0?0.9:1.1;
      var newZ=Math.max(0.2,Math.min(3,oldZ*delta));
      state.viewport.x=mx-(mx-state.viewport.x)*(newZ/oldZ);
      state.viewport.y=my-(my-state.viewport.y)*(newZ/oldZ);
      state.viewport.zoom=newZ;
      save();render();
    },{passive:false});

    /* ── Modal ── */
    var editingId=null;
    function openEdit(id){
      editingId=id;
      var n=state.nodes.find(function(nd){return nd.id===id;});
      if(!n)return;
      document.getElementById('mmEditTitle').value=n.title||'';
      document.getElementById('mmEditBody').value=n.body||'';
      document.getElementById('mmEditType').value=n.type||'note';
      document.getElementById('mmModalTitle').textContent=n.title?'Edit Node':'New Node';
      modal.classList.add('open');
      setTimeout(function(){document.getElementById('mmEditTitle').focus();},100);
    }
    document.getElementById('mmSaveNode').addEventListener('click',function(){
      var n=state.nodes.find(function(nd){return nd.id===editingId;});
      if(!n)return;
      n.title=document.getElementById('mmEditTitle').value.trim()||'Untitled';
      n.body=document.getElementById('mmEditBody').value.trim();
      n.type=document.getElementById('mmEditType').value;
      save();render();
      modal.classList.remove('open');editingId=null;
    });
    document.getElementById('mmCancelEdit').addEventListener('click',function(){
      var n=state.nodes.find(function(nd){return nd.id===editingId;});
      if(n&&!n.title&&!n.body){state.nodes=state.nodes.filter(function(nd){return nd.id!==editingId;});save();}
      modal.classList.remove('open');editingId=null;render();
    });
    document.getElementById('mmDeleteNode').addEventListener('click',function(){
      state.nodes=state.nodes.filter(function(nd){return nd.id!==editingId;});
      state.edges=state.edges.filter(function(ed){return ed.from!==editingId&&ed.to!==editingId;});
      if(selectedId===editingId)selectedId=null;
      save();render();
      modal.classList.remove('open');editingId=null;
    });
    modal.addEventListener('click',function(e){if(e.target===modal){modal.classList.remove('open');editingId=null;}});

    /* ── Keyboard ── */
    document.addEventListener('keydown',function(e){
      if(modal.classList.contains('open'))return;
      if(e.key==='v'||e.key==='V')setTool('select');
      if(e.key==='c'||e.key==='C')setTool('connect');
      if(e.key==='Delete'||e.key==='Backspace'){
        if(selectedId){
          state.nodes=state.nodes.filter(function(n){return n.id!==selectedId;});
          state.edges=state.edges.filter(function(ed){return ed.from!==selectedId&&ed.to!==selectedId;});
          selectedId=null;save();render();
        }
      }
      if(e.key==='='||e.key==='+'){state.viewport.zoom=Math.min(3,state.viewport.zoom*1.2);save();render();}
      if(e.key==='-'){state.viewport.zoom=Math.max(0.2,state.viewport.zoom/1.2);save();render();}
      if(e.key==='Escape'){selectedId=null;setTool('select');render();}
    });

    /* ── Init ── */
    load();render();
  })();
  </script>

  <script src="nav-system.js"></script>
  <script src="terminal-overlay.js"></script>
  <script src="inbox-overlay.js"></script>
</body>
</html>
