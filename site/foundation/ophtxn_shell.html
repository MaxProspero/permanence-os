<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a1118">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <title>Ophtxn Shell</title>
  <meta name="description" content="Governed AI chat interface for Ophtxn inside Permanence OS.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&family=Syne:wght@400;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
/* ═══════════════════════════════════════════════════════
   RESET + BASE
   ═══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Layout */
  --sidebar-w:280px;
  --hud-h:42px;
  --input-max-h:180px;

  /* Dark Aurora (default) */
  --bg-0:#060b14;
  --bg-1:#0a1220;
  --bg-2:#0f1a2d;
  --surface:#0d1826;
  --surface-hi:#132236;
  --border:rgba(255,255,255,0.07);
  --border-hi:rgba(255,255,255,0.14);
  --ink:#e8f0ff;
  --ink-2:#b0c4de;
  --muted:#5a6a8a;
  --dim:#2e3d5c;
  --user-bg:rgba(0,229,196,0.08);
  --user-border:rgba(0,229,196,0.18);
  --sys-bg:rgba(255,255,255,0.025);
  --sys-border:rgba(255,255,255,0.06);
  --accent:#00e5c4;
  --accent-2:#7b6fff;
  --accent-warm:#f8c842;
  --accent-rose:#ff5c8a;
  --code-bg:#080e18;
  --code-border:rgba(255,255,255,0.06);
  --good:#54df9e;
  --warn:#f7bf5e;
  --bad:#ff7f7f;
  --r:16px;
  --r-sm:10px;
  --r-xs:6px;

  /* Fonts */
  --sans:"DM Sans",system-ui,sans-serif;
  --display:"Syne",system-ui,sans-serif;
  --mono:"DM Mono",monospace;

  /* Tower HUD */
  --f-rgb:50,215,75;
  --f:rgb(var(--f-rgb));
}

/* ── COPPER ─────────────────────────────────────────── */
[data-theme="copper"]{
  --bg-0:#0c0906;--bg-1:#130e09;--bg-2:#1c1510;
  --surface:#181008;--surface-hi:#201810;
  --border:rgba(255,180,100,0.08);--border-hi:rgba(255,180,100,0.16);
  --ink:#fff0d8;--ink-2:#d4c0a0;--muted:#7a5f40;--dim:#3d2e1e;
  --user-bg:rgba(255,179,71,0.08);--user-border:rgba(255,179,71,0.2);
  --accent:#ffb347;--accent-2:#e8a87c;--accent-warm:#ffd700;--accent-rose:#ff6b6b;
  --code-bg:#100c06;--code-border:rgba(255,180,100,0.08);
  --good:#80b860;--warn:#ff9500;--bad:#e06848;
  --f-rgb:255,179,71;--f:rgb(var(--f-rgb));
}

/* ── VOID ───────────────────────────────────────────── */
[data-theme="void"]{
  --bg-0:#000;--bg-1:#080808;--bg-2:#101010;
  --surface:#0a0a0a;--surface-hi:#141414;
  --border:rgba(255,255,255,0.04);--border-hi:rgba(255,255,255,0.08);
  --ink:#c0c0c0;--ink-2:#888;--muted:#555;--dim:#333;
  --user-bg:rgba(255,255,255,0.04);--user-border:rgba(255,255,255,0.1);
  --accent:#d0d0d0;--accent-2:#999;--accent-warm:#bbb;--accent-rose:#888;
  --code-bg:#060606;--code-border:rgba(255,255,255,0.05);
  --good:#7a7a7a;--warn:#999;--bad:#666;
  --f-rgb:180,180,180;--f:rgb(var(--f-rgb));
}

/* ── LIGHT MODE ─────────────────────────────────────── */
[data-brightness="light"]{
  --bg-0:#f6f4f0;--bg-1:#edeae4;--bg-2:#e4e0d8;
  --surface:#ffffff;--surface-hi:#f5f3ef;
  --border:rgba(0,0,0,0.08);--border-hi:rgba(0,0,0,0.15);
  --ink:#1a1a2e;--ink-2:#4a4a6a;--muted:#8a8a9a;--dim:#c0c0c8;
  --user-bg:rgba(0,229,196,0.06);--user-border:rgba(0,229,196,0.22);
  --sys-bg:rgba(0,0,0,0.02);--sys-border:rgba(0,0,0,0.06);
  --code-bg:#f5f3ef;--code-border:rgba(0,0,0,0.08);
}
[data-brightness="light"][data-theme="copper"]{
  --bg-0:#faf6f0;--bg-1:#f0e8dc;--bg-2:#e8ddd0;
  --surface:#fffaf4;--surface-hi:#f8f0e4;
  --ink:#2a1e10;--ink-2:#5a4a30;--muted:#8a7a60;
  --user-bg:rgba(255,179,71,0.08);--user-border:rgba(255,179,71,0.25);
  --code-bg:#f8f0e4;
}
[data-brightness="light"][data-theme="void"]{
  --bg-0:#f0f0f0;--bg-1:#e8e8e8;--bg-2:#e0e0e0;
  --surface:#ffffff;--surface-hi:#f5f5f5;
  --ink:#111;--ink-2:#444;--muted:#888;
  --user-bg:rgba(0,0,0,0.03);--user-border:rgba(0,0,0,0.1);
  --accent:#333;--accent-2:#666;
  --code-bg:#f0f0f0;
}
@media(prefers-color-scheme:light){
  [data-brightness="system"]{
    --bg-0:#f6f4f0;--bg-1:#edeae4;--bg-2:#e4e0d8;
    --surface:#ffffff;--surface-hi:#f5f3ef;
    --border:rgba(0,0,0,0.08);--border-hi:rgba(0,0,0,0.15);
    --ink:#1a1a2e;--ink-2:#4a4a6a;--muted:#8a8a9a;--dim:#c0c0c8;
    --user-bg:rgba(0,229,196,0.06);--user-border:rgba(0,229,196,0.22);
    --sys-bg:rgba(0,0,0,0.02);--sys-border:rgba(0,0,0,0.06);
    --code-bg:#f5f3ef;--code-border:rgba(0,0,0,0.08);
  }
}

html,body{width:100%;height:100%;overflow:hidden}
body{
  background:var(--bg-0);color:var(--ink);
  font-family:var(--sans);font-size:14px;line-height:1.5;
  padding-top:var(--hud-h);
  transition:background .3s,color .3s;
}

/* ═══════════════════════════════════════════════════════
   GRAIN + SCANLINES
   ═══════════════════════════════════════════════════════ */
#grain{
  position:fixed;inset:-50%;width:200%;height:200%;
  pointer-events:none;z-index:9997;
  opacity:.05;mix-blend-mode:overlay;
  animation:grainshift .5s steps(1) infinite;
}
@keyframes grainshift{
  0%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}
  20%{transform:translate(3%,1%)}30%{transform:translate(-1%,4%)}
  40%{transform:translate(4%,-2%)}50%{transform:translate(-3%,2%)}
  60%{transform:translate(2%,-4%)}70%{transform:translate(-4%,1%)}
  80%{transform:translate(3%,3%)}90%{transform:translate(-2%,-1%)}
}
.scanlines{
  position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}

/* ═══════════════════════════════════════════════════════
   TOWER HUD
   ═══════════════════════════════════════════════════════ */
.tower-hud{
  position:fixed;top:0;left:0;right:0;z-index:9000;height:var(--hud-h);
  background:rgba(4,6,10,.97);border-bottom:1px solid rgba(var(--f-rgb),.2);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:border-color .3s,background .3s;
}
[data-brightness="light"] .tower-hud{background:rgba(246,244,240,.97);border-bottom-color:rgba(var(--f-rgb),.15)}
.th-l{display:flex;align-items:center;gap:4px}
.th-brand{font-family:'Orbitron',monospace;font-size:10px;font-weight:800;letter-spacing:.3em;color:var(--f);text-decoration:none}
.th-sep{color:rgba(var(--f-rgb),.2);margin:0 12px;font-size:10px}
.th-num{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--f);letter-spacing:.04em;margin-right:10px;text-shadow:0 0 18px rgba(var(--f-rgb),.45)}
.th-name{font-family:'Orbitron',monospace;font-size:7px;font-weight:500;letter-spacing:.28em;color:var(--muted);text-transform:uppercase}
.th-r{display:flex;align-items:center;gap:14px}
.th-back{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:rgba(var(--f-rgb),.45);text-decoration:none;transition:color .2s}
.th-back:hover{color:var(--f)}
.th-conn{font-family:var(--mono);font-size:10px;display:flex;align-items:center;gap:5px}
.th-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s,box-shadow .3s}
.th-dot.live{background:var(--good);box-shadow:0 0 8px var(--good)}
.th-dot.err{background:var(--bad);box-shadow:0 0 8px var(--bad)}

/* ═══════════════════════════════════════════════════════
   CHAT APP LAYOUT
   ═══════════════════════════════════════════════════════ */
.chat-app{
  display:flex;height:calc(100vh - var(--hud-h));
  transition:background .3s;
}

/* ── SIDEBAR ────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg-1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:transform .3s cubic-bezier(.22,.68,0,1),background .3s,border-color .3s;
}
.sidebar-hdr{
  padding:16px 16px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.sidebar-title{font-family:var(--display);font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.02em}
.sidebar-close{display:none;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px}
.sidebar-sessions{flex:1;overflow-y:auto;padding:8px}
.sidebar-sessions::-webkit-scrollbar{width:2px}
.sidebar-sessions::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

.session-item{
  padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;
  font-size:13px;color:var(--ink-2);transition:background .15s;
  margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.session-item:hover{background:rgba(255,255,255,.04)}
.session-item.active{background:rgba(var(--f-rgb),.08);color:var(--ink)}
[data-brightness="light"] .session-item:hover{background:rgba(0,0,0,.04)}
[data-brightness="light"] .session-item.active{background:rgba(var(--f-rgb),.1)}

.sidebar-new{
  margin:8px;padding:10px;border-radius:var(--r-sm);
  background:none;border:1px dashed var(--border-hi);
  color:var(--muted);font:inherit;font-size:13px;cursor:pointer;
  transition:all .2s;text-align:center;
}
.sidebar-new:hover{border-color:var(--accent);color:var(--accent)}

.sidebar-foot{
  padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;
  display:flex;flex-direction:column;gap:10px;
}
.theme-row{display:flex;gap:6px;align-items:center}
.theme-row label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;min-width:52px}
.theme-sel{
  flex:1;background:var(--surface);border:1px solid var(--border);
  color:var(--ink);border-radius:var(--r-xs);padding:5px 8px;
  font:inherit;font-size:11px;cursor:pointer;
  transition:background .3s,border-color .3s,color .3s;
}

/* ── CHAT MAIN ──────────────────────────────────────── */
.chat-main{
  flex:1;display:flex;flex-direction:column;min-width:0;
  background:var(--bg-0);transition:background .3s;
}

/* ── METRICS BAR ────────────────────────────────────── */
.metrics-bar{
  flex-shrink:0;display:flex;align-items:center;gap:12px;
  padding:8px 20px;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:11px;
  overflow-x:auto;white-space:nowrap;
  transition:background .3s,border-color .3s;
}
.metrics-bar::-webkit-scrollbar{display:none}
.sidebar-toggle{
  display:none;background:none;border:none;color:var(--muted);
  font-size:16px;cursor:pointer;padding:4px 8px 4px 0;flex-shrink:0;
}
.metric-chip{display:flex;align-items:center;gap:6px;color:var(--muted)}
.metric-chip .mv{font-weight:500;color:var(--ink)}
.metric-chip .mv.good{color:var(--good)}.metric-chip .mv.warn{color:var(--warn)}.metric-chip .mv.bad{color:var(--bad)}
.metrics-spacer{flex:1}

/* ── MESSAGES ───────────────────────────────────────── */
.messages{
  flex:1;overflow-y:auto;padding:24px 20px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

.msg-group{max-width:720px;margin:0 auto 24px;animation:fadeUp .35s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg{display:flex;gap:10px;margin-bottom:12px;position:relative}
.msg.user{flex-direction:row-reverse}
.msg-avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:500;
  border:1px solid var(--border);
}
.msg.user .msg-avatar{background:rgba(var(--f-rgb),.12);color:var(--f);border-color:rgba(var(--f-rgb),.2)}
.msg.system .msg-avatar{background:var(--surface);color:var(--accent)}

.msg-body{
  max-width:calc(100% - 44px);
  padding:12px 16px;border-radius:var(--r);
  font-size:14px;line-height:1.65;
  transition:background .3s,border-color .3s;
  position:relative;
}
.msg.user .msg-body{
  background:var(--user-bg);border:1px solid var(--user-border);
  border-top-right-radius:var(--r-xs);
}
.msg.system .msg-body{
  background:var(--sys-bg);border:1px solid var(--sys-border);
  border-top-left-radius:var(--r-xs);
}

.msg-actions{
  position:absolute;top:6px;right:6px;display:flex;gap:4px;
  opacity:0;transition:opacity .15s;
}
.msg:hover .msg-actions{opacity:1}
.msg.user .msg-actions{right:auto;left:6px}
.msg-action-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xs);padding:3px 6px;cursor:pointer;
  font-family:var(--mono);font-size:9px;color:var(--muted);
  transition:all .15s;
}
.msg-action-btn:hover{border-color:var(--accent);color:var(--accent)}

.msg-ts{
  font-family:var(--mono);font-size:9px;color:var(--dim);
  margin-top:4px;
}
.msg.user .msg-ts{text-align:right}

/* ── TYPING INDICATOR ───────────────────────────────── */
.typing{display:flex;gap:4px;padding:12px 16px;align-items:center}
.typing-dot{
  width:6px;height:6px;border-radius:50%;background:var(--muted);
  animation:bounce 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{
  0%,60%,100%{transform:translateY(0);opacity:.4}
  30%{transform:translateY(-6px);opacity:1}
}

/* ── STREAMING ──────────────────────────────────────── */
.streaming-word{display:inline;opacity:0;animation:wordIn .12s ease forwards}
@keyframes wordIn{from{opacity:0}to{opacity:1}}

/* ── MARKDOWN CONTENT ───────────────────────────────── */
.md-content p{margin-bottom:10px}
.md-content p:last-child{margin-bottom:0}
.md-content strong{font-weight:600;color:var(--ink)}
.md-content em{font-style:italic;color:var(--ink-2)}
.md-content a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(var(--f-rgb),.2)}
.md-content a:hover{border-bottom-color:var(--accent)}
.md-content ul,.md-content ol{margin:8px 0;padding-left:20px}
.md-content li{margin-bottom:4px}
.md-content blockquote{
  border-left:2px solid var(--accent-warm);padding:4px 12px;
  margin:8px 0;color:var(--ink-2);font-style:italic;
}
.md-content code{
  font-family:var(--mono);font-size:12px;
  background:var(--code-bg);border:1px solid var(--code-border);
  padding:1px 5px;border-radius:4px;
}
.md-content pre{
  background:var(--code-bg);border:1px solid var(--code-border);
  border-radius:var(--r-sm);padding:14px 16px;margin:10px 0;
  overflow-x:auto;position:relative;
}
.md-content pre code{background:none;border:none;padding:0;font-size:12px;line-height:1.6}
.code-copy{
  position:absolute;top:8px;right:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xs);padding:3px 8px;
  font-family:var(--mono);font-size:9px;color:var(--muted);
  cursor:pointer;transition:all .15s;opacity:0;
}
.md-content pre:hover .code-copy{opacity:1}
.code-copy:hover{border-color:var(--accent);color:var(--accent)}
.code-copy.copied{color:var(--good);border-color:var(--good)}

/* ── SCROLL-TO-BOTTOM FAB ───────────────────────────── */
.scroll-fab{
  position:absolute;bottom:180px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:999px;padding:6px 16px;
  font-family:var(--mono);font-size:11px;color:var(--accent);
  cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.3);
  transition:all .2s;z-index:10;
  display:none;
}
.scroll-fab.show{display:block;animation:fadeUp .2s both}
.scroll-fab:hover{border-color:var(--accent);box-shadow:0 4px 24px rgba(0,0,0,.4)}

/* ── QUICK CHIPS ────────────────────────────────────── */
.quick-chips{
  display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 8px;
  max-width:760px;margin:0 auto;width:100%;
}
.chip{
  font-family:var(--mono);font-size:11px;
  border:1px solid var(--border);border-radius:999px;
  padding:5px 14px;background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.chip:hover{border-color:var(--accent);color:var(--accent)}

/* ── INPUT AREA ─────────────────────────────────────── */
.input-area{
  flex-shrink:0;padding:0 20px 16px;
  max-width:760px;margin:0 auto;width:100%;
}
.input-wrap{
  display:flex;align-items:flex-end;gap:8px;
  border:1px solid var(--border-hi);border-radius:var(--r);
  background:var(--surface);padding:10px 12px;
  transition:border-color .2s,background .3s,box-shadow .2s;
}
.input-wrap:focus-within{border-color:rgba(var(--f-rgb),.3);box-shadow:0 0 0 3px rgba(var(--f-rgb),.06)}
.input-wrap textarea{
  flex:1;border:none;background:transparent;color:var(--ink);
  font:inherit;font-size:14px;line-height:1.5;resize:none;
  max-height:var(--input-max-h);outline:none;min-height:22px;
}
.input-wrap textarea::placeholder{color:var(--muted)}
.send-btn{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--accent);color:var(--bg-0);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
  opacity:.3;pointer-events:none;transition:all .2s;
}
.send-btn.active{opacity:1;pointer-events:auto}
.send-btn.active:hover{transform:scale(1.05);box-shadow:0 0 16px rgba(var(--f-rgb),.3)}
.input-hint{
  display:flex;gap:12px;padding:6px 4px 0;
  font-family:var(--mono);font-size:10px;color:var(--dim);
}
.input-hint kbd{
  background:var(--surface);border:1px solid var(--border);
  border-radius:3px;padding:1px 4px;font-family:inherit;
}

/* ── AUTH CARD ──────────────────────────────────────── */
.auth-card{
  max-width:400px;margin:0 auto;
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:var(--r);padding:24px;
  animation:fadeUp .4s both;
}
.auth-card h3{font-family:var(--display);font-size:20px;font-weight:700;margin-bottom:4px}
.auth-card p{color:var(--muted);font-size:13px;margin-bottom:16px}
.auth-field{
  display:block;width:100%;margin-bottom:10px;
  border:1px solid var(--border);background:var(--bg-1);
  color:var(--ink);border-radius:var(--r-sm);padding:10px 12px;
  font:inherit;font-size:14px;transition:border-color .2s,background .3s;
}
.auth-field:focus{outline:none;border-color:rgba(var(--f-rgb),.3)}
.auth-field::placeholder{color:var(--muted)}
.auth-submit{
  width:100%;padding:10px;border-radius:var(--r-sm);border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:var(--bg-0);font:inherit;font-weight:600;font-size:14px;
  cursor:pointer;transition:all .2s;
}
.auth-submit:hover{opacity:.9;transform:translateY(-1px)}
.auth-err{color:var(--bad);font-size:12px;margin-top:8px}

</head>
<body data-theme="aurora" data-brightness="dark">

<!-- Grain -->
<svg id="grain" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <filter id="gf" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" stitchTiles="stitch">
      <animate attributeName="seed" values="0;7;14;3;11;5;0" dur="0.6s" repeatCount="indefinite"/>
    </feTurbulence>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#gf)" opacity="0.22"/>
</svg>
<div class="scanlines" aria-hidden="true"></div>

<!-- Tower HUD -->
<div class="tower-hud">
  <div class="th-l">
    <a href="rooms.html" class="th-brand">OPHTXN</a>
    <span class="th-sep">//</span>
    <span class="th-num">05</span>
    <span class="th-name">THE TERMINAL</span>
  </div>
  <div class="th-r">
    <span class="th-conn"><span class="th-dot" id="connDot"></span><span id="connLabel">offline</span></span>
    <a href="rooms.html" class="th-back">&uarr; TOWER</a>
  </div>
</div>

<!-- Sidebar overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- App -->
<div class="chat-app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-hdr">
      <span class="sidebar-title">Ophtxn</span>
      <button class="sidebar-close" id="sidebarClose">&times;</button>
    </div>
    <div class="sidebar-sessions" id="sessionList"></div>
    <button class="sidebar-new" id="newChatBtn">+ New conversation</button>
    <div class="sidebar-foot">
      <div class="theme-row">
        <label>COLOR</label>
        <select class="theme-sel" id="colorSelect">
          <option value="aurora">Aurora</option>
          <option value="copper">Copper</option>
          <option value="void">Void</option>
        </select>
      </div>
      <div class="theme-row">
        <label>MODE</label>
        <select class="theme-sel" id="brightSelect">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="system">System</option>
        </select>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="chat-main">
    <!-- Metrics bar -->
    <div class="metrics-bar" id="metricsBar">
      <button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>
      <div class="metric-chip"><span>Completion</span><span class="mv" id="mCompletion">--</span></div>
      <div class="metric-chip"><span>Revenue</span><span class="mv" id="mRevenue">--</span></div>
      <div class="metric-chip"><span>Approvals</span><span class="mv" id="mApprovals">--</span></div>

    <!-- Quick chips -->
    <div class="quick-chips" id="quickChips">
      <button class="chip" data-action="status">Check status</button>
      <button class="chip" data-action="approvals">Show approvals</button>
      <button class="chip" data-action="memory">Memory search</button>
      <button class="chip" data-action="briefing">Daily briefing</button>

    <!-- Input -->
    <div class="input-area">

        <textarea id="chatInput" rows="1" placeholder="Ask anything..." autocomplete="off"></textarea>
        <button class="send-btn" id="sendBtn">&uarr;</button>

        <span><kbd>Enter</kbd> send</span>

<script>
/* ═══════════════════════════════════════════════════════
   RUNTIME CONFIG
   ═══════════════════════════════════════════════════════ */
var __RT = window.__OPHTXN_RUNTIME || {};
var API_BASE = __RT.appBase || (location.port === "8797" ? "" : "http://127.0.0.1:8797");
var CMD_BASE = __RT.apiBase || __RT.commandCenterUrl || "http://127.0.0.1:8000";

/* ═══════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════ */
var state = {
  token: localStorage.getItem("ophtxn_session_token") || "",
  messages: [],
  isStreaming: false,
  atBottom: true,
  metricsTimer: null,
};

/* ═══════════════════════════════════════════════════════
   ELEMENTS
   ═══════════════════════════════════════════════════════ */
var $ = function(id) { return document.getElementById(id); };
var chatContent = $("chatContent");
var messageList = $("messageList");
var chatInput = $("chatInput");
var sendBtn = $("sendBtn");
var connDot = $("connDot");
var connLabel = $("connLabel");
var scrollFab = $("scrollFab");

/* ═══════════════════════════════════════════════════════
   THEME SYSTEM
   ═══════════════════════════════════════════════════════ */
function applyTheme() {
  var c = localStorage.getItem("ophtxn_shell_color") || "aurora";
  var b = localStorage.getItem("ophtxn_shell_bright") || "dark";
  document.body.dataset.theme = c;
  document.body.dataset.brightness = b;
  $("colorSelect").value = c;
  $("brightSelect").value = b;
}
$("colorSelect").addEventListener("change", function() {
  localStorage.setItem("ophtxn_shell_color", this.value);
  applyTheme();
});
$("brightSelect").addEventListener("change", function() {
  localStorage.setItem("ophtxn_shell_bright", this.value);
  applyTheme();
});
applyTheme();

/* ═══════════════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════════════ */
function toggleSidebar(open) {
  var sb = $("sidebar");
  var ov = $("sidebarOverlay");
  if (open) { sb.classList.add("open"); ov.classList.add("show"); }
  else { sb.classList.remove("open"); ov.classList.remove("show"); }
}
$("sidebarToggle").addEventListener("click", function() { toggleSidebar(true); });
$("sidebarClose").addEventListener("click", function() { toggleSidebar(false); });
$("sidebarOverlay").addEventListener("click", function() { toggleSidebar(false); });

/* ═══════════════════════════════════════════════════════
   AUTH
   ═══════════════════════════════════════════════════════ */
function authHeaders() {
  return state.token ? { "X-Session-Token": state.token } : {};
}

function showAuthCard() {
  chatContent.innerHTML = "";
  var div = document.createElement("div");
  div.className = "msg-group";
  div.innerHTML =
    '<div class="auth-card">' +
      '<h3>Start a session</h3>' +
      '<p>Enter your user ID to connect to your Ophtxn runtime.</p>' +
      '<input class="auth-field" id="authUser" placeholder="user_id (e.g. payton)" autocomplete="username">' +
      '<input class="auth-field" id="authName" placeholder="name (optional)">' +
      '<input class="auth-field" id="authPass" type="password" placeholder="passcode (if set)">' +
      '<button class="auth-submit" id="authSubmit">Connect</button>' +
      '<div class="auth-err" id="authErr"></div>' +
    '</div>';
  chatContent.appendChild(div);

  var submitBtn = $("authSubmit");
  submitBtn.addEventListener("click", doAuth);
  $("authUser").addEventListener("keydown", function(e) { if (e.key === "Enter") doAuth(); });
}

async function doAuth() {
  var userId = ($("authUser") || {}).value;
  if (!userId || !userId.trim()) return;
  userId = userId.trim();
  var name = ($("authName") || {}).value || "";
  var pass = ($("authPass") || {}).value || "";
  var errEl = $("authErr");
  var payload = { user_id: userId };
  if (name.trim()) payload.name = name.trim();
  if (pass.trim()) payload.passcode = pass.trim();

  try {
    var resp = await fetch(API_BASE + "/auth/session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      signal: AbortSignal.timeout(4000),
    });
    var data = await resp.json();
    if (!resp.ok || !data.ok) {
      if (errEl) errEl.textContent = data.error || "Authentication failed";
      return;
    }
    state.token = String(data.token || "");
    localStorage.setItem("ophtxn_session_token", state.token);
    setConn(true);
    showWelcome(userId);
    refreshMetrics();
    startMetricsPolling();
  } catch (err) {
    if (errEl) errEl.textContent = err.name === "AbortError" ? "Timed out" : String(err);
  }
}

function showWelcome(userId) {
  chatContent.innerHTML = "";
  var w = document.createElement("div");
  w.className = "welcome";
  w.innerHTML =
    '<div class="welcome-icon">&#9673;</div>' +
    '<h2>Welcome, ' + escHtml(userId || "operator") + '</h2>' +
    '<p>Your governed runtime is live. Ask me anything, check system status, or use the quick actions below.</p>';
  chatContent.appendChild(w);
}

/* ═══════════════════════════════════════════════════════
   CONNECTION STATUS
   ═══════════════════════════════════════════════════════ */
function setConn(ok) {
  connDot.className = "th-dot " + (ok ? "live" : "err");
  connLabel.textContent = ok ? "live" : "offline";
}

async function checkHealth() {
  try {
    var resp = await fetch(API_BASE + "/health", { signal: AbortSignal.timeout(3000) });
    if (resp.ok) { setConn(true); return true; }
  } catch (_) {}
  setConn(false);
  return false;
}

/* ═══════════════════════════════════════════════════════
   METRICS
   ═══════════════════════════════════════════════════════ */
async function refreshMetrics() {
  if (!state.token) return;
  try {
    var resp = await fetch(API_BASE + "/ops/summary", {
      headers: authHeaders(),
      signal: AbortSignal.timeout(4000),
    });
    var data = await resp.json();
    if (!data.ok) return;
    var s = data.summary || {};
    setMetric("mCompletion", s.completion_pct + "%", s.completion_pct >= 80 ? "good" : s.completion_pct >= 50 ? "warn" : "");
    setMetric("mRevenue", "$" + (s.won_revenue_usd || 0), s.won_revenue_usd > 0 ? "good" : "");
    setMetric("mApprovals", String(s.approvals_pending || 0), s.approvals_pending === 0 ? "good" : "warn");
    setMetric("mTasks", String(s.approved_execution_tasks || 0), "");
  } catch (_) {}
}

function setMetric(id, val, cls) {
  var el = $(id);
  if (!el) return;
  if (el.textContent !== val) el.textContent = val;
  el.className = "mv" + (cls ? " " + cls : "");
}

function startMetricsPolling() {
  if (state.metricsTimer) clearInterval(state.metricsTimer);
  state.metricsTimer = setInterval(refreshMetrics, 60000);
}

/* ═══════════════════════════════════════════════════════
   MARKDOWN RENDERER
   ═══════════════════════════════════════════════════════ */
function renderMd(text) {
  var html = escHtml(text);

  // Fenced code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    var id = "cb" + Math.random().toString(36).slice(2, 8);
    return '<pre><code class="lang-' + lang + '" id="' + id + '">' + code.trim() +
      '</code><button class="code-copy" onclick="copyCode(\'' + id + '\',this)">copy</button></pre>';
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');

  // Paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*<(pre|ul|ol|blockquote)/g, '<$1');
  html = html.replace(/<\/(pre|ul|ol|blockquote)>\s*<\/p>/g, '</$1>');

  return html;
}

function escHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function copyCode(id, btn) {
  var el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(function() {
    btn.textContent = "copied";
    btn.classList.add("copied");
    setTimeout(function() { btn.textContent = "copy"; btn.classList.remove("copied"); }, 1500);
  });
}

/* ═══════════════════════════════════════════════════════
   MESSAGES
   ═══════════════════════════════════════════════════════ */
function addMessage(role, text, opts) {
  opts = opts || {};
  var ts = new Date().toTimeString().slice(0, 8);
  var msg = { role: role, text: text, ts: ts, id: "m" + Date.now() };
  state.messages.push(msg);

  // Remove welcome if present
  var wel = chatContent.querySelector(".welcome");
  if (wel) wel.remove();

  var group = document.createElement("div");
  group.className = "msg-group";
  group.id = msg.id + "-group";

  var div = document.createElement("div");
  div.className = "msg " + role;

  var avatar = document.createElement("div");
  avatar.className = "msg-avatar";
  avatar.textContent = role === "user" ? "Y" : "O";

  var body = document.createElement("div");
  body.className = "msg-body";
  body.id = msg.id;

  if (role === "system") {
    body.innerHTML = '<div class="md-content">' + renderMd(text) + '</div>';
  } else {
    body.innerHTML = '<div class="md-content">' + escHtml(text).replace(/\n/g, "<br>") + '</div>';
  }

  var actions = document.createElement("div");
  actions.className = "msg-actions";
  actions.innerHTML = '<button class="msg-action-btn" onclick="copyMsg(\'' + msg.id + '\')">copy</button>';

  body.appendChild(actions);

  var tsEl = document.createElement("div");
  tsEl.className = "msg-ts";
  tsEl.textContent = ts;

  div.appendChild(avatar);
  div.appendChild(body);
  group.appendChild(div);
  group.appendChild(tsEl);
  chatContent.appendChild(group);

  if (state.atBottom || role === "user") scrollToBottom();

  // Stream system messages
  if (role === "system" && !opts.instant) {
    streamMessage(body.querySelector(".md-content"));
  }

  return msg;
}

function streamMessage(el) {
  if (!el) return;
  var html = el.innerHTML;
  el.style.opacity = "0";
  requestAnimationFrame(function() {
    el.style.opacity = "1";
    el.style.transition = "opacity .3s";
  });
}

function showTyping() {
  var div = document.createElement("div");
  div.className = "msg-group";
  div.id = "typing-indicator";
  div.innerHTML =
    '<div class="msg system">' +
      '<div class="msg-avatar">O</div>' +
      '<div class="msg-body"><div class="typing">' +
        '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>' +
      '</div></div>' +
    '</div>';
  chatContent.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  var t = $("typing-indicator");
  if (t) t.remove();
}

function copyMsg(id) {
  var el = document.getElementById(id);
  if (!el) return;
  var content = el.querySelector(".md-content");
  navigator.clipboard.writeText((content || el).textContent);
}

/* ═══════════════════════════════════════════════════════
   SCROLL MANAGEMENT
   ═══════════════════════════════════════════════════════ */
function scrollToBottom() {
  messageList.scrollTop = messageList.scrollHeight;
}

messageList.addEventListener("scroll", function() {
  var threshold = 80;
  state.atBottom = (messageList.scrollHeight - messageList.scrollTop - messageList.clientHeight) < threshold;
  scrollFab.className = "scroll-fab" + (state.atBottom ? "" : " show");
});

scrollFab.addEventListener("click", function() {
  scrollToBottom();
});

/* ═══════════════════════════════════════════════════════
   INPUT HANDLING
   ═══════════════════════════════════════════════════════ */
chatInput.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 180) + "px";
  sendBtn.classList.toggle("active", this.value.trim().length > 0);
});

chatInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

sendBtn.addEventListener("click", handleSend);

async function handleSend() {
  var text = chatInput.value.trim();
  if (!text || state.isStreaming) return;
  if (!state.token) return;

  chatInput.value = "";
  chatInput.style.height = "auto";
  sendBtn.classList.remove("active");

  addMessage("user", text, { instant: true });
  state.isStreaming = true;
  showTyping();

  // Store in memory
  storeMemory(text, "user_message");

  // Process the message
  var response = await processMessage(text);
  hideTyping();
  state.isStreaming = false;

  if (response) {
    addMessage("system", response);
    storeMemory(response, "system_response");
  }
}

/* ═══════════════════════════════════════════════════════
   MESSAGE PROCESSING / ROUTING
   ═══════════════════════════════════════════════════════ */
async function processMessage(text) {
  var lower = text.toLowerCase().trim();

  // Route to appropriate handler
  if (lower === "status" || lower === "check status" || lower.startsWith("/status")) {
    return await cmdStatus();
  }
  if (lower === "approvals" || lower === "show approvals" || lower.startsWith("/approvals")) {
    return await cmdApprovals();
  }
  if (lower.startsWith("remember ") || lower.startsWith("/remember ")) {
    var mem = text.replace(/^(remember |\/remember )/i, "").trim();
    return await cmdRemember(mem);
  }
  if (lower === "memories" || lower === "memory search" || lower.startsWith("/memory")) {
    return await cmdMemories();
  }
  if (lower === "briefing" || lower === "daily briefing" || lower.startsWith("/briefing")) {
    return await cmdBriefing();
  }
  if (lower === "help" || lower === "/help") {
    return cmdHelp();
  }

  // Default: echo back with context
  return "Received: **" + escHtml(text) + "**\n\nYour message has been logged to memory. Use commands like `status`, `approvals`, `briefing`, `remember <text>`, or `memories` to interact with your system.\n\nType `help` for a full list of commands.";
}

async function cmdStatus() {
  try {
    var resp = await fetch(CMD_BASE + "/api/status", { signal: AbortSignal.timeout(4000) });
    var data = await resp.json();
    var summary = "";
    try {
      var resp2 = await fetch(API_BASE + "/ops/summary", {
        headers: authHeaders(),
        signal: AbortSignal.timeout(4000),
      });
      var sData = await resp2.json();
      if (sData.ok) {
        var s = sData.summary;
        summary = "\n\n**Ops Summary**\n" +
          "- Completion: **" + s.completion_pct + "%** (" + s.completion_blockers + " blockers)\n" +
          "- Feature work: " + (s.feature_work_unlocked ? "**unlocked**" : "locked") + "\n" +
          "- Revenue: **$" + (s.won_revenue_usd || 0) + "** (" + s.won_deals + " deals)\n" +
          "- Comms warnings: " + s.comms_warnings + "\n" +
          "- Pending approvals: " + s.approvals_pending + "\n" +
          "- Execution tasks: " + s.approved_execution_tasks;
      }
    } catch (_) {}
    return "**System Status: " + (data.ok ? "Online" : "Error") + "**\n\nCommand Center is " +
      (data.ok ? "reachable" : "offline") + ". Version: " + (data.version || "unknown") + summary;
  } catch (err) {
    return "**System Status: Offline**\n\nCommand Center at `" + CMD_BASE + "` is not reachable.\n\n`" + err.message + "`";
  }
}

async function cmdApprovals() {
  try {
    var resp = await fetch(CMD_BASE + "/api/approvals", { signal: AbortSignal.timeout(4000) });
    var data = await resp.json();
    var items = data.pending || data.approvals || [];
    var total = data.total_pending || items.length;
    if (total === 0) return "**Approval Queue: Clear**\n\nNo pending approvals. All tasks are processed.";
    var list = items.slice(0, 10).map(function(a) {
      return "- **" + (a.task_id || a.id || "?") + "**: " + (a.description || a.task || "no description") + " [" + (a.risk_level || a.priority || "?") + "]";
    }).join("\n");
    return "**Approval Queue: " + total + " pending**\n\n" + list;
  } catch (err) {
    return "**Approvals: Unavailable**\n\nCould not reach Command Center.\n\n`" + err.message + "`";
  }
}

async function cmdRemember(text) {
  if (!text) return "Usage: `remember <something to remember>`";
  try {
    var resp = await fetch(API_BASE + "/memory/entry", {
      method: "POST",
      headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
      body: JSON.stringify({ text: text, source: "ophtxn_shell", tags: ["manual"], importance: 0.7 }),
      signal: AbortSignal.timeout(4000),
    });
    var data = await resp.json();
    if (data.ok) return "**Remembered.** Entry `" + data.entry.entry_id + "` stored with importance 0.7.";
    return "**Error:** " + (data.error || "Unknown error");
  } catch (err) {
    return "**Memory store failed:** `" + err.message + "`";
  }
}

async function cmdMemories() {
  try {
    var resp = await fetch(API_BASE + "/memory/entry?limit=10", {
      headers: authHeaders(),
      signal: AbortSignal.timeout(4000),
    });
    var data = await resp.json();
    if (!data.ok) return "**Error:** " + (data.error || "Unknown");
    if (data.count === 0) return "**No memories stored yet.** Use `remember <text>` to store something.";
    var list = data.entries.map(function(e) {
      return "- `" + e.entry_id + "` [" + (e.source || "?") + "] " + e.text.slice(0, 80) + (e.text.length > 80 ? "..." : "");
    }).join("\n");
    return "**Recent Memories** (" + data.count + " shown)\n\n" + list;
  } catch (err) {
    return "**Memory fetch failed:** `" + err.message + "`";
  }
}

async function cmdBriefing() {
  try {
    var resp = await fetch(CMD_BASE + "/api/briefings/latest", { signal: AbortSignal.timeout(4000) });
    if (resp.status === 404) return "**No briefing available.**\n\nRun `python horizon_agent.py` to generate one.";
    var data = await resp.json();
    return "**Daily Briefing**\n\n" + (data.content || data.markdown || JSON.stringify(data, null, 2));
  } catch (err) {
    return "**Briefing unavailable:** `" + err.message + "`";
  }
}

function cmdHelp() {
  return "**Ophtxn Shell Commands**\n\n" +
    "- `status` — System health + ops summary\n" +
    "- `approvals` — View pending approval queue\n" +
    "- `briefing` — Latest horizon briefing\n" +
    "- `remember <text>` — Store a memory entry\n" +
    "- `memories` — Show recent memory entries\n" +
    "- `help` — This message\n\n" +
    "You can also type naturally and your messages will be logged to memory.";
}

/* ═══════════════════════════════════════════════════════
   MEMORY STORE (background)
   ═══════════════════════════════════════════════════════ */
function storeMemory(text, source) {
  if (!state.token) return;
  fetch(API_BASE + "/memory/entry", {
    method: "POST",
    headers: Object.assign({ "Content-Type": "application/json" }, authHeaders()),
    body: JSON.stringify({ text: text.slice(0, 500), source: source || "ophtxn_shell", tags: ["chat"] }),
    signal: AbortSignal.timeout(4000),
  }).catch(function() {});
}

/* ═══════════════════════════════════════════════════════
   QUICK CHIPS
   ═══════════════════════════════════════════════════════ */
$("quickChips").addEventListener("click", function(e) {
  var chip = e.target.closest(".chip");
  if (!chip || !state.token) return;
  var action = chip.dataset.action;
  var textMap = {
    status: "status",
    approvals: "approvals",
    memory: "memories",
    briefing: "briefing",
  };
  var text = textMap[action];
  if (text) {
    chatInput.value = text;
    handleSend();
  }
});

/* ═══════════════════════════════════════════════════════
   NEW CHAT
   ═══════════════════════════════════════════════════════ */
$("newChatBtn").addEventListener("click", function() {
  state.messages = [];
  if (state.token) showWelcome("");
  else showAuthCard();
  toggleSidebar(false);
});

/* ═══════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════ */
async function init() {
  var healthy = await checkHealth();
  if (state.token && healthy) {
    // Verify session is valid
    try {
      var resp = await fetch(API_BASE + "/ops/summary", {
        headers: authHeaders(),
        signal: AbortSignal.timeout(4000),
      });
      var data = await resp.json();
      if (data.ok) {
        showWelcome("");
        refreshMetrics();
        startMetricsPolling();
        return;
      }
    } catch (_) {}
    // Token expired
    state.token = "";
    localStorage.removeItem("ophtxn_session_token");
  }
  showAuthCard();
}

init();
</script>

  CMD_BASE = rt.apiBase || rt.commandCenterUrl || CMD_BASE;
}
