  <style>
    /* -- Page layout -- */
    .page { padding-top: 48px; }
    .hero-subtitle { text-align: center; }

    /* -- Date display -- */
    .date-display {
      font-family: 'DM Mono', monospace; font-size: 13px;
      color: #7b96af; text-align: center; margin-top: 4px;
    }

    /* -- Date nav -- */
    .date-nav {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-top: 12px;
    }
    .date-nav-btn {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px; width: 32px; height: 32px;
      color: #7b96af; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .date-nav-btn:hover { background: rgba(255,255,255,.08); color: #E0E0E0; }
    .date-nav-label {
      font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600;
      color: #E0E0E0; cursor: pointer; letter-spacing: .02em;
    }

    /* -- Task card (glass card with left accent) -- */
    .task-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-left: 3px solid #00e5c4;
      border-radius: 12px;
      padding: 16px 20px;
      transition: border-color .2s, background .2s;
    }
    .task-card:hover {
      border-color: rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
    }

    /* -- Empty state -- */
    .empty-state {
      text-align: center; padding: 40px 20px;
    }
    .empty-text {
      font-family: 'Sora', sans-serif; font-size: 14px;
      color: #7b96af;
    }
    .empty-hint {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: rgba(255,255,255,.3); margin-top: 8px;
    }

    /* -- Quick add -- */
    .quick-add {
      display: flex; gap: 8px;
      margin-top: 16px;
    }
    .quick-add-input {
      flex: 1;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Sora', sans-serif; font-size: 13px;
      color: #E0E0E0; outline: none;
      transition: border-color .2s;
    }
    .quick-add-input::placeholder { color: rgba(255,255,255,.25); }
    .quick-add-input:focus { border-color: rgba(0,229,196,.3); }

    /* -- Task list -- */
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
    }
    .task-item:hover {
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.1);
    }
    .task-item.done { opacity: 0.5; }
    .task-item.done .task-title { text-decoration: line-through; }
    .task-check {
      width: 18px; height: 18px; min-width: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
    }
    .task-item.done .task-check {
      border-color: #00e5c4;
      background: rgba(0,229,196,.15);
    }
    .task-item.done .task-check::after {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: #00e5c4;
    }
    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 500;
      color: #E0E0E0;
    }
    .task-meta {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: rgba(255,255,255,.3); margin-top: 2px;
    }

    /* -- Stats row -- */
    .planner-stats {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .planner-stat-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-left: 3px solid #00e5c4;
      border-radius: 12px;
      padding: 16px 20px;
      flex: 1; min-width: 120px; text-align: center;
    }
    .planner-stat-value {
      font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 700;
      color: #00e5c4; line-height: 1;
    }
    .planner-stat-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: rgba(255,255,255,.3); margin-top: 4px;
      letter-spacing: .08em; text-transform: uppercase;
    }

    /* -- Progress bar -- */
    .progress-bar-container {
      margin-top: 12px;
    }
    .progress-bar-bg {
      height: 6px; border-radius: 3px;
      background: rgba(255,255,255,.06);
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #00e5c4, #73b8ff);
      transition: width .6s cubic-bezier(.22,1,.36,1);
      width: 0%;
    }
    .progress-text {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: #7b96af; text-align: right; margin-top: 4px;
    }
  </style>
</head>

<body data-theme="aurora" data-brightness="dark">
<script>(function(){try{var b=document.body;b.dataset.theme=localStorage.getItem('ophtxn_site_theme')||'aurora';b.dataset.brightness=localStorage.getItem('ophtxn_site_brightness')||'dark';}catch(e){}})()</script>

  <!-- Ambient background orbs -->
  <div class="ambient">
    <div class="ambient-orb teal"></div>
    <div class="ambient-orb gold"></div>
    <div class="ambient-orb violet"></div>
  </div>
  <div class="grid-bg"></div>

  <!-- OS MENUBAR -->
  <div class="os-menubar">
    <div class="mb-left">
      <a href="index.html" class="mb-logo" title="Ophtxn Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/></svg>
      </a>
      <span class="mb-appname">Ophtxn</span>
      <button class="mb-mi" id="mbFile">File</button>
      <button class="mb-mi" id="mbView">View</button>
      <button class="mb-hamburger" id="mbHamburger">&#9776;</button>
    </div>
    <div class="mb-right">
      <span class="mb-mi" id="themeToggle" style="font-size:11px;padding:2px 8px;cursor:pointer;">Dark</span>
      <span class="mb-clock" id="mbClock"></span>
      <span class="mb-date" id="mbDate"></span>
    </div>
  </div>

  <!-- PAGE -->
  <main class="page">

    <!-- Hero -->
    <section class="hero reveal">
      <p class="hero-label">Governed Task Execution</p>
      <h1 class="hero-title">Daily Planner</h1>
      <div class="date-display" id="heroDate"></div>
      <div class="date-nav">
        <button class="date-nav-btn" id="dpPrev" title="Previous day">&#8592;</button>
        <span class="date-nav-label" id="dpDateText" title="Click to jump to today"></span>
        <button class="date-nav-btn" id="dpNext" title="Next day">&#8594;</button>
      </div>
    </section>

    <!-- Stats -->
    <div class="stat-row reveal">
      <div class="stat-item">
        <div class="stat-value teal" id="dpStatTotal">0</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-item">
        <div class="stat-value gold" id="dpStatDone">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-item">
        <div class="stat-value blue" id="dpStatLeft">0</div>
        <div class="stat-label">Remaining</div>
      </div>
    </div>

    <!-- Progress -->
    <section class="section reveal">
      <div class="progress-bar-container">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="dpProgressFill"></div></div>
        <div class="progress-text" id="dpProgressText">0%</div>
      </div>
    </section>

    <!-- Today's Tasks -->
    <section class="section reveal">
      <p class="section-label">Tasks</p>
      <h2 class="section-title">Today's tasks</h2>

      <div class="task-card">
        <div class="task-list" id="taskList">
          <!-- Populated by JS -->
        </div>
        <div class="empty-state" id="emptyState">
          <div class="empty-text">No tasks scheduled</div>
          <div class="empty-hint">Add a task below to get started</div>
        </div>
        <div class="quick-add">
          <input type="text" class="quick-add-input" id="dpQuickAdd" placeholder="Add a task..." autocomplete="off">
        </div>
      </div>
    </section>

  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    /* -- Clock -- */
    function tickClock() {
      var el = document.getElementById('mbClock');
      if (!el) return;
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      el.textContent = h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + ' ' + ampm;
    }
    tickClock();
    setInterval(tickClock, 1000);

    /* -- Date -- */
    (function() {
      var d = document.getElementById('mbDate');
      if (d) {
        var now = new Date();
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        d.textContent = days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
      }
    })();

    /* -- Toast -- */
    function showToast(msg) {
      var t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2000);
    }

    /* -- Scroll Reveal -- */
    (function() {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.reveal').forEach(function(el) {
        observer.observe(el);
      });
    })();

    /* =========================================
       DAILY PLANNER ENGINE
       ========================================= */
    (function(){
      'use strict';

      var TASK_KEY = 'ophtxn_planner_tasks';

      /* -- Helpers -- */
      function dateStr(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      }
      function fmtDateHeader(d) {
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      }
      function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

      /* -- Task data model -- */
      function loadAll() {
        try { var d = JSON.parse(localStorage.getItem(TASK_KEY)); return d || {}; } catch(e) { return {}; }
      }
      function saveAll(data) { try { localStorage.setItem(TASK_KEY, JSON.stringify(data)); } catch(e) {} }
      function loadDay(ds) { var all = loadAll(); return all[ds] || []; }
      function saveDay(ds, tasks) { var all = loadAll(); all[ds] = tasks; saveAll(all); }

      /* -- State -- */
      var today = new Date();
      var currentDate = new Date(today);
      var todayStr = dateStr(today);

      /* -- DOM refs -- */
      var dpDateText = document.getElementById('dpDateText');
      var heroDate = document.getElementById('heroDate');
      var dpPrev = document.getElementById('dpPrev');
      var dpNext = document.getElementById('dpNext');
      var taskList = document.getElementById('taskList');
      var emptyState = document.getElementById('emptyState');
      var dpQuickAdd = document.getElementById('dpQuickAdd');

      /* -- Date Navigation -- */
      function setDate(d) {
        currentDate = new Date(d);
        renderAll();
      }
      dpPrev.addEventListener('click', function() { currentDate.setDate(currentDate.getDate()-1); setDate(currentDate); });
      dpNext.addEventListener('click', function() { currentDate.setDate(currentDate.getDate()+1); setDate(currentDate); });
      dpDateText.addEventListener('click', function() { setDate(today); });
      dpDateText.style.cursor = 'pointer';

      /* -- Render tasks -- */
      function renderTasks() {
        var ds = dateStr(currentDate);
        var tasks = loadDay(ds);

        if (tasks.length === 0) {
          taskList.style.display = 'none';
          emptyState.style.display = 'block';
          return;
        }

        taskList.style.display = 'flex';
        emptyState.style.display = 'none';

        var html = '';
        tasks.forEach(function(t) {
          var doneClass = t.status === 'done' ? ' done' : '';
          html += '<div class="task-item' + doneClass + '" data-id="' + t.id + '">';
          html += '<div class="task-check"></div>';
          html += '<div class="task-body">';
          html += '<div class="task-title">' + t.title + '</div>';
          if (t.start) {
            var h = parseInt(t.start); var m = parseInt(t.start.split(':')[1]);
            var ampm = h >= 12 ? 'PM' : 'AM'; var hh = h % 12 || 12;
            html += '<div class="task-meta">' + hh + ':' + String(m).padStart(2,'0') + ' ' + ampm;
            if (t.agent) html += ' -- ' + t.agent;
            html += '</div>';
          }
          html += '</div></div>';
        });
        taskList.innerHTML = html;

        /* Click to toggle status */
        taskList.querySelectorAll('.task-item').forEach(function(el) {
          el.addEventListener('click', function() {
            var id = el.dataset.id;
            var tasks2 = loadDay(ds);
            tasks2.forEach(function(t) {
              if (t.id === id) {
                t.status = t.status === 'done' ? 'pending' : 'done';
              }
            });
            saveDay(ds, tasks2);
            renderAll();
          });
        });
      }

      /* -- Progress -- */
      function renderProgress() {
        var ds = dateStr(currentDate);
        var tasks = loadDay(ds);
        var total = tasks.length;
        var done = tasks.filter(function(t) { return t.status === 'done'; }).length;
        var pct = total > 0 ? Math.round(done / total * 100) : 0;
        document.getElementById('dpProgressFill').style.width = pct + '%';
        document.getElementById('dpProgressText').textContent = pct + '% (' + done + '/' + total + ')';
      }

      /* -- Stats -- */
      function renderStats() {
        var ds = dateStr(currentDate);
        var tasks = loadDay(ds);
        var total = tasks.length;
        var done = tasks.filter(function(t) { return t.status === 'done'; }).length;
        document.getElementById('dpStatTotal').textContent = total;
        document.getElementById('dpStatDone').textContent = done;
        document.getElementById('dpStatLeft').textContent = total - done;
      }

      /* -- Quick add -- */
      dpQuickAdd.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        var title = dpQuickAdd.value.trim();
        if (!title) return;
        var ds = dateStr(currentDate);
        var tasks = loadDay(ds);
        /* Find next available hour */
        var usedHours = {};
        tasks.forEach(function(t) { if (t.start) usedHours[parseInt(t.start)] = true; });
        var nextH = 8;
        for (var h = 6; h <= 21; h++) { if (!usedHours[h]) { nextH = h; break; } }
        tasks.push({
          id: uid(), title: title, start: String(nextH).padStart(2,'0') + ':00',
          end: String(nextH+1).padStart(2,'0') + ':00', status: 'pending',
          agent: '', priority: 'medium'
        });
        saveDay(ds, tasks);
        dpQuickAdd.value = '';
        renderAll();
      });

      /* -- Render All -- */
      function renderAll() {
        dpDateText.textContent = fmtDateHeader(currentDate);
        var ds = dateStr(currentDate);
        var isToday = ds === todayStr;
        heroDate.textContent = isToday ? 'Today' : fmtDateHeader(currentDate);
        renderTasks();
        renderProgress();
        renderStats();
      }

      /* -- Initial render -- */
      renderAll();

    })();

    /* -- Service Worker -- */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
  </script>

  <script src="nav-system.js"></script>
</body>
</html>
