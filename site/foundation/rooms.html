<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <title>Tower | Ophtxn</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="design-system.css">

  <style>
    /* ── Page top padding for menubar ── */
    .page { padding-top: 48px; }

    /* ── Room Cards Grid ── */
    .room-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 900px) {
      .room-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .room-grid { grid-template-columns: 1fr; }
    }

    .room-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px;
      padding: 20px 22px;
      border-left: 3px solid var(--room-accent, #00e5c4);
      transition: background .2s, border-color .2s, transform .15s;
      text-decoration: none;
      display: block;
      cursor: pointer;
    }

    .room-card:hover {
      background: rgba(255,255,255,.05);
      border-color: rgba(255,255,255,.1);
      border-left-color: var(--room-accent, #00e5c4);
      transform: translateY(-2px);
    }

    .room-name {
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary, #E0E0E0);
      margin-bottom: 6px;
      letter-spacing: .01em;
    }

    .room-desc {
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      color: var(--text-secondary, #7b96af);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .room-status {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .06em;
      color: var(--room-accent, #00e5c4);
      opacity: .7;
    }

    /* ── Floor tag ── */
    .room-floor {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-tertiary, rgba(255,255,255,.3));
      margin-bottom: 8px;
    }
  </style>
  <script src="runtime.config.js"></script>
</head>

<body data-theme="aurora" data-brightness="dark">
<script>(function(){try{var b=document.body;b.dataset.theme=localStorage.getItem('ophtxn_site_theme')||'aurora';b.dataset.brightness=localStorage.getItem('ophtxn_site_brightness')||'dark';}catch(e){}})()</script>

  <!-- Ambient background orbs -->
  <div class="ambient">
    <div class="ambient-orb teal"></div>
    <div class="ambient-orb gold"></div>
    <div class="ambient-orb violet"></div>
  </div>
  <div class="grid-bg"></div>

  <!-- ── OS MENUBAR ── -->
  <div class="os-menubar">
    <div class="mb-left">
      <a href="index.html" class="mb-logo" title="Ophtxn Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/></svg>
      </a>
      <span class="mb-appname">Ophtxn</span>
      <button class="mb-mi" id="mbFile">File</button>
      <button class="mb-mi" id="mbView">View</button>
      <button class="mb-hamburger" id="mbHamburger">&#9776;</button>
    </div>
    <div class="mb-right">
      <span class="mb-mi" id="themeToggle" style="font-size:11px;padding:2px 8px;cursor:pointer;">Dark</span>
      <span class="mb-clock" id="mbClock"></span>
      <span class="mb-date" id="mbDate"></span>
    </div>
  </div>

  <!-- ── PAGE ── -->
  <main class="page">

    <!-- Hero -->
    <section class="hero reveal">
      <p class="hero-label">Workspace Directory</p>
      <h1 class="hero-title">Tower</h1>
      <p class="hero-subtitle" style="text-align:left;">Every room is a workspace. Pick a floor and get to work.</p>
    </section>

    <!-- Room Cards -->
    <section class="section reveal">
      <div class="room-grid" id="roomGrid"></div>
    </section>

  </main>

  <!-- ── TOAST ── -->
  <div class="toast" id="toast"></div>

  <script>
    'use strict';

    /* ── Room data ── */
    var ROOMS = [
      { floor: '07', name: 'Control Room', desc: 'Local ops hub. System health, runtime status, and service controls.', url: 'local_hub.html', accent: '#ff3264' },
      { floor: '06', name: 'Trading Room', desc: 'Market interface with live data feeds and position tracking.', url: 'trading_room.html', accent: '#00e5c4' },
      { floor: '05', name: 'Terminal', desc: 'Interactive shell. Run commands, query agents, execute workflows.', url: 'ophtxn_shell.html', accent: '#32d74b' },
      { floor: '04', name: 'Mind Map', desc: 'Visual knowledge mapping and idea organization.', url: 'press_kit.html', accent: '#ffbc00' },
      { floor: '03', name: 'Daily Planner', desc: 'Task planning, scheduling, and daily operations workflow.', url: 'daily_planner.html', accent: '#73b8ff' },
      { floor: '02', name: 'Command Center', desc: 'Dashboard for system metrics, agent coordination, and approvals.', url: 'command_center.html', accent: '#ff9f0a' },
      { floor: 'LB', name: 'Lobby', desc: 'Landing page. System overview and quick navigation.', url: 'index.html', accent: '#a0968c' },
      { floor: '--', name: 'Markets Terminal', desc: 'Live equities, crypto, forex, and commodities terminal.', url: 'markets_terminal.html', accent: '#00e5c4' },
      { floor: '--', name: 'Night Capital', desc: 'Venture intelligence and deal flow tracking.', url: 'night_capital.html', accent: '#7b6fff' },
      { floor: '--', name: 'AI School', desc: 'Education modules and agent training resources.', url: 'ai_school.html', accent: '#f8c842' },
      { floor: '--', name: 'App Studio', desc: 'Operator profile, command builder, and integration tools.', url: 'official_app.html', accent: '#00e5c4' },
      { floor: '--', name: 'Agent View', desc: 'Live agent monitoring and interaction interface.', url: 'agent_view.html', accent: '#7b6fff' },
      { floor: '--', name: 'Comms Hub', desc: 'Unified messaging across Telegram, Discord, and email.', url: 'comms_hub.html', accent: '#ff5c8a' },
    ];

    /* ── Render room cards ── */
    var grid = document.getElementById('roomGrid');

    ROOMS.forEach(function(room) {
      var card = document.createElement('a');
      card.className = 'room-card';
      card.href = room.url;
      card.style.setProperty('--room-accent', room.accent);

      card.innerHTML =
        '<div class="room-floor">Floor ' + room.floor + '</div>' +
        '<div class="room-name">' + room.name + '</div>' +
        '<div class="room-desc">' + room.desc + '</div>' +
        '<div class="room-status">Available</div>';

      grid.appendChild(card);
    });

    /* ── Clock ── */
    function tickClock() {
      var el = document.getElementById('mbClock');
      if (!el) return;
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      el.textContent = h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + ' ' + ampm;
    }
    tickClock();
    setInterval(tickClock, 1000);

    /* ── Date ── */
    (function() {
      var d = document.getElementById('mbDate');
      if (d) {
        var now = new Date();
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        d.textContent = days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
      }
    })();

    /* ── Toast ── */
    function showToast(msg) {
      var t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2000);
    }

    /* ── Scroll Reveal ── */
    (function() {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.reveal').forEach(function(el) {
        observer.observe(el);
      });
    })();

    /* ── Service Worker ── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
  </script>

  <script src="nav-system.js"></script>
</body>
</html>
