<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a1118">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<title>OPHTXN TOWER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #020406;
  --bldg:  #05080e;
  --panel: #040710;
  --ink:   #8aaac8;
  --dim:   #1e2e42;
  --game:  'Orbitron', 'DM Mono', monospace;
  --mono:  'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }

body {
  color: var(--ink);
  font-family: var(--mono);
  display: flex;
  flex-direction: column;
}

/* ── SCANLINES ────────────────────────── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 500;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
  );
  pointer-events: none;
}

/* ── HUD TOP ──────────────────────────── */
.hud-top {
  height: 42px; flex-shrink: 0; z-index: 20; position: relative;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid rgba(var(--f-rgb),.1);
  background: rgba(2,4,6,.95);
}

.hud-brand {
  font-family: var(--game); font-size: 11px; font-weight: 700;
  letter-spacing: .28em; color: var(--f); text-decoration: none;
}

.hud-sep  { color: var(--dim); margin: 0 10px; }

.hud-title {
  font-family: var(--game); font-size: 8px;
  letter-spacing: .3em; color: var(--dim);
}

.hud-left, .hud-right { display: flex; align-items: center; }

.hud-stat {
  font-family: var(--game); font-size: 7.5px;
  letter-spacing: .2em; color: var(--dim); margin-left: 20px;
}

.stat-val       { color: var(--ink); margin-left: 5px; }
.stat-val.live  { color: var(--f); animation: glow-blink 2s infinite; }
.stat-val.warn  { color: #f8c842; }
.stat-val.dead  { color: #ff5c8a; }

@keyframes glow-blink {
  0%,100% { opacity: 1; } 50% { opacity: .35; }
}

/* ── MAIN AREA ────────────────────────── */
.main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 28px; padding: 16px 24px;
  position: relative; z-index: 5; overflow: hidden;
}

/* ── STARS ────────────────────────────── */
.stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ── CITY SKYLINE ─────────────────────── */
.city {
  position: fixed; bottom: 38px; left: 0; right: 0;
  height: 110px; z-index: 1;
  display: flex; align-items: flex-end;
  pointer-events: none;
}
.cb { background: #04070d; border-top: 1px solid #0c1520; flex-shrink: 0; }

/* ── BUILDING COLUMN ──────────────────── */
.tower-col {
  display: flex; flex-direction: column; align-items: center;
  position: relative; z-index: 5;
}

/* Roof bar */
.roof {
  width: 660px; height: 28px;
  background: #07101c;
  border: 1px solid rgba(var(--f-rgb),.18);
  border-bottom: none;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
}

.roof-label {
  font-family: var(--game); font-size: 7.5px;
  letter-spacing: .3em; color: rgba(var(--f-rgb),.4);
}

.antenna {
  display: flex; align-items: center; gap: 8px;
}

.ant-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #ff5c8a; box-shadow: 0 0 8px #ff5c8a;
  animation: glow-blink 1.1s infinite;
}

.ant-label {
  font-family: var(--game); font-size: 7px;
  letter-spacing: .2em; color: rgba(255,92,138,.5);
}

/* Building body */
.building {
  width: 660px;
  border: 1px solid rgba(var(--f-rgb),.1);
  background: var(--bldg);
  position: relative; overflow: hidden;
}

/* Vertical column lines (structural look) */
.building::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 80px,
    rgba(255,255,255,.012) 80px,
    rgba(255,255,255,.012) 81px
  );
  pointer-events: none; z-index: 0;
}

/* Ground slab */
.ground {
  width: 680px; height: 8px;
  background: linear-gradient(to bottom, rgba(var(--f-rgb),.06), transparent);
  border-left: 1px solid rgba(var(--f-rgb),.06);
  border-right: 1px solid rgba(var(--f-rgb),.06);
}

/* ── FLOOR ROW ────────────────────────── */
.floor {
  position: relative; z-index: 1;
  height: 70px;
  display: grid;
  grid-template-columns: 76px 1fr 84px;
  border-bottom: 1px solid rgba(255,255,255,.03);
  cursor: pointer;
  transition: background .15s;
  --f-rgb: 255,255,255;
}

.floor:last-child { border-bottom: none; }

.floor:hover, .floor.sel {
  background: rgba(var(--f-rgb), .04);
}

/* Left glow stripe on selection */
.floor::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: transparent;
  transition: background .2s, box-shadow .2s;
}

.floor.sel::before {
  background: rgba(var(--f-rgb), 1);
  box-shadow: 0 0 12px rgba(var(--f-rgb), .7);
}

/* Triangle cursor (right side) */
.floor-cursor {
  position: absolute; right: -9px; top: 50%;
  transform: translateY(-50%);
  width: 0; height: 0;
  border-top: 7px solid transparent;
  border-bottom: 7px solid transparent;
  border-right: 9px solid rgba(var(--f-rgb), .9);
  display: none;
}
.floor.sel .floor-cursor { display: block; }

/* ── FLOOR LABEL (left col) ───────────── */
.fl-label {
  padding: 0 10px 0 14px;
  height: 100%; display: flex; flex-direction: column;
  justify-content: center; gap: 4px;
  border-right: 1px solid rgba(255,255,255,.03);
}

.fl-num {
  font-family: var(--game); font-size: 18px; font-weight: 900;
  color: rgba(var(--f-rgb), .85); line-height: 1;
  text-shadow: 0 0 10px rgba(var(--f-rgb), .4);
}

.fl-tag {
  font-family: var(--game); font-size: 6.5px;
  letter-spacing: .15em; color: rgba(var(--f-rgb), .4);
  text-transform: uppercase; line-height: 1;
}

/* ── WINDOWS (center col) ─────────────── */
.wins {
  padding: 10px 14px;
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  grid-template-rows: 1fr 1fr;
  gap: 3px;
  align-content: center;
}

.w {
  height: 17px;
  background: rgba(var(--f-rgb), .055);
  border: 1px solid rgba(var(--f-rgb), .1);
  transition: background .7s, box-shadow .7s;
}

.w.on {
  background: rgba(var(--f-rgb), .52);
  box-shadow: 0 0 5px rgba(var(--f-rgb), .3);
}

/* ── FLOOR PORT (right col) ───────────── */
.fl-port {
  padding: 0 10px;
  height: 100%; display: flex; flex-direction: column;
  justify-content: center; align-items: flex-end; gap: 5px;
  border-left: 1px solid rgba(255,255,255,.03);
}

.port-tag {
  font-family: var(--game); font-size: 8px;
  letter-spacing: .12em; color: rgba(var(--f-rgb), .55);
}

.port-status {
  display: flex; align-items: center; gap: 4px;
  font-family: var(--game); font-size: 6.5px;
  color: rgba(255,255,255,.18);
}

.port-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(255,255,255,.18); flex-shrink: 0;
}

/* ── INFO PANEL ───────────────────────── */
.info-panel {
  width: 252px; flex-shrink: 0; position: relative; z-index: 5;
  background: rgba(4,7,16,.88);
  border: 1px solid rgba(var(--f-rgb),.1);
  padding: 18px; display: flex; flex-direction: column; gap: 14px;
  min-height: 420px;
}

/* Corner brackets */
.info-panel::before, .info-panel::after {
  content: ''; position: absolute;
  width: 12px; height: 12px;
  border-color: rgba(var(--f-rgb),.35); border-style: solid;
}
.info-panel::before { top: -1px;    left: -1px;  border-width: 2px 0 0 2px; }
.info-panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

.panel-sys {
  font-family: var(--game); font-size: 7.5px;
  letter-spacing: .28em; color: rgba(var(--f-rgb),.35);
  text-transform: uppercase;
}

/* Idle state */
.p-idle {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  opacity: .45;
}

.p-blink {
  font-family: var(--game); font-size: 9px;
  letter-spacing: .22em; color: var(--ink);
  animation: glow-blink 1.6s infinite;
}

.p-ctrls { display: flex; flex-direction: column; gap: 6px; align-items: center; }

.p-ctrl {
  font-family: var(--game); font-size: 7px;
  letter-spacing: .15em; color: var(--dim);
}

.p-ctrl kbd {
  font-family: var(--game); font-size: 6.5px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  padding: 1px 5px; margin-right: 3px;
  color: rgba(255,255,255,.4);
}

/* Active state */
.p-active {
  display: none; flex-direction: column; gap: 12px; flex: 1;
}

.p-floor-num {
  font-family: var(--game); font-size: 44px; font-weight: 900;
  color: rgba(var(--a-rgb), .9); line-height: 1;
  text-shadow: 0 0 24px rgba(var(--a-rgb), .4);
}

.p-name {
  font-family: var(--game); font-size: 10.5px; font-weight: 700;
  letter-spacing: .08em; color: #d8eaff; line-height: 1.3;
}

.p-sub {
  font-family: var(--game); font-size: 7px;
  letter-spacing: .25em; color: rgba(var(--a-rgb), .55);
  text-transform: uppercase;
}

.p-hr { height: 1px; background: rgba(var(--a-rgb), .2); }

.p-desc {
  font-size: 11px; line-height: 1.65;
  color: rgba(138,170,200,.55); font-style: italic;
}

.p-feats { display: flex; flex-direction: column; gap: 6px; }

.p-feat {
  font-family: var(--game); font-size: 7px;
  letter-spacing: .1em; color: var(--dim);
  display: flex; align-items: center; gap: 6px;
}

.p-feat::before {
  content: '▸';
  color: rgba(var(--a-rgb), .65); flex-shrink: 0;
}

.p-enter {
  display: block; text-align: center; padding: 11px;
  border: 1px solid rgba(var(--a-rgb), .45);
  color: rgba(var(--a-rgb), 1);
  font-family: var(--game); font-size: 9px; letter-spacing: .2em;
  text-decoration: none; text-transform: uppercase;
  position: relative; overflow: hidden;
  transition: background .25s, color .25s;
  margin-top: auto;
  animation: enter-pulse 2.2s infinite;
}

@keyframes enter-pulse {
  0%,100% { box-shadow: 0 0 0px rgba(var(--a-rgb), 0); }
  50%      { box-shadow: 0 0 14px rgba(var(--a-rgb), .35); }
}

.p-enter::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(var(--a-rgb), 1);
  transform: scaleX(0); transform-origin: left;
  transition: transform .3s ease;
}

.p-enter:hover { color: #020406; }
.p-enter:hover::before { transform: scaleX(1); }
.p-enter span { position: relative; }

/* ── HUD BOTTOM ───────────────────────── */
.hud-bottom {
  height: 38px; flex-shrink: 0; z-index: 20; position: relative;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  border-top: 1px solid rgba(var(--f-rgb),.07);
  background: rgba(2,4,6,.95);
}

.hud-ctrl {
  font-family: var(--game); font-size: 7px;
  letter-spacing: .18em; color: var(--dim);
}

.hud-ctrl kbd {
  font-family: var(--game); font-size: 7px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.09);
  padding: 1px 5px; margin-right: 3px;
  color: rgba(255,255,255,.35);
}

.hud-loc {
  font-family: var(--game); font-size: 8px;
  letter-spacing: .2em; color: rgba(var(--f-rgb),.45);
}

/* -- FAB BOT -- */
.fab-bot{position:fixed;bottom:28px;right:28px;z-index:9500;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(var(--f-rgb),0.2),rgba(var(--f-rgb),0.08));border:1px solid rgba(var(--f-rgb),0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 24px rgba(var(--f-rgb),0.2),0 8px 32px rgba(0,0,0,0.4);transition:box-shadow 0.3s,transform 0.2s;user-select:none;touch-action:none}
.fab-bot:hover{box-shadow:0 0 36px rgba(var(--f-rgb),0.35),0 8px 32px rgba(0,0,0,0.4);transform:scale(1.05)}
.fab-bot svg{color:var(--f);pointer-events:none}
.fab-popup{display:none;position:fixed;bottom:96px;right:28px;z-index:9501;background:rgba(10,18,30,0.95);border:1px solid rgba(var(--f-rgb),0.25);border-radius:14px;padding:14px;width:280px;box-shadow:0 16px 48px rgba(0,0,0,0.5),0 0 32px rgba(var(--f-rgb),0.08)}
.fab-popup.open{display:block;animation:fabIn 200ms both}
@keyframes fabIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fab-popup input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(146,188,214,0.14);border-radius:8px;color:#e7f4ff;font-family:"DM Mono",monospace;font-size:13px;padding:10px 12px;outline:none;transition:border-color 0.2s}
.fab-popup input:focus{border-color:var(--f)}
.fab-popup input::placeholder{color:#7b96af}
.fab-popup-label{font-size:11px;color:#7b96af;margin:0 0 8px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
/* ── THEME: COPPER ─── */
[data-theme="copper"]{--bg:#0c0906;--bldg:rgba(24,16,8,0.55);--panel:rgba(30,20,10,0.7);--ink:#fff0d8;--dim:#3a2810;--f-rgb:255,179,71;--f:rgb(var(--f-rgb))}
/* ── THEME: VOID ───── */
[data-theme="void"]{--bg:#000;--bldg:rgba(10,10,10,0.55);--panel:rgba(15,15,15,0.7);--ink:#c0c0c0;--dim:#333;--f-rgb:180,180,180;--f:rgb(var(--f-rgb))}
/* ── BRIGHTNESS: LIGHT ── */
[data-brightness="light"]{--bg:#f6f4f0;--bldg:rgba(240,240,235,0.55);--panel:rgba(255,255,255,0.7);--ink:#1a1a2e;--dim:#c0c0c8}
[data-brightness="light"][data-theme="copper"]{--bg:#faf6f0;--ink:#2a1e10}
[data-brightness="light"][data-theme="void"]{--bg:#f0f0f0;--ink:#111}
@media(prefers-color-scheme:light){[data-brightness="system"]{--bg:#f6f4f0;--bldg:rgba(240,240,235,0.55);--panel:rgba(255,255,255,0.7);--ink:#1a1a2e;--dim:#c0c0c8}}
.gear-toggle{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px;transition:color 0.2s}.gear-toggle:hover{color:var(--ink)}
.gear-popover{display:none;position:absolute;top:42px;right:10px;background:rgba(8,14,22,0.95);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px;z-index:900;backdrop-filter:blur(12px);min-width:220px}
.gear-popover.open{display:block}
.gs-theme-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.gs-theme-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:0.08em;text-transform:uppercase}
.gs-theme-btns{display:flex;gap:4px}
.gs-theme-btn{width:28px;height:28px;border-radius:8px;background:none;border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);transition:all 0.15s}
.gs-theme-btn:hover{border-color:rgba(255,255,255,0.15);color:var(--ink)}
.gs-theme-btn.active{border-color:var(--f);background:rgba(var(--f-rgb),0.1);color:var(--ink)}
.gs-swatch{width:14px;height:14px;border-radius:4px}
</style>
<script src="runtime.config.js"></script>
</head>

    <div class="p-idle" id="pIdle">
      <div class="p-blink">SELECT FLOOR</div>
      <div class="p-ctrls">
        <div class="p-ctrl"><kbd>↑</kbd><kbd>↓</kbd> NAVIGATE</div>
        <div class="p-ctrl"><kbd>⏎</kbd> ACCESS FLOOR</div>

<script>
'use strict';

/* ── Runtime config ──────────────────────── */
var __RT = window.__OPHTXN_RUNTIME || {};
var API_BASE = __RT.apiBase || "http://127.0.0.1:8000";
var APP_BASE = __RT.appBase || "http://127.0.0.1:8797";
var SITE_BASE = __RT.siteUrl || "http://127.0.0.1:8787";

/* ── Floor data ─────────────────────────── */
const FLOORS = [
  {
    num: '06', tag: 'CONTROL', name: 'THE CONTROL ROOM', sub: 'LOCAL HUB',
    desc: 'Everything running, everything visible. Live status, integrations, and real-time system health.',
    feats: ['Personal + Developer modes', '30-second auto-refresh', 'Aurora · Copper · Void themes'],
    href: 'local_hub.html', rgb: '250,50,100', port: 'HUB',
  },
  {
    num: '05', tag: 'SHELL', name: 'THE TERMINAL', sub: 'OPHTXN SHELL',
    desc: 'Direct interface to the operator. Low-latency, session-aware, no friction.',
    feats: ['JetBrains Mono interface', 'Session history + timestamps', 'AbortSignal.timeout(4000)'],
    href: 'ophtxn_shell.html', rgb: '50,215,75', port: ':8797',
  },
  {
    num: '04', tag: 'BRAND', name: 'THE GALLERY', sub: 'BRAND + PRESS',
    desc: 'The face of Ophtxn. Colors, typography, voice standards, downloadable assets.',
    feats: ['Click-to-copy palette', 'SVG logo downloads', 'Brand voice do/don\'ts'],
    href: 'press_kit.html', rgb: '255,188,0', port: 'KIT',
  },
  {
    num: '03', tag: 'BUILD', name: 'THE OFFICE', sub: 'APP STUDIO',
    desc: 'Build, configure, and share agent commands. Your profile, your presets.',
    feats: ['Command builder + presets', 'Agent profile management', 'One-click agent sharing'],
    href: 'official_app.html', rgb: '191,90,242', port: 'APP',
  },
  {
    num: '02', tag: 'LEARN', name: 'THE LIBRARY', sub: 'AI SCHOOL',
    desc: 'Master prompt engineering, hook systems, and agent design. Build operators that think.',
    feats: ['Prompt engineering modules', 'Hook system design', 'Agent architecture patterns'],
    href: 'ai_school.html', rgb: '90,200,250', port: 'EDU',
  },
  {
    num: '01', tag: 'CMD', name: 'THE STUDY', sub: 'COMMAND CENTER',
    desc: 'Direct operator control. Live status, approval gates, and system health.',
    feats: ['Real-time API monitoring', 'Approval queue management', 'Structured event logs'],
    href: (__RT.commandCenterUrl || API_BASE), rgb: '255,159,10', port: ':8000',
  },
  {
    num: 'LB', tag: 'ENTRY', name: 'LOBBY', sub: 'ENTRY HALL',
    desc: 'Main entrance to the Ophtxn operator system. Start here.',
    feats: ['System overview', 'Quick navigation', 'Lead capture'],
    href: 'index.html', rgb: '160,150,140', port: ':8787',
  },
];

/* ── Stars ───────────────────────────────── */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 90; i++) {
  const s = document.createElement('div');
  const px = Math.random() > .8 ? 2 : 1;
  s.style.cssText = `position:absolute;width:${px}px;height:${px}px;
    left:${Math.random()*100}%;top:${Math.random()*65}%;
    border-radius:50%;
    background:rgba(255,255,255,${.15+Math.random()*.5});`;
  starsEl.appendChild(s);
}

/* ── City silhouette ─────────────────────── */
const cityEl = document.getElementById('city');
[
  [38,52],[22,40],[60,88],[28,48],[18,36],[50,74],[34,56],[46,70],
  [26,44],[42,65],[20,34],[52,80],[30,50],[56,84],[24,42],[44,68],
  [32,54],[48,76],[36,58],[58,86],[16,30],[54,82],[40,62],[62,92],
].forEach(([w,h]) => {
  const b = document.createElement('div');
  b.className = 'cb';
  b.style.cssText = `width:${w}px;height:${h}px;`;
  cityEl.appendChild(b);
});

/* ── Build floors ─────────────────────────── */
const buildingEl = document.getElementById('building');
const WIN_TOTAL = 40; // 20 cols × 2 rows

FLOORS.forEach((fl, idx) => {
  const el = document.createElement('div');
  el.className = 'floor';
  el.dataset.idx = idx;
  el.style.setProperty('--f-rgb', fl.rgb);

  const wins = Array.from({length: WIN_TOTAL}, (_, wi) =>
    `<div class="w${Math.random() > .48 ? ' on' : ''}" data-w="${idx}-${wi}"></div>`
  ).join('');

  el.innerHTML = `
    <div class="fl-label">
      <span class="fl-num">${fl.num}</span>
      <span class="fl-tag">${fl.tag}</span>
    </div>
    <div class="wins">${wins}</div>
    <div class="fl-port">
      <span class="port-tag">${fl.port}</span>
      <div class="port-status">
        <span class="port-dot" id="dot${idx}"></span>
        <span id="txt${idx}">—</span>
      </div>
    </div>
    <div class="floor-cursor"></div>
  `;

  el.addEventListener('mouseenter', () => pick(idx));
  el.addEventListener('click', () => go(fl));
  buildingEl.appendChild(el);
});

/* ── Selection ───────────────────────────── */
let cur = null;
const pIdle   = document.getElementById('pIdle');
const pActive = document.getElementById('pActive');
const panel   = document.getElementById('infoPanel');
const pNum    = document.getElementById('pNum');
const pName   = document.getElementById('pName');
const pSub    = document.getElementById('pSub');
const pDesc   = document.getElementById('pDesc');
const pFeats  = document.getElementById('pFeats');
const pEnter  = document.getElementById('pEnter');
const hudLoc  = document.getElementById('hudLoc');

function pick(idx) {
  if (idx === cur) return;
  cur = idx;
  document.querySelectorAll('.floor').forEach((f, i) =>
    f.classList.toggle('sel', i === idx)
  );
  const fl = FLOORS[idx];
  panel.style.setProperty('--a-rgb', fl.rgb);
  pIdle.style.display   = 'none';
  pActive.style.display = 'flex';
  pNum.textContent  = fl.num;
  pName.textContent = fl.name;
  pSub.textContent  = fl.sub;
  pDesc.textContent = fl.desc;
  pFeats.innerHTML  = fl.feats.map(f => `<div class="p-feat">${f}</div>`).join('');
  pEnter.href       = fl.href;
  pEnter.target     = fl.href.startsWith('http://') ? '_blank' : '';
  hudLoc.textContent = `FLOOR ${fl.num}  //  ${fl.name}`;
}

function go(fl) {
  if (fl.href.startsWith('http://') || fl.href.startsWith('https://')) {
    /* Check reachability before opening external services */
    var indicator = document.createElement('div');
    indicator.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(4,7,16,.95);border:1px solid rgba(0,229,196,.3);border-radius:8px;padding:8px 18px;font-family:var(--game);font-size:9px;letter-spacing:.15em;color:var(--ink);z-index:10000;backdrop-filter:blur(12px);';
    indicator.textContent = 'CONNECTING...';
    document.body.appendChild(indicator);
    fetch(fl.href.replace(/\/$/, '') + '/api/status', { signal: AbortSignal.timeout(2500) })
      .then(function () {
        indicator.remove();
        window.open(fl.href, '_blank');
      })
      .catch(function () {
        indicator.style.borderColor = '#ff5c8a';
        indicator.style.color = '#ff5c8a';
        indicator.textContent = 'SERVICE OFFLINE — START SERVER FIRST';
        setTimeout(function () { indicator.remove(); }, 3000);
      });
  } else {
    window.location.href = fl.href;
  }
}

/* ── Keyboard ─────────────────────────────── */
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    pick(cur === null ? 0 : Math.min(FLOORS.length - 1, cur + 1));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    pick(cur === null ? FLOORS.length - 1 : Math.max(0, cur - 1));
  } else if (e.key === 'Enter' && cur !== null) {
    go(FLOORS[cur]);
  } else if (e.key === 'Escape') {
    window.location.href = 'index.html';
  }
});

/* ── Animate windows ─────────────────────── */
setInterval(() => {
  document.querySelectorAll('.w').forEach(w => {
    if (Math.random() > .93) w.classList.toggle('on');
  });
}, 1100);

/* ── Net / status check ───────────────────── */
(async () => {
  const netEl  = document.getElementById('netStat');
  const dot5   = document.getElementById('dot5');  // The Study (index 5)
  const txt5   = document.getElementById('txt5');
  try {
    const res = await fetch(API_BASE + '/api/status', {
      signal: AbortSignal.timeout(3000)
    });
    if (res.ok) {
      netEl.textContent = 'ONLINE';
      netEl.className   = 'stat-val live';
      if (dot5) { dot5.style.background = '#00e5c4'; dot5.style.boxShadow = '0 0 5px #00e5c4'; }
      if (txt5) txt5.textContent = 'LIVE';
    } else {
      netEl.textContent = 'PARTIAL';
      netEl.className   = 'stat-val warn';
    }
  } catch {
    netEl.textContent = 'OFFLINE';
    netEl.className   = 'stat-val dead';
    if (dot5) { dot5.style.background = '#ff5c8a'; }
    if (txt5) txt5.textContent = 'OFFL';
  }
})();
</script>
<script>
  /* SITE THEME */
  (function(){
    var TK='ophtxn_site_theme',BK='ophtxn_site_brightness';
    var gear=document.getElementById('gearToggle'),pop=document.getElementById('gearPopover');
    function gt(){try{return localStorage.getItem(TK)||'aurora';}catch(e){return 'aurora';}}
    function gb(){try{return localStorage.getItem(BK)||'dark';}catch(e){return 'dark';}}
    function apply(){var t=gt(),b=gb();document.body.dataset.theme=t;document.body.dataset.brightness=b;document.querySelectorAll('.gs-theme-btn[data-color]').forEach(function(btn){btn.classList.toggle('active',btn.dataset.color===t);});document.querySelectorAll('.gs-theme-btn[data-bright]').forEach(function(btn){btn.classList.toggle('active',btn.dataset.bright===b);});}
    apply();
    if(gear&&pop){gear.addEventListener('click',function(e){e.stopPropagation();pop.classList.toggle('open');});document.addEventListener('click',function(e){if(!pop.contains(e.target)&&e.target!==gear)pop.classList.remove('open');});}
    var cE=document.getElementById('gsThemeColor'),bE=document.getElementById('gsThemeBright');
    if(cE)cE.addEventListener('click',function(e){var btn=e.target.closest('.gs-theme-btn');if(!btn||!btn.dataset.color)return;try{localStorage.setItem(TK,btn.dataset.color);}catch(x){}apply();});
    if(bE)bE.addEventListener('click',function(e){var btn=e.target.closest('.gs-theme-btn');if(!btn||!btn.dataset.bright)return;try{localStorage.setItem(BK,btn.dataset.bright);}catch(x){}apply();});
    window.addEventListener('storage',function(e){if(e.key===TK||e.key===BK)apply();});
  })();
</script>
<!-- SHARED: FAB BOT -->
<div class="fab-bot" id="fabBot" title="Ask Ophtxn">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
</div>
<div class="fab-popup" id="fabPopup">
  <p class="fab-popup-label">Ask Ophtxn</p>
  <input type="text" id="fabInput" placeholder="Type a question&hellip;" autocomplete="off">
</div>

<script>
/* SHARED: FAB BOT */
(function(){
  var fabBot=document.getElementById('fabBot'),fabPopup=document.getElementById('fabPopup'),fabInput=document.getElementById('fabInput');
  if(!fabBot)return;
  var fabDragging=false,fabDragStart={x:0,y:0},fabPos={x:0,y:0};
  try{var sp=JSON.parse(localStorage.getItem('ophtxn_fab_pos'));if(sp&&typeof sp.right==='number'){fabBot.style.right=sp.right+'px';fabBot.style.bottom=sp.bottom+'px';fabPopup.style.right=sp.right+'px';fabPopup.style.bottom=(sp.bottom+68)+'px';}}catch(_){}
  fabBot.addEventListener('click',function(){if(fabDragging)return;if(fabPopup){fabPopup.classList.toggle('open');if(fabPopup.classList.contains('open')&&fabInput)setTimeout(function(){fabInput.focus();},100);}});
  var startDrag=function(sx,sy){fabDragging=false;var r=fabBot.getBoundingClientRect();fabDragStart={x:sx,y:sy};fabPos={right:window.innerWidth-r.right,bottom:window.innerHeight-r.bottom};
    var moved=function(mx,my){var dx=mx-fabDragStart.x,dy=my-fabDragStart.y;if(Math.abs(dx)>4||Math.abs(dy)>4)fabDragging=true;if(!fabDragging)return;var nr=Math.max(8,Math.min(fabPos.right-dx,window.innerWidth-64)),nb=Math.max(8,Math.min(fabPos.bottom-dy,window.innerHeight-64));fabBot.style.right=nr+'px';fabBot.style.bottom=nb+'px';fabPopup.style.right=nr+'px';fabPopup.style.bottom=(nb+68)+'px';};
    var end=function(){document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',end);document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',end);if(fabDragging){try{localStorage.setItem('ophtxn_fab_pos',JSON.stringify({right:parseInt(fabBot.style.right),bottom:parseInt(fabBot.style.bottom)}));}catch(_){}setTimeout(function(){fabDragging=false;},50);}};
    var mm=function(e){moved(e.clientX,e.clientY);};var tm=function(e){if(e.touches.length===1){moved(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',end);document.addEventListener('touchmove',tm,{passive:false});document.addEventListener('touchend',end);
  };
  fabBot.addEventListener('mousedown',function(e){startDrag(e.clientX,e.clientY);});
  fabBot.addEventListener('touchstart',function(e){if(e.touches.length===1)startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  if(fabInput)fabInput.addEventListener('keydown',function(e){if(e.key==='Enter'){var q=fabInput.value.trim();if(q)window.location.href='ophtxn_shell.html?q='+encodeURIComponent(q);}});
})();
</script>
