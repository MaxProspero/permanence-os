<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a1118">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<title>OPHTXN TOWER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #020406;
  --bldg:  #05080e;
  --panel: #040710;
  --ink:   #8aaac8;
  --dim:   #1e2e42;
  --game:  'Orbitron', 'DM Mono', monospace;
  --mono:  'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }

body {
  color: var(--ink);
  font-family: var(--mono);
  display: flex;
  flex-direction: column;
}

/* ── SCANLINES ────────────────────────── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 500;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
  );
  pointer-events: none;
}

/* ── HUD TOP ──────────────────────────── */
.hud-top {
  height: 42px; flex-shrink: 0; z-index: 20; position: relative;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid rgba(var(--f-rgb),.1);
  background: rgba(2,4,6,.95);
}

.hud-brand {
  font-family: var(--game); font-size: 11px; font-weight: 700;
  letter-spacing: .28em; color: var(--f); text-decoration: none;
}

.hud-sep  { color: var(--dim); margin: 0 10px; }

.hud-title {
  font-family: var(--game); font-size: 8px;
  letter-spacing: .3em; color: var(--dim);
}

.hud-left, .hud-right { display: flex; align-items: center; }

.hud-stat {
  font-family: var(--game); font-size: 7.5px;
  letter-spacing: .2em; color: var(--dim); margin-left: 20px;
}

.stat-val       { color: var(--ink); margin-left: 5px; }
.stat-val.live  { color: var(--f); animation: glow-blink 2s infinite; }
.stat-val.warn  { color: #f8c842; }
.stat-val.dead  { color: #ff5c8a; }

@keyframes glow-blink {
  0%,100% { opacity: 1; } 50% { opacity: .35; }
}

/* ── MAIN AREA ────────────────────────── */
.main {
  flex: 1; display: flex; flex-direction: column;
  position: relative; z-index: 5; overflow: hidden;
}

/* ── STARS ────────────────────────────── */
.stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ── MOON ─────────────────────────────── */
.moon {
  position: fixed;
  top: 10%; right: 8%;
  width: 90px; height: 90px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 35%,
    rgba(255,255,230,1),
    rgba(240,235,210,.85) 30%,
    rgba(210,205,185,.5) 55%,
    rgba(160,155,140,.15) 75%,
    transparent 100%
  );
  box-shadow:
    0 0 30px rgba(255,255,230,.25),
    0 0 60px rgba(255,255,220,.12),
    0 0 120px rgba(255,255,200,.06),
    0 0 200px rgba(255,255,200,.03);
  z-index: 1;
  pointer-events: none;
}

/* Moon craters / surface detail */
.moon::before {
  content: '';
  position: absolute;
  top: 22px; left: 28px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: rgba(0,0,0,.06);
  box-shadow:
    -18px 10px 0 6px rgba(0,0,0,.04),
    10px 18px 0 4px rgba(0,0,0,.05),
    -8px -5px 0 3px rgba(0,0,0,.03),
    22px 2px 0 2px rgba(0,0,0,.025);
}

/* Moon atmospheric halo */
.moon::after {
  content: '';
  position: absolute;
  inset: -50px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(255,255,230,.08) 0%,
    rgba(255,255,230,.03) 40%,
    transparent 65%
  );
}

/* Adjust moon for light mode */
[data-brightness="light"] .moon {
  opacity: 0.2;
}

/* ── SHOOTING STARS ───────────────────── */
.shooting-star {
  position: fixed;
  width: 100px; height: 2px;
  background: linear-gradient(90deg,
    rgba(255,255,255,.9),
    rgba(200,220,255,.5) 20%,
    rgba(180,200,255,.2) 50%,
    transparent 100%
  );
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  transform-origin: left center;
  filter: blur(0.3px);
}

.shooting-star::before {
  content: '';
  position: absolute;
  left: -1px; top: -2px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,1);
  box-shadow:
    0 0 8px rgba(255,255,255,.8),
    0 0 16px rgba(200,220,255,.4);
}

/* Faint secondary trail */
.shooting-star::after {
  content: '';
  position: absolute;
  left: 0; top: -1px;
  width: 140%; height: 4px;
  background: linear-gradient(90deg,
    rgba(200,220,255,.15),
    transparent 60%
  );
  filter: blur(2px);
}

@keyframes shoot {
  0%   { opacity: 0; transform: translateX(0) translateY(0); }
  3%   { opacity: 1; }
  60%  { opacity: .7; }
  100% { opacity: 0; transform: translateX(350px) translateY(200px); }
}

/* ── CITY FOG / ATMOSPHERE ───────────── */
.city-fog {
  position: fixed;
  bottom: 38px; left: 0; right: 0;
  height: 180px;
  background: linear-gradient(to top,
    rgba(var(--f-rgb), .025) 0%,
    rgba(var(--f-rgb), .01) 40%,
    transparent 100%
  );
  z-index: 2;
  pointer-events: none;
}

/* ── DISTANT SKYLINE (background layer) ─ */
.far-skyline {
  position: fixed;
  bottom: 38px; left: 0; right: 0;
  height: 180px;
  z-index: 1;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  pointer-events: none;
  opacity: .3;
}

.far-bldg {
  background: linear-gradient(to top,
    rgba(var(--f-rgb), .03),
    var(--bldg) 30%
  );
  border-top: 1px solid rgba(var(--f-rgb), .08);
  flex-shrink: 0;
  position: relative;
}

/* Tiny windows on far buildings */
.far-bldg::after {
  content: '';
  position: absolute; inset: 3px 2px;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 4px,
    rgba(var(--f-rgb), .05) 4px,
    rgba(var(--f-rgb), .05) 5px
  ),
  repeating-linear-gradient(
    90deg,
    transparent,
    transparent 5px,
    rgba(var(--f-rgb), .04) 5px,
    rgba(var(--f-rgb), .04) 6px
  );
}

/* ── HORIZON GLOW ────────────────────── */
.horizon-glow {
  position: fixed;
  bottom: 38px; left: 0; right: 0;
  height: 250px;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(ellipse 120% 80% at 50% 100%,
    rgba(var(--f-rgb), .04) 0%,
    rgba(var(--f-rgb), .015) 40%,
    transparent 70%
  );
}

/* ── STREET REFLECTIONS ─────────────── */
.street-reflect {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 38px;
  z-index: 0;
  pointer-events: none;
  background: linear-gradient(to bottom,
    rgba(var(--f-rgb), .02),
    transparent
  );
  overflow: hidden;
}

.street-reflect::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 5%,
    rgba(var(--f-rgb), .06) 20%,
    rgba(var(--f-rgb), .08) 50%,
    rgba(var(--f-rgb), .06) 80%,
    transparent 95%
  );
}

/* ── STAR TWINKLE ─────────────────────── */
.star-bright {
  animation: twinkle 3s ease-in-out infinite alternate;
}

@keyframes twinkle {
  0%   { opacity: .3; }
  50%  { opacity: 1; }
  100% { opacity: .3; }
}

/* ── SKYLINE CONTAINER ───────────────── */
.skyline-wrap {
  flex: 1; display: flex; align-items: flex-end;
  justify-content: center; padding: 0 24px 0;
  position: relative; z-index: 5;
}

.skyline {
  display: flex; align-items: flex-end;
  gap: 6px;
  padding-bottom: 0;
  position: relative;
}

/* ── GROUND LINE ─────────────────────── */
.ground-line {
  position: absolute; bottom: 0; left: -40px; right: -40px;
  height: 2px;
  background: linear-gradient(90deg,
    transparent,
    rgba(var(--f-rgb),.15) 20%,
    rgba(var(--f-rgb),.15) 80%,
    transparent
  );
}

.ground-glow {
  position: absolute; bottom: 0; left: -40px; right: -40px;
  height: 30px;
  background: linear-gradient(to top,
    rgba(var(--f-rgb),.04),
    transparent
  );
  pointer-events: none;
}

/* ── BUILDING ────────────────────────── */
.bldg {
  position: relative;
  display: flex; flex-direction: column;
  cursor: pointer;
  transition: transform .2s;
}

.bldg:hover { transform: translateY(-3px); }
.bldg.sel   { transform: translateY(-5px); }

/* Building body */
.bldg-body {
  position: relative;
  background: var(--bldg);
  border: 1px solid rgba(var(--b-rgb, 255,255,255), .12);
  border-bottom: none;
  overflow: hidden;
  transition: border-color .25s, box-shadow .25s;
}

.bldg:hover .bldg-body {
  border-color: rgba(var(--b-rgb), .35);
  box-shadow:
    0 0 20px rgba(var(--b-rgb), .08),
    inset 0 0 40px rgba(var(--b-rgb), .03);
}

.bldg.sel .bldg-body {
  border-color: rgba(var(--b-rgb), .55);
  box-shadow:
    0 0 35px rgba(var(--b-rgb), .15),
    inset 0 0 60px rgba(var(--b-rgb), .05);
}

/* Structural vertical lines inside buildings */
.bldg-body::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 20px,
    rgba(255,255,255,.012) 20px,
    rgba(255,255,255,.012) 21px
  );
  pointer-events: none; z-index: 0;
}

/* Roof accent line */
.bldg-roof {
  height: 3px;
  background: linear-gradient(90deg,
    rgba(var(--b-rgb), .5),
    rgba(var(--b-rgb), .15)
  );
  transition: background .25s;
}

.bldg.sel .bldg-roof,
.bldg:hover .bldg-roof {
  background: linear-gradient(90deg,
    rgba(var(--b-rgb), .9),
    rgba(var(--b-rgb), .3)
  );
}

/* Antenna / spire on Control Room */
.bldg-spire {
  width: 2px; height: 24px;
  background: linear-gradient(to top,
    rgba(var(--b-rgb), .3),
    rgba(var(--b-rgb), .8)
  );
  margin: 0 auto;
  position: relative;
}

.bldg-spire::after {
  content: '';
  position: absolute; top: -3px; left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(var(--b-rgb), 1);
  box-shadow: 0 0 10px rgba(var(--b-rgb), .9);
  animation: glow-blink 1.2s infinite;
}

/* Base / foundation */
.bldg-base {
  height: 6px;
  background: rgba(var(--b-rgb), .08);
  border-left: 1px solid rgba(var(--b-rgb), .1);
  border-right: 1px solid rgba(var(--b-rgb), .1);
  border-bottom: 1px solid rgba(var(--b-rgb), .15);
}

/* ── WINDOW GRID ─────────────────────── */
.win-grid {
  display: grid;
  gap: 2px;
  padding: 6px 5px;
  position: relative; z-index: 1;
}

.win {
  height: 6px;
  background: rgba(var(--b-rgb), .06);
  border: 1px solid rgba(var(--b-rgb), .08);
  transition: background .5s, box-shadow .5s;
}

.win.on {
  background: rgba(var(--b-rgb), .18);
  box-shadow: 0 0 3px rgba(var(--b-rgb), .12);
}

.win.lit {
  background: rgba(var(--b-rgb), .7);
  box-shadow: 0 0 6px rgba(var(--b-rgb), .5);
  transition: background .15s, box-shadow .15s;
}

/* ── BUILDING LABEL ──────────────────── */
.bldg-label {
  position: absolute; bottom: -20px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--game); font-size: 6px;
  letter-spacing: .15em; color: rgba(var(--b-rgb), .3);
  white-space: nowrap;
  transition: color .2s, opacity .2s;
  text-align: center;
  pointer-events: none;
}

.bldg:hover .bldg-label,
.bldg.sel .bldg-label {
  color: rgba(var(--b-rgb), .85);
}

/* ── INFO PANEL (Overlay popover) ────── */
.info-panel {
  position: fixed; z-index: 100;
  width: 280px;
  background: rgba(4,7,16,.92);
  border: 1px solid rgba(var(--a-rgb, 255,255,255), .2);
  padding: 16px 18px;
  display: none; flex-direction: column; gap: 12px;
  backdrop-filter: blur(16px);
  pointer-events: auto;
  transform: translateX(-50%);
}

.info-panel.open {
  display: flex;
  animation: panelIn .2s ease both;
}

@keyframes panelIn {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* Corner brackets */
.info-panel::before, .info-panel::after {
  content: ''; position: absolute;
  width: 12px; height: 12px;
  border-color: rgba(var(--a-rgb),.35); border-style: solid;
}
.info-panel::before { top: -1px;    left: -1px;  border-width: 2px 0 0 2px; }
.info-panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

.panel-sys {
  font-family: var(--game); font-size: 7.5px;
  letter-spacing: .28em; color: rgba(var(--a-rgb),.35);
  text-transform: uppercase;
}

.p-floor-num {
  font-family: var(--game); font-size: 36px; font-weight: 900;
  color: rgba(var(--a-rgb), .9); line-height: 1;
  text-shadow: 0 0 24px rgba(var(--a-rgb), .4);
}

.p-name {
  font-family: var(--game); font-size: 10px; font-weight: 700;
  letter-spacing: .08em; color: #d8eaff; line-height: 1.3;
}

.p-sub {
  font-family: var(--game); font-size: 7px;
  letter-spacing: .25em; color: rgba(var(--a-rgb), .55);
  text-transform: uppercase;
}

.p-hr { height: 1px; background: rgba(var(--a-rgb), .2); }

.p-desc {
  font-size: 11px; line-height: 1.65;
  color: rgba(138,170,200,.55); font-style: italic;
}

.p-feats { display: flex; flex-direction: column; gap: 5px; }

.p-feat {
  font-family: var(--game); font-size: 7px;
  letter-spacing: .1em; color: var(--dim);
  display: flex; align-items: center; gap: 6px;
}

.p-feat::before {
  content: '\25B8';
  color: rgba(var(--a-rgb), .65); flex-shrink: 0;
}

.p-enter {
  display: block; text-align: center; padding: 10px;
  border: 1px solid rgba(var(--a-rgb), .45);
  color: rgba(var(--a-rgb), 1);
  font-family: var(--game); font-size: 9px; letter-spacing: .2em;
  text-decoration: none; text-transform: uppercase;
  position: relative; overflow: hidden;
  transition: background .25s, color .25s;
  margin-top: 4px;
  animation: enter-pulse 2.2s infinite;
}

@keyframes enter-pulse {
  0%,100% { box-shadow: 0 0 0px rgba(var(--a-rgb), 0); }
  50%      { box-shadow: 0 0 14px rgba(var(--a-rgb), .35); }
}

.p-enter::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(var(--a-rgb), 1);
  transform: scaleX(0); transform-origin: left;
  transition: transform .3s ease;
}

.p-enter:hover { color: #020406; }
.p-enter:hover::before { transform: scaleX(1); }
.p-enter span { position: relative; }

/* ── HUD BOTTOM ───────────────────────── */
.hud-bottom {
  height: 38px; flex-shrink: 0; z-index: 20; position: relative;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  border-top: 1px solid rgba(var(--f-rgb),.07);
  background: rgba(2,4,6,.95);
}

.hud-ctrl {
  font-family: var(--game); font-size: 7px;
  letter-spacing: .18em; color: var(--dim);
}

.hud-ctrl kbd {
  font-family: var(--game); font-size: 7px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.09);
  padding: 1px 5px; margin-right: 3px;
  color: rgba(255,255,255,.35);
}

.hud-loc {
  font-family: var(--game); font-size: 8px;
  letter-spacing: .2em; color: rgba(var(--f-rgb),.45);
}

/* -- FAB BOT -- */
.fab-bot{position:fixed;bottom:28px;right:28px;z-index:9500;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(var(--f-rgb),0.2),rgba(var(--f-rgb),0.08));border:1px solid rgba(var(--f-rgb),0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 24px rgba(var(--f-rgb),0.2),0 8px 32px rgba(0,0,0,0.4);transition:box-shadow 0.3s,transform 0.2s;user-select:none;touch-action:none}
.fab-bot:hover{box-shadow:0 0 36px rgba(var(--f-rgb),0.35),0 8px 32px rgba(0,0,0,0.4);transform:scale(1.05)}
.fab-bot svg{color:var(--f);pointer-events:none}
.fab-popup{display:none;position:fixed;bottom:96px;right:28px;z-index:9501;background:rgba(10,18,30,0.95);border:1px solid rgba(var(--f-rgb),0.25);border-radius:14px;padding:14px;width:280px;box-shadow:0 16px 48px rgba(0,0,0,0.5),0 0 32px rgba(var(--f-rgb),0.08)}
.fab-popup.open{display:block;animation:fabIn 200ms both}
@keyframes fabIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fab-popup input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(146,188,214,0.14);border-radius:8px;color:#e7f4ff;font-family:"DM Mono",monospace;font-size:13px;padding:10px 12px;outline:none;transition:border-color 0.2s}
.fab-popup input:focus{border-color:var(--f)}
.fab-popup input::placeholder{color:#7b96af}
.fab-popup-label{font-size:11px;color:#7b96af;margin:0 0 8px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
/* ── THEME: COPPER ─── */
[data-theme="copper"]{--bg:#0c0906;--bldg:rgba(24,16,8,0.55);--panel:rgba(30,20,10,0.7);--ink:#fff0d8;--dim:#3a2810;--f-rgb:255,179,71;--f:rgb(var(--f-rgb))}
/* ── THEME: VOID ───── */
[data-theme="void"]{--bg:#000;--bldg:rgba(10,10,10,0.55);--panel:rgba(15,15,15,0.7);--ink:#c0c0c0;--dim:#333;--f-rgb:180,180,180;--f:rgb(var(--f-rgb))}
/* ── THEME: OCEAN ──── */
[data-theme="ocean"]{--bg:#060810;--bldg:rgba(8,14,30,0.55);--panel:rgba(12,20,40,0.7);--ink:#e0f0ff;--dim:#304868;--f-rgb:74,158,255;--f:rgb(var(--f-rgb))}
/* ── THEME: ROSE ───── */
[data-theme="rose"]{--bg:#100608;--bldg:rgba(24,10,14,0.55);--panel:rgba(30,14,20,0.7);--ink:#ffe7ef;--dim:#683040;--f-rgb:255,92,138;--f:rgb(var(--f-rgb))}
/* ── THEME: VIOLET ─── */
[data-theme="violet"]{--bg:#0a0610;--bldg:rgba(16,10,28,0.55);--panel:rgba(22,14,36,0.7);--ink:#f0e7ff;--dim:#483068;--f-rgb:155,109,255;--f:rgb(var(--f-rgb))}
/* ── THEME: FOREST ─── */
[data-theme="forest"]{--bg:#061008;--bldg:rgba(10,22,14,0.55);--panel:rgba(14,28,18,0.7);--ink:#e0ffe7;--dim:#286838;--f-rgb:61,220,132;--f:rgb(var(--f-rgb))}
/* ── THEME: SOLAR ──── */
[data-theme="solar"]{--bg:#100e06;--bldg:rgba(24,20,8,0.55);--panel:rgba(30,24,12,0.7);--ink:#fff8e0;--dim:#685828;--f-rgb:255,215,0;--f:rgb(var(--f-rgb))}
/* ── THEME: CRIMSON ── */
[data-theme="crimson"]{--bg:#100606;--bldg:rgba(24,10,10,0.55);--panel:rgba(30,14,14,0.7);--ink:#ffe0e0;--dim:#683030;--f-rgb:255,68,68;--f:rgb(var(--f-rgb))}
/* ── THEME: FROST ──── */
[data-theme="frost"]{--bg:#060e10;--bldg:rgba(10,20,24,0.55);--panel:rgba(14,26,30,0.7);--ink:#e8f8ff;--dim:#305058;--f-rgb:136,216,245;--f:rgb(var(--f-rgb))}
/* ── BRIGHTNESS: LIGHT ── */
[data-brightness="light"]{--bg:#f6f4f0;--bldg:rgba(240,240,235,0.55);--panel:rgba(255,255,255,0.7);--ink:#1a1a2e;--dim:#c0c0c8}

const SKYLINE_ORDER = [6, 5, 4, 3, 2, 1, 0];

const BLDG_SHAPES = {

/* Layer 1: dim distant stars */

for (var i = 0; i < 60; i++) {

}

for (var i = 0; i < 15; i++) {

  s.style.cssText = 'position:absolute;width:3px;height:3px;' +
    'left:' + (Math.random()*100) + '%;top:' + (Math.random()*40) + '%;' +

  s.style.animationDelay = (Math.random()*5) + 's';
  s.style.animationDuration = (2+Math.random()*3) + 's';
  starsEl.appendChild(s);
}

/* ── Shooting Stars ─────────────────────── */
var shootContainer = document.getElementById('shootingStars');
function launchShootingStar() {
  var star = document.createElement('div');
  star.className = 'shooting-star';
  /* Random start position in upper portion */
  var startX = Math.random() * 70;
  var startY = 5 + Math.random() * 30;
  /* Random angle between 15-45 degrees */
  var angle = 15 + Math.random() * 30;
  /* Random length */
  var len = 60 + Math.random() * 80;
  star.style.cssText += 'left:' + startX + '%;top:' + startY + '%;' +
    'width:' + len + 'px;' +
    'transform:rotate(' + angle + 'deg);';
  star.style.animation = 'shoot ' + (.6+Math.random()*.6) + 's ease-out forwards';
  shootContainer.appendChild(star);
  setTimeout(function() { star.remove(); }, 1500);

/* ── Render text bitmap into a cols x rows grid ─
   Returns an array of booleans (true = lit) for the full grid.
   Text is centered vertically and horizontally in the grid.
   Uses 3x5 compact pixel font (CHAR_W = 3).
*/
function renderTextBitmap(text, cols, rows) {
  var result = new Array(cols * rows).fill(false);
  text = text.toUpperCase();

  /* Each character is CHAR_W wide, 1 col gap between chars */
  var gap = 1;
  var totalW = text.length * CHAR_W + (text.length - 1) * gap;
  var totalH = 5;

  /* If text is too wide or tall for the grid, skip */
  if (totalW > cols || totalH > rows) return result;

  var startX = Math.floor((cols - totalW) / 2);
  var startY = Math.floor((rows - totalH) / 2);

  for (var ci = 0; ci < text.length; ci++) {
    var ch = text[ci];
    var bitmap = PIXEL_FONT[ch];
    if (!bitmap) continue;
    var ox = startX + ci * (CHAR_W + gap);
    for (var row = 0; row < 5; row++) {
      for (var col = 0; col < CHAR_W; col++) {
        if (bitmap[row * CHAR_W + col]) {
          var gx = ox + col;
          var gy = startY + row;
          if (gx >= 0 && gx < cols && gy >= 0 && gy < rows) {
            result[gy * cols + gx] = true;
          }
        }
      }
    }
  }
  return result;
}

/* ── Selection / Info Panel ─────────────── */
var cur = null;
var panel   = document.getElementById('infoPanel');
var pNum    = document.getElementById('pNum');
var pName   = document.getElementById('pName');
var pSub    = document.getElementById('pSub');
var pDesc   = document.getElementById('pDesc');
var pFeats  = document.getElementById('pFeats');
var pEnter  = document.getElementById('pEnter');
var hudLoc  = document.getElementById('hudLoc');

function pick(flIdx) {
  if (flIdx === cur) return;
  cur = flIdx;

  /* Update building selection state */
  bldgEls.forEach(function(b) {
    b.el.classList.toggle('sel', b.floorIdx === flIdx);
  });

  var fl = FLOORS[flIdx];
  panel.style.setProperty('--a-rgb', fl.rgb);

  pNum.textContent  = fl.num;
  pName.textContent = fl.name;
  pSub.textContent  = fl.sub;
  pDesc.textContent = fl.desc;
  pFeats.innerHTML  = fl.feats.map(function(f) { return '<div class="p-feat">' + f + '</div>'; }).join('');
  pEnter.href       = fl.href;
  pEnter.target     = fl.href.startsWith('http://') ? '_blank' : '';
  hudLoc.textContent = 'FLOOR ' + fl.num + '  //  ' + fl.name;

  /* Position the info panel above the selected building */
  var selBldg = bldgEls.find(function(b) { return b.floorIdx === flIdx; });
  if (selBldg) {
    var rect = selBldg.el.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var topY = rect.top - 12;

    panel.classList.add('open');
    panel.style.left = cx + 'px';
    panel.style.bottom = (window.innerHeight - topY) + 'px';
    panel.style.top = 'auto';

    /* Keep panel on screen */
    requestAnimationFrame(function() {
      var pr = panel.getBoundingClientRect();
      if (pr.left < 8) {
        panel.style.left = (pr.width / 2 + 8) + 'px';
      }
      if (pr.right > window.innerWidth - 8) {
        panel.style.left = (window.innerWidth - pr.width / 2 - 8) + 'px';
      }
      if (pr.top < 50) {
        panel.style.bottom = 'auto';
        panel.style.top = '50px';
      }
    });
  }
}

function closePanel() {
  cur = null;
  panel.classList.remove('open');
  bldgEls.forEach(function(b) { b.el.classList.remove('sel'); });
  hudLoc.textContent = '\u2014';
}

function go(fl) {
  if (fl.href.startsWith('http://') || fl.href.startsWith('https://')) {
    var indicator = document.createElement('div');
    indicator.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(4,7,16,.95);border:1px solid rgba(0,229,196,.3);border-radius:8px;padding:8px 18px;font-family:var(--game);font-size:9px;letter-spacing:.15em;color:var(--ink);z-index:10000;backdrop-filter:blur(12px);';
    indicator.textContent = 'CONNECTING...';
    document.body.appendChild(indicator);
    fetch(fl.href.replace(/\/$/, '') + '/api/status', { signal: AbortSignal.timeout(2500) })
      .then(function () {
        indicator.remove();
        window.open(fl.href, '_blank');
      })
      .catch(function () {
        indicator.style.borderColor = '#ff5c8a';
        indicator.style.color = '#ff5c8a';
        indicator.textContent = 'SERVICE OFFLINE \u2014 START SERVER FIRST';
        setTimeout(function () { indicator.remove(); }, 3000);
      });
  } else {
    window.location.href = fl.href;
  }
}

/* ── Keyboard ─────────────────────────────── */
/* Map skyline visual order to floor indices */
function getSkylineIdx(flIdx) {
  return SKYLINE_ORDER.indexOf(flIdx);
}

window.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (cur === null) {
      pick(SKYLINE_ORDER[0]);
    } else {
      var si = getSkylineIdx(cur);
      if (si < SKYLINE_ORDER.length - 1) {
        pick(SKYLINE_ORDER[si + 1]);
      }
    }
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (cur === null) {
      pick(SKYLINE_ORDER[SKYLINE_ORDER.length - 1]);
    } else {
      var si = getSkylineIdx(cur);
      if (si > 0) {
        pick(SKYLINE_ORDER[si - 1]);
      }
    }
  } else if (e.key === 'Enter' && cur !== null) {
    go(FLOORS[cur]);
  } else if (e.key === 'Escape') {
    if (cur !== null) {
      closePanel();
    } else {
      window.location.href = 'index.html';
    }
  }
});

/* Close panel on clicking outside */
document.addEventListener('click', function(e) {
  if (cur !== null && !e.target.closest('.bldg') && !e.target.closest('.info-panel')) {
    closePanel();
  }
});

/* ── Window animation: flicker + text messages ─ */
var FLICKER_INTERVAL = 900;
var TEXT_SHOW_DURATION = 1800;
var TEXT_CYCLE_INTERVAL = 3500;

/* Random flicker */
setInterval(function() {
  bldgEls.forEach(function(b) {
    if (b.showingText) return;
    b.winEls.forEach(function(w) {
      if (Math.random() > .92) {
        w.classList.toggle('on');
      }
    });
  });
}, FLICKER_INTERVAL);

/* Text message cycle */
function showBuildingText(b) {
  var msgs = BLDG_MESSAGES[b.floorIdx];
  if (!msgs || msgs.length === 0) return;

  var msg = msgs[b.msgIndex % msgs.length];
  b.msgIndex++;

  var bitmap = renderTextBitmap(msg, b.shape.cols, b.shape.rows);

  /* Light up text pixels */
  b.showingText = true;
  b.winEls.forEach(function(w, idx) {
    if (bitmap[idx]) {
      w.classList.add('lit');
      w.classList.remove('on');
    } else {
      w.classList.remove('lit');
      /* Dim non-text windows slightly */
      if (Math.random() > .7) {
        w.classList.remove('on');
      }
    }
  });

  /* After duration, return to flicker */
  setTimeout(function() {
    b.showingText = false;
    b.winEls.forEach(function(w) {
      w.classList.remove('lit');
      /* Restore some random on states */
      if (Math.random() > .55) {
        w.classList.add('on');
      } else {
        w.classList.remove('on');
      }
    });
  }, TEXT_SHOW_DURATION);
}

/* Stagger text cycles for each building */
bldgEls.forEach(function(b, i) {
  /* Initial delay stagger so they don't all fire at once */
  setTimeout(function() {
    showBuildingText(b);
    setInterval(function() {
      showBuildingText(b);
    }, TEXT_CYCLE_INTERVAL);
  }, 800 + i * 500);
});

/* ── Net / status check ───────────────────── */
(async function() {
  var netEl = document.getElementById('netStat');
  try {
    var res = await fetch(API_BASE + '/api/status', {
      signal: AbortSignal.timeout(3000)
    });
    if (res.ok) {
      netEl.textContent = 'ONLINE';
      netEl.className   = 'stat-val live';
    } else {
      netEl.textContent = 'PARTIAL';
      netEl.className   = 'stat-val warn';
    }
  } catch(e) {
    netEl.textContent = 'OFFLINE';
    netEl.className   = 'stat-val dead';
  }
})();

<script>
  /* SHARED: SITE THEME */
  (function(){
    var TK='ophtxn_site_theme',BK='ophtxn_site_brightness',CK='ophtxn_site_custom';
    var gear=document.getElementById('gearToggle'),pop=document.getElementById('gearPopover');
    function gt(){try{return localStorage.getItem(TK)||'aurora';}catch(e){return 'aurora';}}
    function gb(){try{return localStorage.getItem(BK)||'dark';}catch(e){return 'dark';}}
    function gc(){try{return localStorage.getItem(CK)||'#00e5c4';}catch(e){return '#00e5c4';}}
    function hexToRgb(h){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return r+','+g+','+b;}
    function applyCustom(hex){
      var el=document.getElementById('customThemeStyle');
      if(!el){el=document.createElement('style');el.id='customThemeStyle';document.head.appendChild(el);}
      var rgb=hexToRgb(hex);
      var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      var darkBg='#'+('0'+Math.round(r*.02).toString(16)).slice(-2)+('0'+Math.round(g*.02).toString(16)).slice(-2)+('0'+Math.round(b*.02).toString(16)).slice(-2);
      el.textContent='[data-theme="custom"]{--bg:'+darkBg+';--bldg:rgba('+Math.round(r*.08)+','+Math.round(g*.08)+','+Math.round(b*.08)+',0.55);--panel:rgba('+Math.round(r*.1)+','+Math.round(g*.1)+','+Math.round(b*.1)+',0.7);--ink:#e8f0ff;--dim:#2e3d5c;--f-rgb:'+rgb+';--f:rgb(var(--f-rgb))}[data-brightness="light"][data-theme="custom"]{--bg:#f6f4f0;--bldg:rgba(240,240,235,0.55);--panel:rgba(255,255,255,0.7);--ink:#1a1a2e;--dim:#c0c0c8}';
      var ci=document.getElementById('gsCustomColor');if(ci)ci.value=hex;
      var cd=document.querySelector('.gs-color-custom');if(cd)cd.style.background='conic-gradient(from 0deg,'+hex+','+hex+')';
    }
    function apply(){
      var t=gt(),b=gb();
      document.body.dataset.theme=t;document.body.dataset.brightness=b;
      if(t==='custom')applyCustom(gc());
      else{var el=document.getElementById('customThemeStyle');if(el)el.textContent='';}
      document.querySelectorAll('.gs-color-dot[data-color]').forEach(function(btn){btn.classList.toggle('active',btn.dataset.color===t);});
      document.querySelectorAll('.gs-bright-btn[data-bright]').forEach(function(btn){btn.classList.toggle('active',btn.dataset.bright===b);});
    }
    apply();
    if(gear&&pop){gear.addEventListener('click',function(e){e.stopPropagation();pop.classList.toggle('open');});document.addEventListener('click',function(e){if(!pop.contains(e.target)&&e.target!==gear)pop.classList.remove('open');});}
    var cE=document.getElementById('gsThemeColor'),bE=document.getElementById('gsThemeBright');
    if(cE)cE.addEventListener('click',function(e){var btn=e.target.closest('.gs-color-dot');if(!btn||!btn.dataset.color)return;if(btn.dataset.color==='custom')return;try{localStorage.setItem(TK,btn.dataset.color);}catch(x){}apply();});
    var ci=document.getElementById('gsCustomColor');
    if(ci)ci.addEventListener('input',function(e){try{localStorage.setItem(TK,'custom');localStorage.setItem(CK,e.target.value);}catch(x){}apply();});
    if(bE)bE.addEventListener('click',function(e){var btn=e.target.closest('.gs-bright-btn');if(!btn||!btn.dataset.bright)return;try{localStorage.setItem(BK,btn.dataset.bright);}catch(x){}apply();});
    window.addEventListener('storage',function(e){if(e.key===TK||e.key===BK||e.key===CK)apply();});
  })();

<script>
/* SHARED: FAB BOT */
(function(){
  var fabBot=document.getElementById('fabBot'),fabPopup=document.getElementById('fabPopup'),fabInput=document.getElementById('fabInput');
  if(!fabBot)return;
  var fabDragging=false,fabDragStart={x:0,y:0},fabPos={x:0,y:0};
  try{var sp=JSON.parse(localStorage.getItem('ophtxn_fab_pos'));if(sp&&typeof sp.right==='number'){fabBot.style.right=sp.right+'px';fabBot.style.bottom=sp.bottom+'px';fabPopup.style.right=sp.right+'px';fabPopup.style.bottom=(sp.bottom+68)+'px';}}catch(_){}

  var startDrag=function(sx,sy){fabDragging=false;var r=fabBot.getBoundingClientRect();fabDragStart={x:sx,y:sy};fabPos={right:window.innerWidth-r.right,bottom:window.innerHeight-r.bottom};
    var moved=function(mx,my){var dx=mx-fabDragStart.x,dy=my-fabDragStart.y;if(Math.abs(dx)>4||Math.abs(dy)>4)fabDragging=true;if(!fabDragging)return;var nr=Math.max(8,Math.min(fabPos.right-dx,window.innerWidth-64)),nb=Math.max(8,Math.min(fabPos.bottom-dy,window.innerHeight-64));fabBot.style.right=nr+'px';fabBot.style.bottom=nb+'px';fabPopup.style.right=nr+'px';fabPopup.style.bottom=(nb+68)+'px';};
    var end=function(){document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',end);document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',end);if(fabDragging){try{localStorage.setItem('ophtxn_fab_pos',JSON.stringify({right:parseInt(fabBot.style.right),bottom:parseInt(fabBot.style.bottom)}));}catch(_){}setTimeout(function(){fabDragging=false;},50);}};
    var mm=function(e){moved(e.clientX,e.clientY);};var tm=function(e){if(e.touches.length===1){moved(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',end);document.addEventListener('touchmove',tm,{passive:false});document.addEventListener('touchend',end);
  };
  fabBot.addEventListener('mousedown',function(e){startDrag(e.clientX,e.clientY);});
  fabBot.addEventListener('touchstart',function(e){if(e.touches.length===1)startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
