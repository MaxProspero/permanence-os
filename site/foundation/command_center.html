<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a1118">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<title>Ophtxn &middot; The Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&family=Syne:wght@400;700;800&family=Orbitron:wght@700;900&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   RESET + BASE
   ═══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Layout */
  --hud-h:42px;
  --rad:12px;

  /* Dark Aurora (default) */
  --bg-0:#060b14;
  --bg-1:#0a1220;
  --bg-2:#0f1a2d;
  --surface:#0d1826;
  --surface-hi:#132236;
  --border:rgba(255,255,255,0.07);
  --border-hi:rgba(255,255,255,0.14);
  --ink:#e8f0ff;
  --ink-2:#b0c4de;
  --muted:#5a6a8a;
  --dim:#2e3d5c;
  --accent:#00e5c4;
  --accent-2:#7b6fff;
  --accent-warm:#f8c842;
  --accent-rose:#ff5c8a;
  --good:#54df9e;
  --warn:#f7bf5e;
  --bad:#ff7f7f;

  /* Glass */
  --glass:rgba(10,18,32,0.72);
  --glass-border:rgba(200,180,140,0.08);

  /* Brass / warm accent */
  --brass:#c8a84e;
  --brass-dim:rgba(200,168,78,0.08);
  --brass-border:rgba(200,168,78,0.15);

  --r:14px;
  --r-sm:10px;
  --r-xs:6px;

  /* Fonts */
  --sans:"DM Sans",system-ui,sans-serif;
  --display:"Syne",system-ui,sans-serif;
  --serif:"Playfair Display",Georgia,serif;
  --mono:"DM Mono",monospace;

  /* Tower HUD */
  --f-rgb:200,168,78;
  --f:rgb(var(--f-rgb));
}

/* ── COPPER ─────────────────────────────────────────── */
[data-theme="copper"]{
  --bg-0:#0c0906;--bg-1:#130e09;--bg-2:#1c1510;
  --surface:#181008;--surface-hi:#201810;
  --border:rgba(255,180,100,0.08);--border-hi:rgba(255,180,100,0.16);
  --ink:#fff0d8;--ink-2:#d4c0a0;--muted:#7a5f40;--dim:#3d2e1e;
  --accent:#ffb347;--accent-2:#e8a87c;--accent-warm:#ffd700;--accent-rose:#ff6b6b;
  --good:#80b860;--warn:#ff9500;--bad:#e06848;
  --brass:#e0a030;--brass-dim:rgba(224,160,48,0.08);--brass-border:rgba(224,160,48,0.15);
  --glass:rgba(20,14,8,0.75);--glass-border:rgba(255,200,120,0.08);
  --f-rgb:255,179,71;--f:rgb(var(--f-rgb));
}

/* ── VOID ───────────────────────────────────────────── */
[data-theme="void"]{
  --bg-0:#000;--bg-1:#080808;--bg-2:#101010;
  --surface:#0a0a0a;--surface-hi:#141414;
  --border:rgba(255,255,255,0.04);--border-hi:rgba(255,255,255,0.08);
  --ink:#c0c0c0;--ink-2:#888;--muted:#555;--dim:#333;
  --accent:#d0d0d0;--accent-2:#999;--accent-warm:#bbb;--accent-rose:#888;
  --good:#7a7a7a;--warn:#999;--bad:#666;
  --brass:#aaa;--brass-dim:rgba(170,170,170,0.06);--brass-border:rgba(170,170,170,0.1);
  --glass:rgba(8,8,8,0.75);--glass-border:rgba(255,255,255,0.04);
  --f-rgb:180,180,180;--f:rgb(var(--f-rgb));
}

/* ── LIGHT MODE ─────────────────────────────────────── */
[data-brightness="light"]{
  --bg-0:#f6f4f0;--bg-1:#edeae4;--bg-2:#e4e0d8;
  --surface:#ffffff;--surface-hi:#f5f3ef;
  --border:rgba(0,0,0,0.08);--border-hi:rgba(0,0,0,0.15);
  --ink:#1a1a2e;--ink-2:#4a4a6a;--muted:#8a8a9a;--dim:#c0c0c8;
  --glass:rgba(255,255,255,0.82);--glass-border:rgba(0,0,0,0.06);
}
[data-brightness="light"][data-theme="copper"]{
  --bg-0:#faf6f0;--bg-1:#f0e8dc;--bg-2:#e8ddd0;
  --surface:#fffaf4;--surface-hi:#f8f0e4;
  --ink:#2a1e10;--ink-2:#5a4a30;--muted:#8a7a60;
  --glass:rgba(255,250,244,0.85);--glass-border:rgba(200,160,80,0.1);
}
[data-brightness="light"][data-theme="void"]{
  --bg-0:#f0f0f0;--bg-1:#e8e8e8;--bg-2:#e0e0e0;
  --surface:#ffffff;--surface-hi:#f5f5f5;
  --ink:#111;--ink-2:#444;--muted:#888;
  --accent:#333;--accent-2:#666;
  --brass:#666;--glass:rgba(255,255,255,0.85);--glass-border:rgba(0,0,0,0.05);
}
@media(prefers-color-scheme:light){
  [data-brightness="system"]{
    --bg-0:#f6f4f0;--bg-1:#edeae4;--bg-2:#e4e0d8;
    --surface:#ffffff;--surface-hi:#f5f3ef;
    --border:rgba(0,0,0,0.08);--border-hi:rgba(0,0,0,0.15);
    --ink:#1a1a2e;--ink-2:#4a4a6a;--muted:#8a8a9a;--dim:#c0c0c8;
    --glass:rgba(255,255,255,0.82);--glass-border:rgba(0,0,0,0.06);
  }
}

html,body{width:100%;height:100%;overflow:hidden}
body{
  background:var(--bg-0);color:var(--ink);
  font-family:var(--sans);font-size:13px;line-height:1.55;
  padding-top:var(--hud-h);user-select:none;
  transition:background .3s,color .3s;
}

/* ═══════════════════════════════════════════════════════
   GRAIN + SCANLINES
   ═══════════════════════════════════════════════════════ */
#grain{
  position:fixed;inset:-50%;width:200%;height:200%;
  pointer-events:none;z-index:9997;
  opacity:.05;mix-blend-mode:overlay;
  animation:grainshift .5s steps(1) infinite;
}
@keyframes grainshift{
  0%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}
  20%{transform:translate(3%,1%)}30%{transform:translate(-1%,4%)}
  40%{transform:translate(4%,-2%)}50%{transform:translate(-3%,2%)}
  60%{transform:translate(2%,-4%)}70%{transform:translate(-4%,1%)}
  80%{transform:translate(3%,3%)}90%{transform:translate(-2%,-1%)}
}
.scanlines{
  position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}

/* ambient warm glows */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(700px 500px at 20% 30%, rgba(var(--f-rgb),.06) 0%, transparent 70%),
    radial-gradient(500px 400px at 80% 20%, rgba(123,111,255,.04) 0%, transparent 70%),
    radial-gradient(600px 300px at 60% 90%, rgba(255,92,138,.03) 0%, transparent 70%);
}

/* ═══════════════════════════════════════════════════════
   TOWER HUD
   ═══════════════════════════════════════════════════════ */
.tower-hud{
  position:fixed;top:0;left:0;right:0;z-index:9000;height:var(--hud-h);
  background:rgba(4,6,10,.97);border-bottom:1px solid rgba(var(--f-rgb),.2);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:border-color .3s,background .3s;
}
[data-brightness="light"] .tower-hud{background:rgba(246,244,240,.97);border-bottom-color:rgba(var(--f-rgb),.15)}
.th-l{display:flex;align-items:center;gap:4px}
.th-brand{font-family:'Orbitron',monospace;font-size:10px;font-weight:800;letter-spacing:.3em;color:var(--f);text-decoration:none}
.th-sep{color:rgba(var(--f-rgb),.2);margin:0 12px;font-size:10px}
.th-num{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--f);letter-spacing:.04em;margin-right:10px;text-shadow:0 0 18px rgba(var(--f-rgb),.45)}
.th-name{font-family:'Orbitron',monospace;font-size:7px;font-weight:500;letter-spacing:.28em;color:var(--muted);text-transform:uppercase}
.th-r{display:flex;align-items:center;gap:14px}
.th-back{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:rgba(var(--f-rgb),.45);text-decoration:none;transition:color .2s}
.th-back:hover{color:var(--f)}
.th-conn{font-family:var(--mono);font-size:10px;display:flex;align-items:center;gap:5px}
.th-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s,box-shadow .3s}
.th-dot.live{background:var(--good);box-shadow:0 0 8px var(--good)}
.th-dot.err{background:var(--bad);box-shadow:0 0 8px var(--bad)}

/* ═══════════════════════════════════════════════════════
   APP GRID
   ═══════════════════════════════════════════════════════ */
#app{
  position:relative;z-index:1;
  width:100vw;height:calc(100vh - var(--hud-h));
  display:grid;
  grid-template-columns:230px 1fr 220px;
  grid-template-rows:1fr auto;
  gap:6px;padding:6px;
  opacity:0;transition:opacity .9s ease;
}
#app.on{opacity:1}

/* ═══════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════ */
#boot{
  position:fixed;inset:0;background:var(--bg-0);z-index:9500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:12px;line-height:2;color:var(--muted);
  transition:opacity .6s ease;
}
#boot.out{opacity:0;pointer-events:none}
#boot-logo{
  font-family:'Orbitron',monospace;font-weight:900;font-size:28px;
  color:var(--brass);letter-spacing:8px;margin-bottom:4px;
  text-shadow:0 0 30px rgba(var(--f-rgb),.4);
}
#boot-sub{font-size:9px;letter-spacing:4px;color:var(--muted);margin-bottom:28px;opacity:.6}
#boot-log{text-align:center}
.bl{opacity:0;transition:opacity .12s ease}.bl.on{opacity:1}
#boot-bar{width:200px;height:1px;background:var(--dim);border-radius:2px;overflow:hidden;margin-top:20px}
#boot-fill{height:100%;width:0;background:var(--brass);box-shadow:0 0 8px rgba(var(--f-rgb),.5);transition:width .08s linear}

/* ═══════════════════════════════════════════════════════
   GLASS PANEL
   ═══════════════════════════════════════════════════════ */
.pnl{
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(150%);
  -webkit-backdrop-filter:blur(24px) saturate(150%);
  border:1px solid var(--glass-border);
  border-radius:var(--rad);
  display:flex;flex-direction:column;overflow:hidden;
  transition:border-color .3s,background .3s;
}
.pnl:hover{border-color:rgba(var(--f-rgb),.12)}

/* panel header — serif for "office" feel */
.ph{
  padding:10px 14px;border-bottom:1px solid var(--glass-border);
  font-family:var(--serif);font-size:12px;font-weight:600;
  color:var(--brass);letter-spacing:.5px;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
.ph-sub{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--muted);font-weight:400}

/* panel body — scrollable */
.pb{flex:1;overflow-y:auto;padding:8px 12px;font-size:12px}
.pb::-webkit-scrollbar{width:2px}
.pb::-webkit-scrollbar-thumb{background:rgba(var(--f-rgb),.2);border-radius:2px}

/* ═══════════════════════════════════════════════════════
   LEFT — AGENTS
   ═══════════════════════════════════════════════════════ */
#pl{grid-row:1;grid-column:1}

.arow{
  display:flex;align-items:center;gap:10px;
  padding:8px 4px;border-bottom:1px solid var(--border);
  border-radius:var(--r-xs);cursor:default;
  transition:background .18s ease;
}
.arow:last-child{border:none}
.arow:hover{background:var(--brass-dim)}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.adot.pulse{animation:dotpulse 2.2s infinite}
@keyframes dotpulse{0%,100%{opacity:1}50%{opacity:.3}}
.ainf{flex:1;min-width:0}
.aname{font-size:12px;font-weight:600;color:var(--ink);letter-spacing:.2px}
.arole{font-size:9px;color:var(--muted);margin-top:1px;font-family:var(--mono)}
.abadge{
  font-size:8px;padding:3px 8px;border-radius:999px;letter-spacing:1.2px;
  font-family:var(--mono);font-weight:500;flex-shrink:0;
}
.badge-active{background:rgba(84,223,158,.1);color:var(--good);border:1px solid rgba(84,223,158,.25)}
.badge-idle{background:rgba(90,106,138,.06);color:var(--muted);border:1px solid rgba(90,106,138,.15)}
.badge-sync{background:rgba(0,229,196,.08);color:var(--accent);border:1px solid rgba(0,229,196,.2)}

/* Processing indicator (typing-style) */
.badge-processing{
  background:rgba(0,229,196,.08);color:var(--accent);
  border:1px solid rgba(0,229,196,.2);
}
.badge-processing::after{
  content:"...";display:inline-block;
  animation:typing 1.4s steps(4,end) infinite;
  width:0;overflow:hidden;vertical-align:bottom;
}
@keyframes typing{0%{width:0}100%{width:1.2em}}

/* Notification badge (approval count) */
.notif-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 5px;
  border-radius:999px;
  background:#ff3b30;color:#fff;
  font:600 10px/1 var(--mono);
  animation:notifPulse 2s ease-in-out infinite;
}
.notif-badge:empty{display:none}
@keyframes notifPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* system meters at bottom of left panel */
.meters{padding:10px 12px;border-top:1px solid var(--glass-border);flex-shrink:0}
.meters-label{font-size:8px;color:var(--muted);letter-spacing:2px;font-family:var(--mono);margin-bottom:8px}
.mrow{margin-bottom:6px}
.mrow-head{display:flex;justify-content:space-between;align-items:center;font-size:9px;color:var(--muted);margin-bottom:3px;font-family:var(--mono)}
.mrow-val{font-variant-numeric:tabular-nums;transition:color .4s}
.mrow-val.high{color:var(--bad)}
.mrow-val.mid{color:var(--warn)}
.mrow-val.low{color:var(--good)}
.mtrack{height:3px;background:var(--border);border-radius:999px;overflow:hidden}
.mfill{height:100%;border-radius:999px;transition:width 1.4s cubic-bezier(.25,.46,.45,.94)}
.mfill-g{background:linear-gradient(90deg,rgba(84,223,158,.6),var(--good))}
.mfill-a{background:linear-gradient(90deg,rgba(0,229,196,.5),var(--accent))}
.mfill-w{background:linear-gradient(90deg,rgba(247,191,94,.5),var(--warn))}
.mfill-b{background:linear-gradient(90deg,rgba(200,168,78,.4),var(--brass))}

/* sparkline SVG */
.spark-wrap{position:relative;height:22px;margin-top:2px;border-radius:4px;overflow:hidden}
.spark-bg{position:absolute;inset:0;opacity:.04;border-radius:4px}
.spark-svg{display:block;width:100%;height:22px}
.spark-line{fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 2px currentColor)}
.spark-area{opacity:.08}
.spark-dot{transition:r .2s,opacity .2s}
.spark-tooltip{
  position:absolute;top:-20px;
  background:var(--bg-0);border:1px solid var(--border-hi);border-radius:4px;
  padding:2px 6px;font:500 9px/1.2 var(--mono);color:var(--ink);
  pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap;
  transform:translateX(-50%);z-index:2;
}

/* ═══════════════════════════════════════════════════════
   CENTER — TABS: COMMAND / CONSTRUCT / NETWORK
   ═══════════════════════════════════════════════════════ */
#pc{grid-row:1;grid-column:2;display:flex;flex-direction:column}

.tabbar{
  display:flex;padding:6px;gap:4px;
  border-bottom:1px solid var(--glass-border);flex-shrink:0;
}
.tab{
  flex:1;padding:6px 12px;font-size:9px;letter-spacing:1.5px;color:var(--muted);
  cursor:pointer;border-radius:8px;transition:all .2s ease;text-align:center;
  font-family:var(--mono);font-weight:500;
}
.tab.on{
  background:var(--brass-dim);color:var(--brass);
  border:1px solid var(--brass-border);
}
.tab:hover:not(.on){background:var(--brass-dim);color:var(--ink-2)}
.tpane{display:none;flex:1;overflow:hidden}
.tpane.on{display:flex;flex-direction:column}

/* ── COMMAND (real terminal) ─────────────────────────── */
#tp-cmd{overflow:hidden}
.cmd-out{
  flex:1;overflow-y:auto;padding:14px 16px;
  font-family:var(--mono);font-size:12px;line-height:1.85;
}
.cmd-out::-webkit-scrollbar{width:2px}
.cmd-out::-webkit-scrollbar-thumb{background:rgba(var(--f-rgb),.2);border-radius:2px}
.cmd-prompt{color:var(--brass)}
.cmd-text{color:var(--ink)}
.cmd-result{color:var(--muted);font-size:11px;opacity:.85}
.cmd-err{color:var(--bad);font-size:11px}
.cmd-cursor{display:inline-block;width:7px;height:13px;background:var(--brass);vertical-align:text-bottom;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

.cmd-input-wrap{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  border-top:1px solid var(--glass-border);flex-shrink:0;
  font-family:var(--mono);font-size:12px;
}
.cmd-input-wrap span{color:var(--brass);flex-shrink:0}
.cmd-input{
  flex:1;background:none;border:none;outline:none;
  font-family:var(--mono);font-size:12px;color:var(--ink);
  caret-color:var(--brass);
}
.cmd-input::placeholder{color:var(--dim)}

/* ── CONSTRUCT (3D agents) ───────────────────────────── */
#tp-construct{align-items:center;overflow:hidden;position:relative;cursor:grab}
#tp-construct:active{cursor:grabbing}
.construct-hdr{
  width:100%;padding:8px 14px;
  font-family:var(--mono);font-size:9px;letter-spacing:1.5px;
  color:var(--muted);border-bottom:1px solid var(--glass-border);
  flex-shrink:0;display:flex;justify-content:space-between;align-items:center;
}
#room{position:relative;width:560px;height:310px;perspective:950px;flex-shrink:0;margin-top:4px}
#room-inner{width:100%;height:100%;transform-style:preserve-3d;transform:rotateX(22deg) rotateY(-12deg)}
#floor-grid{
  position:absolute;width:480px;height:300px;left:40px;top:50px;
  transform-style:preserve-3d;transform:rotateX(84deg);
  background:
    linear-gradient(rgba(var(--f-rgb),.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(var(--f-rgb),.06) 1px,transparent 1px);
  background-size:40px 40px;border:1px solid rgba(var(--f-rgb),.12);
}
.ws{position:absolute;width:64px;height:52px}
.ws-screen{
  position:absolute;width:42px;height:28px;bottom:28px;left:11px;
  background:linear-gradient(135deg,var(--bg-0),var(--bg-2));
  border:1px solid;display:flex;align-items:center;justify-content:center;
  font-size:6px;letter-spacing:1px;border-radius:3px;font-family:var(--mono);
}
.ws-desk{
  position:absolute;width:64px;height:8px;bottom:16px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:2px;box-shadow:0 0 10px rgba(var(--f-rgb),.05);
}
.robot{position:absolute;transform-style:preserve-3d;transition:left 1.8s cubic-bezier(.25,.46,.45,.94),top 1.8s cubic-bezier(.25,.46,.45,.94)}
.rh{position:absolute;width:18px;height:16px;top:0;left:5px;border:1.5px solid;background:rgba(210,225,235,.12);border-radius:4px 4px 2px 2px}
.reye{position:absolute;width:4px;height:4px;border-radius:50%;top:4px}
.reye.l{left:2px}.reye.r{right:2px}
.rant{position:absolute;width:2px;height:8px;top:-10px;left:50%;transform:translateX(-50%)}
.rant-dot{width:5px;height:5px;border-radius:50%;position:absolute;top:-3px;left:-1.5px;animation:dotpulse 1.5s infinite}
.rb{position:absolute;width:24px;height:24px;top:18px;left:2px;border:1.5px solid;background:rgba(0,0,0,.5);border-radius:3px}
.rjoint{position:absolute;width:10px;height:8px;top:16px;left:9px;background:rgba(0,0,0,.7);border-radius:2px}
.ra{position:absolute;width:6px;height:18px;top:19px;border:1px solid;background:rgba(0,0,0,.4);border-radius:2px}
.ra.l{left:-5px}.ra.r{right:-5px}
.rl{position:absolute;width:8px;height:14px;top:44px;border:1px solid;background:rgba(0,0,0,.35);border-radius:2px}
.rl.l{left:4px}.rl.r{right:4px}

/* ── NETWORK ─────────────────────────────────────────── */
#tp-net{overflow-y:auto;padding:14px}
.nrow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:10px}

/* ═══════════════════════════════════════════════════════
   RIGHT — THE LEDGER
   ═══════════════════════════════════════════════════════ */
#pr{grid-row:1;grid-column:3}

/* subtle engraving texture */
#pr::after{
  content:'';position:absolute;inset:0;border-radius:var(--rad);pointer-events:none;z-index:0;
  background-image:repeating-linear-gradient(
    0deg,transparent,transparent 3px,rgba(var(--f-rgb),.015) 3px,rgba(var(--f-rgb),.015) 4px
  );opacity:.6;
}
#pr>*{position:relative;z-index:1}

.lrow{
  padding:8px 4px;border-bottom:1px solid var(--border);cursor:default;
  transition:background .15s ease;
}
.lrow:hover{background:var(--brass-dim)}
.lrow:last-child{border:none}
.lno{font-size:9px;color:var(--brass);font-family:var(--mono);letter-spacing:.5px;margin-bottom:2px}
.lcls{font-size:11px;color:var(--ink);font-weight:600;letter-spacing:.3px}
.lmeta{display:flex;justify-content:space-between;align-items:center;margin-top:3px}
.lts{font-size:8px;color:var(--muted);font-family:var(--mono)}
.lstatus{font-size:7px;padding:2px 7px;border-radius:3px;letter-spacing:1.5px;font-family:var(--mono)}
.ls-ok{background:rgba(84,223,158,.1);color:var(--good);border:1px solid rgba(84,223,158,.2)}
.ls-warn{background:rgba(247,191,94,.08);color:var(--warn);border:1px solid rgba(247,191,94,.2)}
.ls-err{background:rgba(255,127,127,.08);color:var(--bad);border:1px solid rgba(255,127,127,.2)}
.ls-info{background:var(--brass-dim);color:var(--brass);border:1px solid var(--brass-border)}

/* New entry flash animation */
.ls-new{animation:ledgerFlash .6s ease-out}
@keyframes ledgerFlash{0%{background:rgba(0,229,196,.15);transform:translateX(-4px)}100%{background:transparent;transform:none}}

/* ═══════════════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════════════ */
#footer{
  grid-row:2;grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;
  background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--rad);
  backdrop-filter:blur(24px) saturate(150%);-webkit-backdrop-filter:blur(24px) saturate(150%);
  transition:background .3s,border-color .3s;
}
.foot-l{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:10px}
.foot-clock{color:var(--ink);letter-spacing:.5px}
.foot-up{color:var(--muted);letter-spacing:.5px}
.foot-mid{display:flex;align-items:center;gap:10px}
.foot-theme{
  display:flex;gap:2px;
}
.foot-theme-btn{
  background:none;border:1px solid var(--border);border-radius:var(--r-xs);
  padding:3px 8px;font-family:var(--mono);font-size:8px;letter-spacing:1px;
  color:var(--muted);cursor:pointer;transition:all .2s;
}
.foot-theme-btn.on{color:var(--brass);border-color:var(--brass-border);background:var(--brass-dim)}
.foot-theme-btn:hover:not(.on){color:var(--ink-2);border-color:var(--border-hi)}
.foot-r{display:flex;align-items:center;gap:12px}
.shell-link{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:999px;
  background:var(--brass-dim);border:1px solid var(--brass-border);
  color:var(--brass);font-size:9px;letter-spacing:1.5px;
  font-family:var(--mono);text-decoration:none;cursor:pointer;
  transition:all .25s ease;
}
.shell-link:hover{
  background:rgba(var(--f-rgb),.12);
  box-shadow:0 0 16px rgba(var(--f-rgb),.2);
  border-color:rgba(var(--f-rgb),.3);
}
.kb-toggle{
  background:none;border:1px solid var(--border);border-radius:var(--r-xs);
  padding:3px 8px;font-family:var(--mono);font-size:8px;letter-spacing:1px;
  color:var(--muted);cursor:pointer;transition:all .2s;
}
.kb-toggle.on{color:var(--brass);border-color:var(--brass-border)}
.kb-toggle:hover{color:var(--ink-2)}

/* ═══════════════════════════════════════════════════════
   KEYBOARD (hidden by default)
   ═══════════════════════════════════════════════════════ */
#kb{
  display:none;grid-column:1/-1;
  background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--rad);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:8px 10px 10px;flex-direction:column;gap:5px;
  transition:background .3s;
}
#kb.show{display:flex}
.krow{display:flex;gap:4px;justify-content:center}
.key{
  height:30px;min-width:30px;padding:0 7px;
  background:var(--surface);
  border:1px solid var(--border);
  border-bottom:2px solid var(--border-hi);
  border-radius:7px;
  font-family:var(--mono);font-size:9px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .07s ease;
}
.key:hover{background:var(--brass-dim);border-color:var(--brass-border);color:var(--ink)}
.key.kdown{
  background:var(--brass-dim);border-color:var(--brass);color:var(--brass);
  box-shadow:0 0 10px rgba(var(--f-rgb),.2);transform:translateY(1px);
}
.key.klit{
  background:rgba(var(--f-rgb),.06);border-color:rgba(var(--f-rgb),.25);
  color:var(--brass);box-shadow:0 0 8px rgba(var(--f-rgb),.15);
}

/* ═══════════════════════════════════════════════════════
   GRID (Agent Arena)
   ═══════════════════════════════════════════════════════ */
#tp-grid{position:relative;overflow:hidden}

/* dot-grid canvas */
.arena-canvas{
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 50% 50%, rgba(var(--f-rgb),.03) 0%, transparent 70%),
    var(--bg-0);
}
.arena-dots{
  position:absolute;inset:0;
  background-image:radial-gradient(rgba(var(--f-rgb),.12) 1px, transparent 1px);
  background-size:24px 24px;
  opacity:.5;
}

/* svg layer */
.arena-svg{position:absolute;inset:0;pointer-events:none;z-index:1}

/* hub */
.arena-hub{
  position:absolute;z-index:3;
  width:56px;height:56px;border-radius:50%;
  left:50%;top:50%;transform:translate(-50%,-50%);
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-0);
  border:2px solid var(--accent);
  box-shadow:0 0 24px rgba(0,229,196,.2), inset 0 0 12px rgba(0,229,196,.08);
  cursor:pointer;transition:box-shadow .3s;
}
.arena-hub:hover{box-shadow:0 0 36px rgba(0,229,196,.35), inset 0 0 16px rgba(0,229,196,.12)}
.arena-hub-ring{
  position:absolute;inset:-6px;border-radius:50%;
  border:1px solid rgba(0,229,196,.15);
  animation:arena-hub-spin 20s linear infinite;
}
.arena-hub-ring::after{
  content:'';position:absolute;width:4px;height:4px;border-radius:50%;
  background:var(--accent);top:-2px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 6px var(--accent);
}
@keyframes arena-hub-spin{to{transform:rotate(360deg)}}
.arena-hub-label{
  font-family:var(--mono);font-size:7px;letter-spacing:1.5px;color:var(--accent);
  font-weight:600;
}

/* agent nodes */
.arena-node{
  position:absolute;z-index:4;width:42px;height:42px;
  transform:translate(-50%,-50%);cursor:pointer;
  transition:transform .6s cubic-bezier(.25,.46,.45,.94);
}
.arena-node-orb{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-0);border:1.5px solid;
  transition:box-shadow .3s, border-color .3s;
}
.arena-node:hover .arena-node-orb{
  box-shadow:0 0 20px currentColor;
}
.arena-node-icon{
  font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.5px;
  text-transform:uppercase;
}
.arena-node-name{
  position:absolute;top:100%;left:50%;transform:translateX(-50%);
  white-space:nowrap;padding-top:4px;
  font-family:var(--mono);font-size:7px;letter-spacing:.8px;color:var(--muted);
  text-align:center;opacity:.7;transition:opacity .2s;
}
.arena-node:hover .arena-node-name{opacity:1;color:var(--ink)}

/* node states */
.arena-node.active .arena-node-orb{
  box-shadow:0 0 14px currentColor;
  animation:arena-pulse 2.5s ease-in-out infinite;
}
@keyframes arena-pulse{0%,100%{box-shadow:0 0 14px currentColor}50%{box-shadow:0 0 22px currentColor}}
.arena-node.idle .arena-node-orb{opacity:.55}
.arena-node.idle{animation:arena-float 6s ease-in-out infinite}
@keyframes arena-float{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,calc(-50% - 3px))}}
.arena-node.pending .arena-node-orb{border-color:var(--warn) !important;color:var(--warn) !important}
.arena-node.error .arena-node-orb{border-color:var(--bad) !important;color:var(--bad) !important;animation:none}

/* orbital ring for active nodes */
.arena-node-orbit{
  position:absolute;inset:-5px;border-radius:50%;
  border:1px solid;opacity:.2;
  animation:arena-hub-spin 8s linear infinite;
  display:none;
}
.arena-node.active .arena-node-orbit{display:block}
.arena-node-orbit::after{
  content:'';position:absolute;width:3px;height:3px;border-radius:50%;
  background:currentColor;top:-1.5px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 4px currentColor;
}

/* detail card (click-to-inspect) */
.arena-detail{
  position:absolute;z-index:10;
  width:220px;padding:14px;
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);border-radius:var(--r);
  display:none;pointer-events:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.arena-detail.show{display:block}
.arena-detail-hdr{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
.arena-detail-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.arena-detail-name{font-size:12px;font-weight:600;color:var(--ink);letter-spacing:.3px;flex:1}
.arena-detail-close{
  width:18px;height:18px;border-radius:4px;border:1px solid var(--border);
  background:none;color:var(--muted);font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.arena-detail-close:hover{color:var(--ink);border-color:var(--border-hi)}
.arena-detail-row{
  display:flex;justify-content:space-between;padding:3px 0;
  font-size:10px;font-family:var(--mono);
}
.arena-detail-lbl{color:var(--muted);letter-spacing:.5px}
.arena-detail-val{color:var(--ink)}

/* thought stream */
.arena-stream{
  position:absolute;bottom:0;left:0;right:0;z-index:5;
  max-height:80px;overflow-y:auto;padding:6px 12px;
  background:linear-gradient(transparent, rgba(6,11,20,.85) 30%);
  pointer-events:auto;
}
.arena-stream::-webkit-scrollbar{width:2px}
.arena-stream::-webkit-scrollbar-thumb{background:rgba(var(--f-rgb),.15)}
.arena-event{
  font-family:var(--mono);font-size:9px;line-height:1.7;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.arena-event-ts{color:var(--dim);margin-right:6px}
.arena-event-ok{color:var(--good)}
.arena-event-err{color:var(--bad)}

/* department legend */
.arena-legend{
  position:absolute;top:8px;right:12px;z-index:5;
  display:flex;gap:10px;
}
.arena-legend-item{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:7px;letter-spacing:1px;color:var(--muted)}
.arena-legend-dot{width:6px;height:6px;border-radius:50%}

/* ═══════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════ */
@media(max-width:900px){
  #app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto auto}
  #pl{grid-column:1;grid-row:1;max-height:180px}
  #pc{grid-column:1;grid-row:2}
  #pr{grid-column:1;grid-row:3;max-height:200px}
  #footer{grid-column:1;grid-row:4}
  .meters{display:none}
}
@media(max-width:600px){
  #app{gap:4px;padding:4px}
  .ph{padding:8px 10px;font-size:11px}
  #footer{flex-wrap:wrap;gap:8px;justify-content:center}
  .foot-l,.foot-r{width:100%;justify-content:center}
}

/* ═══════════════════════════════════════════════════════
   CMD+K COMMAND PALETTE
   ═══════════════════════════════════════════════════════ */
#cmdK-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:flex-start;justify-content:center;
  padding-top:min(18vh,160px);
}
#cmdK-overlay.show{display:flex}
#cmdK-box{
  width:min(540px,90vw);
  background:var(--bg-1);
  border:1px solid var(--border-hi);
  border-radius:var(--r);
  box-shadow:0 24px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04);
  overflow:hidden;
  animation:cmdKSlide .15s cubic-bezier(.25,.46,.45,.94);
}
@keyframes cmdKSlide{from{opacity:0;transform:translateY(-12px) scale(.98)}to{opacity:1;transform:none}}
#cmdK-input-wrap{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
}
#cmdK-icon{
  color:var(--muted);font-size:15px;flex-shrink:0;
  font-family:var(--mono);
}
#cmdK-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--ink);font:400 15px/1.4 var(--sans);
}
#cmdK-input::placeholder{color:var(--muted)}
#cmdK-hint{
  color:var(--dim);font:400 11px var(--mono);
  flex-shrink:0;
}
#cmdK-results{
  max-height:min(360px,50vh);overflow-y:auto;
  padding:6px 0;
}
#cmdK-results:empty::after{
  content:"No matches";display:block;
  padding:20px;text-align:center;
  color:var(--muted);font:400 13px var(--sans);
}
.cmdK-item{
  display:flex;align-items:center;gap:12px;
  padding:9px 18px;cursor:pointer;
  transition:background .1s;
}
.cmdK-item:hover,.cmdK-item.sel{background:var(--surface-hi)}
.cmdK-item.sel{border-left:2px solid var(--accent)}
.cmdK-cat{
  font:500 10px/1 var(--mono);text-transform:uppercase;letter-spacing:0.06em;
  color:var(--muted);min-width:56px;
}
.cmdK-label{
  flex:1;font:400 14px/1.3 var(--sans);color:var(--ink);
}
.cmdK-label mark{
  background:var(--accent);color:var(--bg-0);
  border-radius:2px;padding:0 2px;
}
.cmdK-key{
  font:400 11px var(--mono);color:var(--dim);
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:2px 6px;
}
#cmdK-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 18px;border-top:1px solid var(--border);
  font:400 11px var(--mono);color:var(--muted);
}
</style>
</head>
<body data-theme="aurora" data-brightness="dark">

<script>
/* ═══════════════════════════════════════════════════════
   RUNTIME CONFIG
   ═══════════════════════════════════════════════════════ */
var __RT = window.__OPHTXN_RUNTIME || {};
var CMD_BASE = __RT.apiBase || __RT.commandCenterUrl || (location.port === "8000" ? "" : "http://127.0.0.1:8000");
var APP_BASE = __RT.appBase || "http://127.0.0.1:8797";

/* ═══════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════ */
var $ = function(id) { return document.getElementById(id); };
var t0 = Date.now();
var agents = [];
var cmdHistory = [];
var cmdIdx = -1;
var kbVisible = false;

/* ═══════════════════════════════════════════════════════
   BOOT (short — opening the office, not booting a mainframe)
   ═══════════════════════════════════════════════════════ */
var BOOT_LINES = [
  "Verifying ledger integrity...",
  "Loading agent roster...",
  "Connecting mesh topology...",
  "Mounting PERMANENCE_FS...",
  "Cognitive overlay ready.",
  "Welcome to The Office.",
];

async function runBoot() {
  var log = $("boot-log");
  var bar = $("boot-fill");
  for (var i = 0; i < BOOT_LINES.length; i++) {
    var d = document.createElement("div");
    d.className = "bl";
    d.textContent = BOOT_LINES[i];
    d.style.color = i === BOOT_LINES.length - 1 ? "var(--brass)" : "";
    log.appendChild(d);
    requestAnimationFrame(function(el) { return function() { el.classList.add("on"); }; }(d));
    bar.style.width = Math.round(((i + 1) / BOOT_LINES.length) * 100) + "%";
    await new Promise(function(r) { setTimeout(r, 180 + Math.random() * 70); });
  }
  await new Promise(function(r) { setTimeout(r, 300); });
  $("boot").classList.add("out");
  $("app").classList.add("on");
  setTimeout(function() { $("boot").style.display = "none"; }, 700);
  startApp();
}

/* ═══════════════════════════════════════════════════════
   APP INIT
   ═══════════════════════════════════════════════════════ */
function startApp() {
  applyTheme();
  buildThemeButtons();
  buildKeyboard();
  buildTerminalInit();
  buildConstruct();
  startClock();
  startMeters();
  initTabs();
  checkStatus();
  fetchLedger();

  setInterval(checkStatus, 30000);
  setInterval(fetchLedger, 30000);
}

/* ═══════════════════════════════════════════════════════
   THEME SYSTEM (shared with Shell)
   ═══════════════════════════════════════════════════════ */
function applyTheme() {
  var c = localStorage.getItem("ophtxn_office_color") || "aurora";
  var b = localStorage.getItem("ophtxn_office_bright") || "dark";
  document.body.dataset.theme = c;
  document.body.dataset.brightness = b;
  updateThemeButtonStates();
}

function setTheme(color) {
  localStorage.setItem("ophtxn_office_color", color);
  applyTheme();
}

function setBrightness(bright) {
  localStorage.setItem("ophtxn_office_bright", bright);
  applyTheme();
}

function buildThemeButtons() {
  var colors = ["aurora", "copper", "void"];
  var brights = ["dark", "light", "system"];
  var html = "";
  colors.forEach(function(c) {
    html += '<button class="foot-theme-btn" data-color="' + c + '">' + c.toUpperCase() + '</button>';
  });
  html += '<span style="width:1px;height:14px;background:var(--border);margin:0 4px"></span>';
  brights.forEach(function(b) {
    html += '<button class="foot-theme-btn" data-bright="' + b + '">' + b.toUpperCase() + '</button>';
  });
  $("themeButtons").innerHTML = html;

  $("themeButtons").addEventListener("click", function(e) {
    var btn = e.target.closest(".foot-theme-btn");
    if (!btn) return;
    if (btn.dataset.color) setTheme(btn.dataset.color);
    if (btn.dataset.bright) setBrightness(btn.dataset.bright);
  });
  updateThemeButtonStates();
}

function updateThemeButtonStates() {
  var c = document.body.dataset.theme;
  var b = document.body.dataset.brightness;
  document.querySelectorAll(".foot-theme-btn").forEach(function(btn) {
    var isOn = (btn.dataset.color === c) || (btn.dataset.bright === b);
    btn.classList.toggle("on", isOn);
  });
}

/* ═══════════════════════════════════════════════════════
   CONNECTION + STATUS (real data)
   ═══════════════════════════════════════════════════════ */
function setConn(ok) {
  $("connDot").className = "th-dot " + (ok ? "live" : "err");
  $("connLabel").textContent = ok ? "live" : "offline";
}

async function checkStatus() {
  try {
    var resp = await fetch(CMD_BASE + "/api/status", { signal: AbortSignal.timeout(4000) });
    var data = await resp.json();
    setConn(data.ok);
    if (data.agents) {
      agents = data.agents;
      renderAgents();
      if (typeof cmdKRefreshAgents === "function") cmdKRefreshAgents();
    }
  } catch (_) {
    setConn(false);
  }
  // Also fetch pending approvals for badge
  try {
    var ar = await fetch(CMD_BASE + "/api/approvals", { signal: AbortSignal.timeout(4000) });
    var ad = await ar.json();
    var pending = ad.total_pending || (ad.pending || []).length || 0;
    var badge = $("approvalBadge");
    if (badge) {
      badge.textContent = pending > 0 ? pending : "";
      badge.title = pending > 0 ? pending + " pending approval" + (pending > 1 ? "s" : "") : "";
    }
  } catch (_) {}
}

function renderAgents() {
  var list = $("agentList");
  var activeCount = 0;
  var html = "";
  agents.forEach(function(a) {
    var st = (a.status || "idle").toLowerCase();
    var isActive = st === "active" || st === "online" || st === "running";
    if (isActive) activeCount++;
    var isProcessing = st === "processing" || st === "working" || st === "thinking";
    var badge = isProcessing ? "badge-processing" : isActive ? "badge-active" : st === "sync" ? "badge-sync" : "badge-idle";
    var color = a.color || "var(--accent)";
    html +=
      '<div class="arow">' +
        '<div class="adot' + ((isActive || isProcessing) ? ' pulse' : '') + '" style="background:' + color + ';box-shadow:0 0 6px ' + color + '60"></div>' +
        '<div class="ainf">' +
          '<div class="aname">' + esc(a.name || a.id || "?") + '</div>' +
          '<div class="arole">' + esc(a.role || a.type || "--") + '</div>' +
        '</div>' +
        '<div class="abadge ' + badge + '">' + esc((a.status || "IDLE").toUpperCase()) + '</div>' +
      '</div>';
  });
  if (list.innerHTML !== html) list.innerHTML = html;
  $("agentCount").textContent = activeCount + " / " + agents.length + " ONLINE";
}

/* ═══════════════════════════════════════════════════════
   LIVE LEDGER (from /api/logs)
   ═══════════════════════════════════════════════════════ */
async function fetchLedger() {
  try {
    var resp = await fetch(CMD_BASE + "/api/logs?limit=20", { signal: AbortSignal.timeout(4000) });
    var data = await resp.json();
    var entries = data.entries || data.logs || data || [];
    if (!Array.isArray(entries)) entries = [];
    renderLedger(entries);
  } catch (_) {
    // Silent — keep current display
  }
}

var lastLedgerTs = "";
function renderLedger(entries) {
  var list = $("ledgerList");
  if (!entries.length) {
    if (!list.innerHTML.trim()) list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:11px">No entries yet</div>';
    return;
  }
  var html = "";
  var newestTs = "";
  entries.forEach(function(e) {
    var level = (e.level || e.result || "info").toLowerCase();
    var cls = level === "error" ? "ls-err" : level === "warning" || level === "warn" ? "ls-warn" : level === "ok" || level === "success" ? "ls-ok" : "ls-info";
    var ts = e.timestamp || e.ts || "";
    if (ts > newestTs) newestTs = ts;
    var isNew = lastLedgerTs && ts > lastLedgerTs;
    if (ts && ts.length > 19) ts = ts.slice(0, 19);
    html +=
      '<div class="lrow' + (isNew ? ' ls-new' : '') + '">' +
        '<div class="lno">' + esc(e.method || e.endpoint || e.source || "--") + '</div>' +
        '<div class="lcls">' + esc(e.description || e.message || e.endpoint || "--") + '</div>' +
        '<div class="lmeta">' +
          '<span class="lts">' + esc(ts) + '</span>' +
          '<span class="lstatus ' + cls + '">' + esc((e.result || level).toUpperCase()) + '</span>' +
        '</div>' +
      '</div>';
  });
  if (newestTs) lastLedgerTs = newestTs;
  list.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════
   COMMAND INPUT (real dispatch)
   ═══════════════════════════════════════════════════════ */
function buildTerminalInit() {
  var out = $("cmdOut");
  addCmdLine("prompt", "ophtxn $ ", "type a command to get started");
  addCmdLine("result", "", 'Type "help" for available commands.');

  $("cmdInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      e.preventDefault();
      var text = this.value.trim();
      if (!text) return;
      cmdHistory.push(text);
      cmdIdx = cmdHistory.length;
      this.value = "";
      handleCommand(text);
    }
    if (e.key === "ArrowUp") {
      e.preventDefault();
      if (cmdIdx > 0) { cmdIdx--; this.value = cmdHistory[cmdIdx] || ""; }
    }
    if (e.key === "ArrowDown") {
      e.preventDefault();
      if (cmdIdx < cmdHistory.length - 1) { cmdIdx++; this.value = cmdHistory[cmdIdx] || ""; }
      else { cmdIdx = cmdHistory.length; this.value = ""; }
    }
  });
}

function addCmdLine(type, prefix, text) {
  var out = $("cmdOut");
  var d = document.createElement("div");
  if (type === "prompt") {
    d.innerHTML = '<span class="cmd-prompt">' + esc(prefix) + '</span><span class="cmd-text">' + esc(text) + '</span>';
  } else if (type === "error") {
    d.className = "cmd-err";
    d.textContent = text;
  } else {
    d.className = "cmd-result";
    d.textContent = text;
  }
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

async function handleCommand(text) {
  addCmdLine("prompt", "ophtxn $ ", text);

  if (text === "help") {
    addCmdLine("result", "", "Available commands:");
    addCmdLine("result", "", "  status         System health");
    addCmdLine("result", "", "  agents         Agent roster");
    addCmdLine("result", "", "  approvals      Pending approvals");
    addCmdLine("result", "", "  logs           Recent activity");
    addCmdLine("result", "", "  briefing       Latest briefing");
    addCmdLine("result", "", "  grid           Switch to agent arena");
    addCmdLine("result", "", "  clear          Clear terminal");
    addCmdLine("result", "", "  <anything>     Send to agent console");
    return;
  }

  if (text === "clear") {
    $("cmdOut").innerHTML = "";
    return;
  }

  if (text === "status") {
    try {
      var r = await fetch(CMD_BASE + "/api/status", { signal: AbortSignal.timeout(4000) });
      var d = await r.json();
      addCmdLine("result", "", "Status: " + (d.ok ? "ONLINE" : "ERROR") + " | Version: " + (d.version || "?"));
      if (d.agents) addCmdLine("result", "", "Agents: " + d.agents.length + " loaded");
    } catch (e) { addCmdLine("error", "", "ERROR: " + e.message); }
    return;
  }

  if (text === "agents") {
    if (!agents.length) { addCmdLine("result", "", "No agents loaded. Run 'status' first."); return; }
    agents.forEach(function(a) {
      addCmdLine("result", "", "  " + (a.name || a.id) + "  " + (a.status || "?").toUpperCase() + "  " + (a.role || ""));
    });
    return;
  }

  if (text === "approvals") {
    try {
      var r = await fetch(CMD_BASE + "/api/approvals", { signal: AbortSignal.timeout(4000) });
      var d = await r.json();
      var items = d.pending || d.approvals || [];
      addCmdLine("result", "", "Pending: " + (d.total_pending || items.length));
      items.slice(0, 5).forEach(function(a) {
        addCmdLine("result", "", "  [" + (a.task_id || a.id) + "] " + (a.description || a.task || "?") + " (" + (a.risk_level || "?") + ")");
      });
    } catch (e) { addCmdLine("error", "", "ERROR: " + e.message); }
    return;
  }

  if (text === "logs") {
    try {
      var r = await fetch(CMD_BASE + "/api/logs?limit=10", { signal: AbortSignal.timeout(4000) });
      var d = await r.json();
      var entries = d.entries || d.logs || d || [];
      if (!Array.isArray(entries)) entries = [];
      if (!entries.length) { addCmdLine("result", "", "No log entries."); return; }
      entries.slice(0, 10).forEach(function(e) {
        addCmdLine("result", "", "  [" + (e.result || "?") + "] " + (e.endpoint || e.description || "?") + " " + (e.timestamp || "").slice(0, 19));
      });
    } catch (e) { addCmdLine("error", "", "ERROR: " + e.message); }
    return;
  }

  if (text === "briefing") {
    try {
      var r = await fetch(CMD_BASE + "/api/briefings/latest", { signal: AbortSignal.timeout(4000) });
      if (r.status === 404) { addCmdLine("result", "", "No briefing available."); return; }
      var d = await r.json();
      addCmdLine("result", "", d.content || d.markdown || JSON.stringify(d).slice(0, 300));
    } catch (e) { addCmdLine("error", "", "ERROR: " + e.message); }
    return;
  }

  if (text === "grid") {
    // Switch to GRID tab
    document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("on"); });
    document.querySelectorAll(".tpane").forEach(function(p) { p.classList.remove("on"); });
    document.querySelector('.tab[data-t="grid"]').classList.add("on");
    $("tp-grid").classList.add("on");
    if (!arenaBuilt) buildArena();
    addCmdLine("result", "", "Switched to Agent Arena grid view.");
    return;
  }

  // Default: dispatch to agent console
  try {
    var r = await fetch(CMD_BASE + "/api/agent-console/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, source: "office_terminal" }),
      signal: AbortSignal.timeout(6000),
    });
    var d = await r.json();
    addCmdLine("result", "", d.response || d.message || "dispatched [" + new Date().toTimeString().slice(0, 8) + "]");
  } catch (e) {
    addCmdLine("error", "", "Dispatch failed: " + e.message);
  }
}

/* ═══════════════════════════════════════════════════════
   CONSTRUCT (3D agents — preserved)
   ═══════════════════════════════════════════════════════ */
var WS_POS = [
  {x:50,y:50},{x:210,y:50},{x:370,y:50},
  {x:50,y:200},{x:210,y:200},{x:370,y:200},
  {x:130,y:125},
];
var agentPos = WS_POS.map(function(p) { return {x:p.x, y:p.y}; });

function buildConstruct() {
  var p = $("tp-construct");
  p.innerHTML =
    '<div class="construct-hdr">' +
      '<span>SIMULATION PHASE [LOAD]</span>' +
      '<span id="constructCount" style="color:var(--brass)">-- UNITS</span>' +
    '</div>' +
    '<div id="room"><div id="room-inner">' +
      '<div id="floor-grid"></div>' +
      '<div id="workstations"></div>' +
      '<div id="robots"></div>' +
    '</div></div>';

  // Workstations
  var wsEl = $("workstations");
  var wsHtml = "";
  for (var i = 0; i < WS_POS.length; i++) {
    var pos = WS_POS[i];
    var color = "var(--muted)";
    wsHtml +=
      '<div class="ws" style="left:' + pos.x + 'px;top:' + pos.y + 'px">' +
        '<div class="ws-screen" style="border-color:' + color + '">' +
          '<span style="color:' + color + ';opacity:.7">WS-' + i + '</span>' +
        '</div>' +
        '<div class="ws-desk"></div>' +
      '</div>';
  }
  wsEl.innerHTML = wsHtml;
  renderRobots();

  // Drag to rotate
  var drag = false, sx = 0, sy = 0, rx = 22, ry = -12;
  var inner = $("room-inner");
  p.addEventListener("mousedown", function(e) { drag = true; sx = e.clientX; sy = e.clientY; });
  window.addEventListener("mousemove", function(e) {
    if (!drag) return;
    ry += (e.clientX - sx) * .35;
    rx -= (e.clientY - sy) * .35;
    rx = Math.max(-5, Math.min(45, rx));
    inner.style.transform = "rotateX(" + rx + "deg) rotateY(" + ry + "deg)";
    sx = e.clientX; sy = e.clientY;
  });
  window.addEventListener("mouseup", function() { drag = false; });

  // Agent movement
  setInterval(function() {
    if (!agents.length) return;
    var i = Math.random() * Math.min(agents.length, WS_POS.length) | 0;
    var nw = Math.random() * WS_POS.length | 0;
    agentPos[i] = {x: WS_POS[nw].x, y: WS_POS[nw].y};
    var rb = document.getElementById("rb-" + i);
    if (rb) { rb.style.left = (WS_POS[nw].x + 6) + "px"; rb.style.top = (WS_POS[nw].y - 12) + "px"; }
  }, 5000);
}

function renderRobots() {
  var el = $("robots");
  if (!el) return;
  var count = Math.min(agents.length || 7, WS_POS.length);
  var html = "";
  for (var i = 0; i < count; i++) {
    var pos = agentPos[i] || WS_POS[i];
    var a = agents[i] || {};
    var c = a.color || "var(--brass)";
    html +=
      '<div class="robot" id="rb-' + i + '" style="left:' + (pos.x + 6) + 'px;top:' + (pos.y - 12) + 'px">' +
        '<div class="rant" style="background:' + c + '"><div class="rant-dot" style="background:' + c + ';box-shadow:0 0 6px ' + c + '"></div></div>' +
        '<div class="rh" style="border-color:' + c + ';box-shadow:0 0 10px ' + c + '44">' +
          '<div class="reye l" style="background:' + c + ';box-shadow:0 0 4px ' + c + '"></div>' +
          '<div class="reye r" style="background:' + c + ';box-shadow:0 0 4px ' + c + '"></div>' +
        '</div>' +
        '<div class="rjoint"></div>' +
        '<div class="rb" style="border-color:' + c + ';box-shadow:0 0 6px ' + c + '22"></div>' +
        '<div class="ra l" style="border-color:' + c + '"></div><div class="ra r" style="border-color:' + c + '"></div>' +
        '<div class="rl l" style="border-color:' + c + '"></div><div class="rl r" style="border-color:' + c + '"></div>' +
      '</div>';
  }
  el.innerHTML = html;
  var cc = $("constructCount");
  if (cc) cc.textContent = count + " UNITS";
}

function buildNetPane() {

   GRID — Agent Arena
   ═══════════════════════════════════════════════════════ */
var arenaData = null;
var arenaBuilt = false;
var arenaDetail = null; // currently inspected agent id

var DEPT_COLORS = {
  CORE: "#00e5c4",
  OPERATIONS: "#ff5c8a",
  INFRASTRUCTURE: "#c8a84e",
  WORKFLOW: "#6ecfff",
};

var DEPT_LABELS = {
  CORE: "CORE PIPELINE",
  OPERATIONS: "OPERATIONS",
  INFRASTRUCTURE: "INFRASTRUCTURE",
  WORKFLOW: "WORKFLOWS",
};

function buildArena() {
  var p = $("tp-grid");
  p.innerHTML =
    '<div class="arena-canvas"><div class="arena-dots"></div></div>' +
    '<svg class="arena-svg" id="arenaSvg"></svg>' +
    '<div class="arena-hub" id="arenaHub">' +
      '<div class="arena-hub-ring"></div>' +
      '<div class="arena-hub-label">HUB</div>' +
    '</div>' +

    '<div class="arena-detail" id="arenaDetail"></div>' +
    '<div class="arena-legend" id="arenaLegend"></div>' +
    '<div class="arena-stream" id="arenaStream"></div>';

  // Build legend
  var legend = "";
  Object.keys(DEPT_LABELS).forEach(function(k) {
    legend += '<div class="arena-legend-item"><div class="arena-legend-dot" style="background:' + DEPT_COLORS[k] + ';box-shadow:0 0 4px ' + DEPT_COLORS[k] + '"></div>' + DEPT_LABELS[k] + '</div>';
  });
  $("arenaLegend").innerHTML = legend;

  // Hub click
  $("arenaHub").addEventListener("click", function() {
    showArenaDetail(null); // show hub info
  });

  // Close detail on background click
  p.addEventListener("click", function(e) {
    if (e.target === p || e.target.classList.contains("arena-canvas") || e.target.classList.contains("arena-dots")) {
      hideArenaDetail();
    }
  });

  arenaBuilt = true;
  fetchArenaState();
  // Poll every 30s
  setInterval(fetchArenaState, 30000);
}

async function fetchArenaState() {
  try {
    var resp = await fetch(CMD_BASE + "/api/arena/state", { signal: AbortSignal.timeout(4000) });
    arenaData = await resp.json();
    if (arenaData.ok) renderArena();
  } catch (_) {
    // Silent — keep current display
  }
}

function renderArena() {
  if (!arenaData || !arenaData.agents) return;
  var pane = $("tp-grid");
  if (!pane) return;
  var w = pane.offsetWidth || 600;
  var h = pane.offsetHeight || 400;
  var cx = w / 2;
  var cy = h / 2;

  // Group agents by department
  var depts = {};
  arenaData.agents.forEach(function(a) {
    var d = a.department || "CORE";
    if (!depts[d]) depts[d] = [];
    depts[d].push(a);
  });

  // Position agents in concentric rings by department
  var deptOrder = ["CORE", "OPERATIONS", "INFRASTRUCTURE", "WORKFLOW"];
  var positions = {}; // agent_id -> {x, y}
  var ringBase = Math.min(w, h) * 0.18;
  var ringStep = Math.min(w, h) * 0.14;

  deptOrder.forEach(function(dept, di) {
    var group = depts[dept] || [];
    var ring = ringBase + di * ringStep;
    var offset = di * 0.3; // stagger start angle per department
    group.forEach(function(a, ai) {
      var angle = offset + (ai / Math.max(group.length, 1)) * Math.PI * 2;
      positions[a.id] = {
        x: cx + Math.cos(angle) * ring,
        y: cy + Math.sin(angle) * ring,
      };
    });
  });

  // Render SVG connections
  var svg = $("arenaSvg");
  if (svg) {
    svg.setAttribute("width", w);
    svg.setAttribute("height", h);
    var lines = '<defs><filter id="arena-glow"><feGaussianBlur stdDeviation="2" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';
    (arenaData.connections || []).forEach(function(c) {
      var from = c.from === "hub" ? {x: cx, y: cy} : positions[c.from];
      var to = c.to === "hub" ? {x: cx, y: cy} : positions[c.to];
      if (!from || !to) return;
      var color = c.type === "pipeline" ? "rgba(0,229,196,.12)" : c.type === "control" ? "rgba(200,168,78,.1)" : "rgba(123,111,255,.08)";
      var activeColor = c.type === "pipeline" ? "rgba(0,229,196,.3)" : c.type === "control" ? "rgba(200,168,78,.25)" : "rgba(123,111,255,.2)";
      lines += '<line x1="' + from.x.toFixed(1) + '" y1="' + from.y.toFixed(1) + '" x2="' + to.x.toFixed(1) + '" y2="' + to.y.toFixed(1) + '" stroke="' + color + '" stroke-width="1" stroke-dasharray="4 6"><animate attributeName="stroke-dashoffset" values="0;-10" dur="1.2s" repeatCount="indefinite"/></line>';
      // Animated data particle
      lines += '<circle r="1.5" fill="' + activeColor + '" filter="url(#arena-glow)"><animateMotion dur="' + (2 + Math.random() * 2).toFixed(1) + 's" repeatCount="indefinite"><mpath href="#"/></animateMotion></circle>';
    });
    svg.innerHTML = lines;
  }

  // Render agent nodes
  var nodesEl = $("arenaNodes");
  if (nodesEl) {
    var html = "";
    arenaData.agents.forEach(function(a) {
      var pos = positions[a.id];
      if (!pos) return;
      var color = a.color || DEPT_COLORS[a.department] || "var(--brass)";
      var state = a.status || "idle";
      var initials = a.id.split("_").map(function(w) { return w[0]; }).join("").toUpperCase().slice(0, 2);
      html +=
        '<div class="arena-node ' + state + '" id="an-' + a.id + '" data-aid="' + a.id + '" style="left:' + pos.x.toFixed(1) + 'px;top:' + pos.y.toFixed(1) + 'px;color:' + color + '">' +
          '<div class="arena-node-orbit" style="border-color:' + color + ';color:' + color + '"></div>' +
          '<div class="arena-node-orb" style="border-color:' + color + '">' +
            '<span class="arena-node-icon" style="color:' + color + '">' + initials + '</span>' +
          '</div>' +
          '<div class="arena-node-name">' + esc(a.name) + '</div>' +
        '</div>';
    });
    // Only update if changed
    var newHTML = html;
    if (nodesEl.dataset.hash !== hashStr(newHTML)) {
      nodesEl.innerHTML = newHTML;
      nodesEl.dataset.hash = hashStr(newHTML);
      // Attach click handlers
      nodesEl.querySelectorAll(".arena-node").forEach(function(node) {
        node.addEventListener("click", function(e) {
          e.stopPropagation();
          showArenaDetail(node.dataset.aid);
        });
      });
    } else {
      // Update positions only (smooth transition)
      arenaData.agents.forEach(function(a) {
        var pos = positions[a.id];
        var el = document.getElementById("an-" + a.id);
        if (el && pos) {
          el.style.left = pos.x.toFixed(1) + "px";
          el.style.top = pos.y.toFixed(1) + "px";
        }
      });
    }
  }

  // Update hub status
  var hub = arenaData.hub || {};
  var hubEl = $("arenaHub");
  if (hubEl) {
    var hubColor = hub.status === "online" ? "var(--accent)" : hub.status === "degraded" ? "var(--warn)" : "var(--bad)";
    hubEl.style.borderColor = hubColor;
    hubEl.style.boxShadow = "0 0 24px " + hubColor + "33, inset 0 0 12px " + hubColor + "14";
  }

  // Update thought stream
  renderArenaStream();
}

function renderArenaStream() {
  var el = $("arenaStream");
  if (!el || !arenaData) return;
  var events = arenaData.events || [];
  if (!events.length) {
    el.innerHTML = '<div class="arena-event"><span class="arena-event-ts">--:--:--</span> Waiting for events...</div>';
    return;

  var html = "";
  events.forEach(function(ev) {
    var ts = (ev.timestamp || "").slice(11, 19) || "--:--:--";
    var cls = (ev.result || "").toLowerCase() === "ok" ? "arena-event-ok" : ev.result && ev.result.toLowerCase().indexOf("err") >= 0 ? "arena-event-err" : "";

}

function hashStr(s) {
  var h = 0;
  for (var i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
  return String(h);
}

/* ═══════════════════════════════════════════════════════
   SYSTEM METERS — SVG Sparklines
   ═══════════════════════════════════════════════════════ */
var SPARK_POINTS = 24; // history depth
var meterData = [
  {lbl:"CPU", cls:"mfill-g", color:"#54df9e", v:34, history:[]},
  {lbl:"MEM", cls:"mfill-a", color:"#00e5c4", v:61, history:[]},
  {lbl:"NET", cls:"mfill-w", color:"#f7bf5e", v:18, history:[]},
  {lbl:"DSK", cls:"mfill-b", color:"#c8a84e", v:47, history:[]},
];

// Seed history with gentle random walk
meterData.forEach(function(m) {
  var v = m.v;
  for (var i = 0; i < SPARK_POINTS; i++) {
    v = Math.max(4, Math.min(96, v + (Math.random() - .5) * 8));
    m.history.push(Math.round(v));
  }
  m.v = m.history[m.history.length - 1];
});

function sparkPath(history, w, h, pad) {
  var n = history.length;
  if (n < 2) return {line:"", area:""};
  var stepX = (w - pad * 2) / (n - 1);
  var points = history.map(function(v, i) {
    return { x: pad + i * stepX, y: h - pad - (v / 100) * (h - pad * 2) };
  });
  // Smooth catmull-rom → cubic bezier
  var line = "M" + points[0].x.toFixed(1) + "," + points[0].y.toFixed(1);
  for (var i = 0; i < points.length - 1; i++) {
    var p0 = points[Math.max(i - 1, 0)];
    var p1 = points[i];
    var p2 = points[Math.min(i + 1, points.length - 1)];
    var p3 = points[Math.min(i + 2, points.length - 1)];
    var cp1x = p1.x + (p2.x - p0.x) / 6;
    var cp1y = p1.y + (p2.y - p0.y) / 6;
    var cp2x = p2.x - (p3.x - p1.x) / 6;
    var cp2y = p2.y - (p3.y - p1.y) / 6;
    line += " C" + cp1x.toFixed(1) + "," + cp1y.toFixed(1) + " " + cp2x.toFixed(1) + "," + cp2y.toFixed(1) + " " + p2.x.toFixed(1) + "," + p2.y.toFixed(1);
  }
  // Area fill (close path to bottom)
  var area = line + " L" + points[points.length-1].x.toFixed(1) + "," + (h - pad) + " L" + points[0].x.toFixed(1) + "," + (h - pad) + " Z";
  return {line:line, area:area, lastX:points[points.length-1].x, lastY:points[points.length-1].y};
}

function renderSparkline(m) {
  var el = $("spark-" + m.lbl);
  if (!el) return;
  var w = el.offsetWidth || 190;
  var h = 22;
  var pad = 2;
  var p = sparkPath(m.history, w, h, pad);
  el.innerHTML =
    '<svg class="spark-svg" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
      '<path class="spark-area" d="' + p.area + '" fill="' + m.color + '"/>' +
      '<path class="spark-line" d="' + p.line + '" stroke="' + m.color + '"/>' +
      '<circle class="spark-dot" cx="' + (p.lastX||0).toFixed(1) + '" cy="' + (p.lastY||0).toFixed(1) + '" r="2" fill="' + m.color + '" opacity=".9"/>' +
    '</svg>';
}

function startMeters() {
  $("meterList").innerHTML = meterData.map(function(m) {
    var v = Math.round(m.v);
    var tier = v > 80 ? "high" : v > 55 ? "mid" : "low";
    return '<div class="mrow">' +
      '<div class="mrow-head"><span>' + m.lbl + '</span><span class="mrow-val ' + tier + '" id="mv-' + m.lbl + '">' + v + '%</span></div>' +
      '<div class="mtrack"><div class="mfill ' + m.cls + '" id="mf-' + m.lbl + '" style="width:' + v + '%"></div></div>' +
      '<div class="spark-wrap" id="spark-' + m.lbl + '"></div>' +
    '</div>';
  }).join("");

  // Initial render
  meterData.forEach(function(m) { renderSparkline(m); });

  setInterval(function() {
    meterData.forEach(function(m) {
      m.v = Math.max(4, Math.min(96, m.v + (Math.random() - .5) * 9));
      var v = Math.round(m.v);
      m.history.push(v);
      if (m.history.length > SPARK_POINTS) m.history.shift();
      var fill = $("mf-" + m.lbl);
      var val = $("mv-" + m.lbl);
      if (fill) fill.style.width = v + "%";
      if (val) {
        val.textContent = v + "%";
        val.className = "mrow-val " + (v > 80 ? "high" : v > 55 ? "mid" : "low");
      }
      renderSparkline(m);
    });
  }, 2200);
}

var KEYS = [
  ["ESC","F1","F2","F3","F4","F5","F6","F7","F8","F9","F10","F11","F12","DEL"],
  ["`","1","2","3","4","5","6","7","8","9","0","-","=","BKSP"],
  ["TAB","Q","W","E","R","T","Y","U","I","O","P","[","]","\\"],
  ["CAPS","A","S","D","F","G","H","J","K","L",";","'","ENTER"],
  ["SHIFT","Z","X","C","V","B","N","M",",",".","/","SHIFT"],
  ["CTRL","ALT","\u2318","SPACE","\u2318","ALT","\u2190","\u2191","\u2193","\u2192"],
];
var KEY_W = {BKSP:1.9,TAB:1.9,CAPS:2.1,ENTER:2.7,SHIFT:2.8,CTRL:1.7,ALT:1.5,"\u2318":1.7,SPACE:7.5,"\\":1.5};

function buildKeyboard() {
  var kb = $("kb");
  kb.innerHTML = KEYS.map(function(row) {
    return '<div class="krow">' + row.map(function(k) {
      var w = KEY_W[k] || 1;
      var s = w > 6 ? "min-width:" + (w * 30) + "px" : w > 1 ? "min-width:" + (w * 26) + "px" : "";
      return '<div class="key" data-k="' + k + '" style="' + s + '">' + k + '</div>';
    }).join("") + '</div>';
  }).join("");

  document.addEventListener("keydown", function(e) {
    var k = e.key === " " ? "SPACE" : e.key.toUpperCase();
    document.querySelectorAll('.key[data-k="' + k + '"]').forEach(function(el) { el.classList.add("kdown"); });
  });
  document.addEventListener("keyup", function(e) {
    var k = e.key === " " ? "SPACE" : e.key.toUpperCase();
    document.querySelectorAll('.key[data-k="' + k + '"]').forEach(function(el) { el.classList.remove("kdown"); });
  });

  // Ambient key flashes
  setInterval(function() {
    if (!kbVisible) return;
    var all = document.querySelectorAll(".key");
    var k = all[Math.random() * all.length | 0];
    k.classList.add("klit");
    setTimeout(function() { k.classList.remove("klit"); }, 170);
  }, 400);

  $("kbToggle").addEventListener("click", function() {
    kbVisible = !kbVisible;
    kb.classList.toggle("show", kbVisible);
    this.classList.toggle("on", kbVisible);
    // Adjust grid when keyboard is shown
    if (kbVisible) {
      $("app").style.gridTemplateRows = "1fr auto auto";
    } else {
      $("app").style.gridTemplateRows = "1fr auto";
    }
  });
}

function fuzzyMatch(query, text) {
  var q = query.toLowerCase();
  var t = text.toLowerCase();
  if (!q) return { match: true, score: 0, ranges: [] };
  if (t.indexOf(q) >= 0) return { match: true, score: 100, ranges: [[t.indexOf(q), t.indexOf(q) + q.length]] };
  var qi = 0, ranges = [], start = -1;
  for (var ti = 0; ti < t.length && qi < q.length; ti++) {
    if (t[ti] === q[qi]) {
      if (start < 0) start = ti;
      qi++;
    } else if (start >= 0) {
      ranges.push([start, ti]);
      start = -1;
    }
  }
  if (start >= 0) ranges.push([start, t.length]);
  if (qi < q.length) return { match: false, score: 0, ranges: [] };
  return { match: true, score: qi * 10, ranges: ranges };
}

function highlightMatch(text, ranges) {
  if (!ranges.length) return esc(text);
  var result = "";
  var prev = 0;
  ranges.forEach(function(r) {
    result += esc(text.slice(prev, r[0]));
    result += "<mark>" + esc(text.slice(r[0], r[1])) + "</mark>";
    prev = r[1];
  });
  result += esc(text.slice(prev));
  return result;
}

function cmdKRender(query) {
  var results = $("cmdK-results");
  var matches = [];
  CMD_K_ITEMS.forEach(function(item) {
    var m = fuzzyMatch(query, item.label + " " + item.cat);
    if (m.match) {
      var labelMatch = fuzzyMatch(query, item.label);
      matches.push({ item: item, score: m.score, labelRanges: labelMatch.ranges });
    }
  });
  matches.sort(function(a, b) { return b.score - a.score; });
  matches = matches.slice(0, 12);

  results.innerHTML = matches.map(function(m, i) {
    var sel = i === cmdKSel ? " sel" : "";
    return '<div class="cmdK-item' + sel + '" data-idx="' + i + '">' +
      '<span class="cmdK-cat">' + esc(m.item.cat) + '</span>' +
      '<span class="cmdK-label">' + highlightMatch(m.item.label, m.labelRanges) + '</span>' +
      (m.item.key ? '<span class="cmdK-key">' + esc(m.item.key) + '</span>' : '') +
      '</div>';
  }).join("");

  // Store matches for selection
  results._matches = matches;

  // Click handlers
  results.querySelectorAll(".cmdK-item").forEach(function(el) {
    el.addEventListener("click", function() {
      var idx = parseInt(el.dataset.idx);
      var match = matches[idx];
      if (match) { cmdKClose(); match.item.action(); }
    });
  });
}

function cmdKOpen_() {
  cmdKOpen = true;
  cmdKSel = 0;
  var overlay = $("cmdK-overlay");
  var input = $("cmdK-input");
  overlay.classList.add("show");
  input.value = "";
  input.focus();
  cmdKRender("");
}

function cmdKClose() {
  cmdKOpen = false;
  $("cmdK-overlay").classList.remove("show");
  $("cmdK-input").value = "";
}

function cmdKExecSelected() {
  var results = $("cmdK-results");
  var matches = results._matches || [];
  if (matches[cmdKSel]) {
    cmdKClose();
    matches[cmdKSel].item.action();
  }
}

// Keyboard handler
document.addEventListener("keydown", function(e) {
  // Cmd+K / Ctrl+K to open
  if ((e.metaKey || e.ctrlKey) && e.key === "k") {
    e.preventDefault();
    if (cmdKOpen) { cmdKClose(); } else { cmdKOpen_(); }
    return;
  }

  if (!cmdKOpen) return;

  if (e.key === "Escape") {
    e.preventDefault();
    cmdKClose();
    return;
  }

  if (e.key === "ArrowDown") {
    e.preventDefault();
    var items = ($("cmdK-results")._matches || []);
    cmdKSel = Math.min(cmdKSel + 1, items.length - 1);
    cmdKRender($("cmdK-input").value);
    return;
  }

  if (e.key === "ArrowUp") {
    e.preventDefault();
    cmdKSel = Math.max(cmdKSel - 1, 0);
    cmdKRender($("cmdK-input").value);
    return;
  }

  if (e.key === "Enter") {
    e.preventDefault();
    cmdKExecSelected();
    return;
  }
});

// Input handler
document.addEventListener("DOMContentLoaded", function() {
  var input = $("cmdK-input");
  if (input) {
    input.addEventListener("input", function() {
      cmdKSel = 0;
      cmdKRender(input.value);
    });
  }
});

// Close on overlay click
document.addEventListener("click", function(e) {
  if (e.target === $("cmdK-overlay")) cmdKClose();
});

/* ═══════════════════════════════════════════════════════
   GO
   ═══════════════════════════════════════════════════════ */
runBoot();
</script>
