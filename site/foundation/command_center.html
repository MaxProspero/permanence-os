<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPHTXN // COMMAND CENTER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#03080c;
  --g1:#00ff9d;
  --c1:#00d4ff;
  --p1:#ff2d78;
  --go:#ffd700;
  --pu:#b464ff;
  --or:#ff8c00;
  --am:#ff9500;
  --rd:#ff3322;
  --tx:#6aa8bc;
  --brt:#d0e8f0;
  --glass:rgba(7,18,28,0.72);
  --gborder:rgba(0,212,255,0.12);
  --rad:12px;
}

html,body{
  width:100%;height:100%;background:var(--bg);
  color:var(--tx);overflow:hidden;user-select:none;
  font-family:'Inter',sans-serif;
}

/* grid bg */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);
  background-size:40px 40px;
}

/* scanlines */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
}

/* film grain overlay */
#grain{
  position:fixed;inset:-50%;width:200%;height:200%;
  pointer-events:none;z-index:9997;
  opacity:.055;mix-blend-mode:overlay;
  animation:grainshift .5s steps(1) infinite;
}
@keyframes grainshift{
  0%  {transform:translate(0,0)}
  10% {transform:translate(-2%,-3%)}
  20% {transform:translate(3%,1%)}
  30% {transform:translate(-1%,4%)}
  40% {transform:translate(4%,-2%)}
  50% {transform:translate(-3%,2%)}
  60% {transform:translate(2%,-4%)}
  70% {transform:translate(-4%,1%)}
  80% {transform:translate(3%,3%)}
  90% {transform:translate(-2%,-1%)}
}

/* corner brackets */
.cbr{position:fixed;width:22px;height:22px;pointer-events:none;z-index:900;opacity:.7}
.cbr.tl{top:6px;left:6px;border-top:1.5px solid var(--c1);border-left:1.5px solid var(--c1)}
.cbr.tr{top:6px;right:6px;border-top:1.5px solid var(--c1);border-right:1.5px solid var(--c1)}
.cbr.bl{bottom:6px;left:6px;border-bottom:1.5px solid var(--c1);border-left:1.5px solid var(--c1)}
.cbr.br{bottom:6px;right:6px;border-bottom:1.5px solid var(--c1);border-right:1.5px solid var(--c1)}

/* ══════════ BOOT ══════════ */
#boot{
  position:fixed;inset:0;background:#000;z-index:1000;
  display:flex;flex-direction:column;padding:52px 64px;
  font-family:'Share Tech Mono',monospace;font-size:13px;line-height:2.1;
}
#boot-logo{
  font-family:'Orbitron',monospace;font-weight:900;font-size:40px;
  color:var(--g1);letter-spacing:12px;text-shadow:0 0 40px rgba(0,255,157,.65);
  margin-bottom:2px;
}
#boot-sub{font-size:10px;color:var(--tx);letter-spacing:5px;margin-bottom:36px;opacity:.7}
#boot-log{flex:1;overflow:hidden}
.bl{opacity:0;transition:opacity .07s ease}
.bl.on{opacity:1}
.bl-ok{color:var(--g1)}.bl-info{color:var(--tx)}.bl-sys{color:var(--c1)}.bl-err{color:var(--p1)}.bl-arc{color:var(--go)}
#bbar-wrap{margin-top:24px}
#bbar-lbl{font-size:10px;color:var(--g1);margin-bottom:8px;letter-spacing:2px}
#bbar-track{width:100%;height:1px;background:#0d2233;border-radius:4px;overflow:hidden}
#bbar-fill{height:100%;width:0%;background:var(--g1);box-shadow:0 0 12px var(--g1);transition:width .07s linear}
#boot.out{animation:bOut .65s ease forwards}
@keyframes bOut{to{opacity:0;pointer-events:none}}

/* ══════════ APP GRID ══════════ */
#app{
  position:relative;z-index:1;
  width:100vw;height:100vh;
  display:grid;
  grid-template-rows:44px 1fr 152px;
  grid-template-columns:236px 1fr 220px;
  gap:6px;padding:6px;
  opacity:0;transition:opacity .9s ease;
}
#app.on{opacity:1}

/* ══════════ GLASS PANEL ══════════ */
.pnl{
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--gborder);
  border-radius:var(--rad);
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
  transition:border-color .3s ease;
}
.pnl:hover{border-color:rgba(0,212,255,.22)}

/* halftone dot texture on panels */
.pnl::before{
  content:'';position:absolute;inset:0;border-radius:var(--rad);
  background-image:radial-gradient(circle,rgba(0,212,255,.06) 1px,transparent 1px);
  background-size:14px 14px;
  pointer-events:none;z-index:0;opacity:.45;
  mix-blend-mode:overlay;
  transition:opacity .3s ease;
}
.pnl:hover::before{opacity:.75}
.pnl>*{position:relative;z-index:1}

/* panel header */
.ph{
  padding:8px 12px;border-bottom:1px solid var(--gborder);
  font-size:9px;color:var(--c1);letter-spacing:2.5px;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
  font-family:'Space Grotesk','Share Tech Mono',monospace;font-weight:500;
}
.pb{flex:1;overflow-y:auto;padding:8px 10px;font-size:11px}
.pb::-webkit-scrollbar{width:2px}
.pb::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px}

/* ══════════ TOP BAR ══════════ */
#topbar{
  grid-column:1/-1;
  background:rgba(3,8,12,.85);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:1px solid var(--gborder);border-radius:var(--rad);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{flex-shrink:0;color:var(--c1);animation:markpulse 4s ease-in-out infinite}
@keyframes markpulse{0%,100%{opacity:.7}50%{opacity:1;filter:drop-shadow(0 0 6px rgba(0,212,255,.55))}}
.brand-text{
  font-family:'Orbitron',monospace;font-weight:700;font-size:15px;
  color:var(--g1);letter-spacing:5px;text-shadow:0 0 16px rgba(0,255,157,.5);
}
.hud-mid{display:flex;gap:14px;align-items:center;font-size:11px;font-family:'Share Tech Mono',monospace}
.hdiv{width:1px;height:14px;background:rgba(0,212,255,.15)}
.hud-right{display:flex;gap:12px;align-items:center;font-size:10px;font-family:'Share Tech Mono',monospace}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.sg{background:var(--g1);box-shadow:0 0 8px var(--g1);animation:spulse 2.2s infinite}
.sc{background:var(--c1);box-shadow:0 0 8px var(--c1)}
.sa{background:var(--am);box-shadow:0 0 8px var(--am);animation:spulse 1.6s infinite}
@keyframes spulse{0%,100%{opacity:1}50%{opacity:.3}}

.cog-label{
  color:var(--go);font-size:8px;letter-spacing:1.8px;
  border:1px solid rgba(255,215,0,.22);padding:2px 8px;border-radius:3px;
  background:rgba(255,215,0,.05);font-family:'Share Tech Mono',monospace;
  animation:cogblink 4s ease-in-out infinite;
}
@keyframes cogblink{0%,92%,100%{opacity:1}96%{opacity:.15}}

/* ══════════ LEFT PANEL ══════════ */
#pl{grid-row:2;grid-column:1}
.arow{
  display:flex;align-items:center;gap:9px;
  border-bottom:1px solid rgba(13,34,51,.5);cursor:pointer;
  border-radius:6px;padding:7px 4px;
  transition:background .18s ease;
}
.arow:last-child{border:none}
.arow:hover{background:rgba(0,212,255,.04)}
.adot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ainf{flex:1}
.aname{font-size:12px;color:var(--brt);font-weight:600;letter-spacing:.3px}
.arole{font-size:9px;color:var(--tx);font-weight:400;margin-top:1px}
.abadge{
  font-size:8px;padding:3px 8px;border-radius:999px;letter-spacing:1.5px;
  font-family:'Share Tech Mono',monospace;transition:all .2s ease;
}
.ba{background:rgba(0,255,157,.1);color:var(--g1);border:1px solid rgba(0,255,157,.25);box-shadow:0 0 8px rgba(0,255,157,.12)}
.bi{background:rgba(107,168,188,.06);color:var(--tx);border:1px solid rgba(107,168,188,.15)}
.bs{background:rgba(0,212,255,.1);color:var(--c1);border:1px solid rgba(0,212,255,.25);box-shadow:0 0 8px rgba(0,212,255,.12)}
.bm{background:rgba(255,149,0,.1);color:var(--am);border:1px solid rgba(255,149,0,.3);box-shadow:0 0 8px rgba(255,149,0,.15)}

#meters-wrap{padding:10px;border-top:1px solid var(--gborder);flex-shrink:0}
.sys-label{font-size:8px;color:var(--tx);letter-spacing:2px;font-family:'Space Grotesk',sans-serif;margin-bottom:8px;opacity:.7}
.mrow{margin-bottom:9px}
.mlabel{display:flex;justify-content:space-between;font-size:9px;color:var(--tx);margin-bottom:4px;font-family:'Share Tech Mono',monospace}
.mtrack{height:4px;background:rgba(255,255,255,.05);border-radius:999px;overflow:hidden}
.mfill{height:100%;border-radius:999px;transition:width 1.4s cubic-bezier(.25,.46,.45,.94)}
.fg{background:linear-gradient(90deg,#00cc7a,var(--g1));box-shadow:0 0 8px rgba(0,255,157,.4)}
.fc{background:linear-gradient(90deg,#00a8d0,var(--c1));box-shadow:0 0 8px rgba(0,212,255,.4)}
.fp{background:linear-gradient(90deg,#cc1a5a,var(--p1));box-shadow:0 0 8px rgba(255,45,120,.4)}
.fgo{background:linear-gradient(90deg,#ccaa00,var(--go));box-shadow:0 0 8px rgba(255,215,0,.4)}

/* ══════════ CENTER PANEL ══════════ */
#pc{grid-row:2;grid-column:2;display:flex;flex-direction:column}

.tabbar{display:flex;padding:6px;gap:2px;border-bottom:1px solid var(--gborder);flex-shrink:0}
.tab{
  flex:1;padding:5px 10px;font-size:9px;letter-spacing:1.8px;color:var(--tx);
  cursor:pointer;border-radius:8px;transition:all .2s ease;text-align:center;
  font-family:'Space Grotesk',sans-serif;font-weight:500;
}
.tab.on{
  background:rgba(0,212,255,.12);color:var(--c1);
  border:1px solid rgba(0,212,255,.2);box-shadow:0 0 12px rgba(0,212,255,.08);
}
.tab:hover:not(.on){background:rgba(255,255,255,.03);color:var(--brt)}
.tpane{display:none;flex:1;overflow:hidden}
.tpane.on{display:flex;flex-direction:column}

/* terminal */
#tp-term{overflow-y:auto;padding:12px 14px;font-size:12px;line-height:1.85;font-family:'Share Tech Mono',monospace}
#tp-term::-webkit-scrollbar{width:2px}
#tp-term::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px}
.tprompt{color:var(--g1)}.tcmd{color:var(--brt)}.tout{color:var(--tx);opacity:.75;font-size:11px}
.tarc{color:var(--go);font-size:10px;opacity:.9;letter-spacing:.3px}
.tcursor{display:inline-block;width:8px;height:14px;background:var(--g1);vertical-align:text-bottom;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* THE CONSTRUCT */
#tp-agents{align-items:center;overflow:hidden;position:relative;cursor:grab}
#tp-agents:active{cursor:grabbing}
.construct-hdr{
  width:100%;padding:7px 14px;
  font-family:'Space Grotesk',sans-serif;font-size:9px;letter-spacing:1.5px;
  color:rgba(0,212,255,.35);border-bottom:1px solid rgba(0,212,255,.06);
  flex-shrink:0;display:flex;justify-content:space-between;align-items:center;
}
#room{position:relative;width:560px;height:310px;perspective:950px;flex-shrink:0;margin-top:4px}
#room-inner{width:100%;height:100%;transform-style:preserve-3d;transform:rotateX(22deg) rotateY(-12deg)}
#floor{
  position:absolute;width:480px;height:300px;left:40px;top:50px;
  transform-style:preserve-3d;transform:rotateX(84deg);
  background:
    linear-gradient(rgba(0,212,255,.09) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.09) 1px,transparent 1px);
  background-size:40px 40px;border:1px solid rgba(0,212,255,.18);
}
.ws{position:absolute;width:64px;height:52px}
.ws-screen{position:absolute;width:42px;height:28px;bottom:28px;left:11px;
  background:linear-gradient(135deg,#001020,#002844);border:1px solid;
  display:flex;align-items:center;justify-content:center;font-size:6px;letter-spacing:1px;border-radius:3px}
.ws-desk{position:absolute;width:64px;height:8px;bottom:16px;background:#0d1e2e;
  border:1px solid #0d3050;border-radius:2px;box-shadow:0 0 10px rgba(0,212,255,.1)}
.robot{position:absolute;transform-style:preserve-3d;transition:left 1.8s cubic-bezier(.25,.46,.45,.94),top 1.8s cubic-bezier(.25,.46,.45,.94)}
/* I, Robot inspired - pale head, dark mechanical joint */
.rh{position:absolute;width:18px;height:16px;top:0;left:5px;border:1.5px solid;background:rgba(210,225,235,.12);border-radius:4px 4px 2px 2px}
.reye{position:absolute;width:4px;height:4px;border-radius:50%;top:4px}
.reye.l{left:2px}.reye.r{right:2px}
.rant{position:absolute;width:2px;height:8px;top:-10px;left:50%;transform:translateX(-50%)}
.rant-dot{width:5px;height:5px;border-radius:50%;position:absolute;top:-3px;left:-1.5px;animation:spulse 1.5s infinite}
.rb{position:absolute;width:24px;height:24px;top:18px;left:2px;border:1.5px solid;background:rgba(0,0,0,.5);border-radius:3px}
/* mechanical joint - darker */
.rjoint{position:absolute;width:10px;height:8px;top:16px;left:9px;background:rgba(0,0,0,.7);border-radius:2px}
.ra{position:absolute;width:6px;height:18px;top:19px;border:1px solid;background:rgba(0,0,0,.4);border-radius:2px}
.ra.l{left:-5px}.ra.r{right:-5px}
.rl{position:absolute;width:8px;height:14px;top:44px;border:1px solid;background:rgba(0,0,0,.35);border-radius:2px}
.rl.l{left:4px}.rl.r{right:4px}

/* network */
#tp-net{overflow-y:auto;padding:12px 14px}
.nrow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(13,34,51,.5);font-size:10px}

/* ══════════ RIGHT PANEL — THE LEDGER ══════════ */
#pr{grid-row:2;grid-column:3}

/* engraving texture on ledger */
#pr::after{
  content:'';position:absolute;inset:0;border-radius:var(--rad);pointer-events:none;z-index:0;
  background-image:repeating-linear-gradient(
    0deg,
    transparent,transparent 3px,
    rgba(255,215,0,.018) 3px,rgba(255,215,0,.018) 4px
  ),repeating-linear-gradient(
    90deg,
    transparent,transparent 6px,
    rgba(255,215,0,.008) 6px,rgba(255,215,0,.008) 7px
  );
  opacity:.6;
}

.lrow{
  padding:7px 4px;border-bottom:1px solid rgba(13,34,51,.5);cursor:default;
  transition:background .15s ease;
}
.lrow:hover{background:rgba(255,215,0,.03)}
.lrow:last-child{border:none}
.lno{font-size:9px;color:var(--go);font-family:'Share Tech Mono',monospace;letter-spacing:.5px;margin-bottom:2px}
.lcls{font-size:10px;color:var(--brt);font-weight:600;letter-spacing:.5px;font-family:'Space Grotesk',sans-serif}
.lmeta{display:flex;justify-content:space-between;align-items:center;margin-top:3px}
.lts{font-size:8px;color:var(--tx);font-family:'Share Tech Mono',monospace}
.lstatus{font-size:7px;padding:2px 7px;border-radius:3px;letter-spacing:1.5px;font-family:'Share Tech Mono',monospace}
.ls-perm{background:rgba(255,215,0,.12);color:var(--go);border:1px solid rgba(255,215,0,.3)}
.ls-seal{background:rgba(180,100,255,.1);color:var(--pu);border:1px solid rgba(180,100,255,.28)}
.ls-act{background:rgba(0,255,157,.1);color:var(--g1);border:1px solid rgba(0,255,157,.25)}
.ls-pend{background:rgba(255,140,0,.08);color:var(--or);border:1px solid rgba(255,140,0,.22)}

.seal-row{display:flex;justify-content:space-between;align-items:center;padding:4px 4px;border-bottom:1px solid rgba(13,34,51,.4);font-size:9px}
.seal-lbl{color:var(--tx);font-family:'Share Tech Mono',monospace;letter-spacing:1px}
.seal-val{font-family:'Share Tech Mono',monospace;font-weight:600}

/* ══════════ KEYBOARD ══════════ */
#kb{
  grid-row:3;grid-column:1/-1;
  background:rgba(4,10,16,.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--gborder);border-radius:var(--rad);
  padding:8px 10px 10px;display:flex;flex-direction:column;gap:5px;
}
.krow{display:flex;gap:4px;justify-content:center}
.key{
  height:31px;min-width:31px;padding:0 7px;
  background:rgba(15,28,40,.9);
  border:1px solid rgba(0,212,255,.1);
  border-bottom:2px solid rgba(0,212,255,.18);
  border-radius:7px;
  font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--tx);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .07s ease;letter-spacing:.3px;
  box-shadow:0 1px 0 rgba(0,0,0,.4);
}
/* ESC key special treatment - glass/crystal inspired */
.key[data-k="ESC"]{
  background:rgba(20,35,50,.95);
  border-color:rgba(0,212,255,.2);
  color:var(--c1);
  box-shadow:0 1px 0 rgba(0,0,0,.4),inset 0 0 8px rgba(0,212,255,.04);
}
.key:hover{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.22);color:var(--brt)}
.key.kdown{
  background:rgba(0,212,255,.16);border-color:var(--c1);color:var(--c1);
  box-shadow:0 0 14px rgba(0,212,255,.35),inset 0 0 6px rgba(0,212,255,.08);
  transform:translateY(1px);
}
.key.klit{
  background:rgba(0,255,157,.08);border-color:rgba(0,255,157,.35);color:var(--g1);
  box-shadow:0 0 10px rgba(0,255,157,.25);
}

/* ══════════ GLOW BUTTON ══════════ */
.glow-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 16px;border-radius:999px;
  background:rgba(0,255,157,.08);border:1px solid rgba(0,255,157,.3);
  color:var(--g1);font-size:9px;letter-spacing:2px;
  font-family:'Share Tech Mono',monospace;cursor:pointer;transition:all .25s ease;
}
.glow-btn:hover{
  background:rgba(0,255,157,.15);
  box-shadow:0 0 20px rgba(0,255,157,.3),0 0 40px rgba(0,255,157,.1);
  border-color:rgba(0,255,157,.6);
}
.glow-btn-cyan{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.3);color:var(--c1)}
.glow-btn-cyan:hover{
  background:rgba(0,212,255,.15);
  box-shadow:0 0 20px rgba(0,212,255,.3),0 0 40px rgba(0,212,255,.1);
  border-color:rgba(0,212,255,.6);
}
</style>
</head>
<body>

<!-- animated film grain (SVG feTurbulence) -->
<svg id="grain" xmlns="http://www.w3.org/2000/svg">
  <filter id="gf" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" stitchTiles="stitch">
      <animate attributeName="seed" values="0;7;14;3;11;5;0" dur="0.6s" repeatCount="indefinite"/>
    </feTurbulence>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#gf)" opacity="0.22"/>
</svg>

<div class="cbr tl"></div><div class="cbr tr"></div>
<div class="cbr bl"></div><div class="cbr br"></div>

<!-- ══════════ BOOT ══════════ -->
<div id="boot">
  <div id="boot-logo">OPHTXN OS</div>
  <div id="boot-sub">COMMAND CENTER // BUILD 2.0.1 // THE CONSTRUCT</div>
  <div id="boot-log"></div>
  <div id="bbar-wrap">
    <div id="bbar-lbl">INITIALIZING... 0%</div>
    <div id="bbar-track"><div id="bbar-fill"></div></div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="brand">
      <!-- OPHTXN reticle / eye-ring mark -->
      <svg class="brand-mark" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="9.5" stroke="currentColor" stroke-width="1" opacity="0.5"/>
        <line x1="11" y1="0.5" x2="11" y2="4" stroke="currentColor" stroke-width="1.2"/>
        <line x1="11" y1="18" x2="11" y2="21.5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="0.5" y1="11" x2="4" y2="11" stroke="currentColor" stroke-width="1.2"/>

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
async function runBoot() {
  const log = $('boot-log');
  const bar = $('bbar-fill');
  const lbl = $('bbar-lbl');

  for (let i = 0; i < BOOT_LINES.length; i++) {
    const d = document.createElement('div');
    d.className = `bl ${BOOT_LINES[i].c}`;
    d.textContent = BOOT_LINES[i].t;
    log.appendChild(d);
    requestAnimationFrame(() => d.classList.add('on'));
    const p = Math.round(((i+1)/BOOT_LINES.length)*100);
    bar.style.width = p+'%';
    lbl.textContent = `INITIALIZING... ${p}%`;
    await sleep(58 + Math.random()*46);
  }

  await sleep(380);
  lbl.textContent = 'BOOT COMPLETE — LAUNCHING INTERFACE';
  await sleep(420);
  $('boot').classList.add('out');
  $('app').classList.add('on');
  setTimeout(() => { $('boot').style.display='none'; }, 750);
  startApp();
}

// ── CLOCK ────────────────────────────────────────────
const t0 = Date.now();
function startClock() {
  setInterval(() => {
    $('hclock').textContent = new Date().toTimeString().slice(0,8);
    const up = (Date.now()-t0)/1000|0;
    const pad = n => String(n).padStart(2,'0');
    $('hup').textContent = `UP ${pad(up/3600|0)}:${pad(up%3600/60|0)}:${pad(up%60)}`;
  }, 1000);
}

// ── AGENTS ──────────────────────────────────────────
function buildAgentList() {
  $('alist').innerHTML = AGENTS.map(a => {
    const isMaxx = a.id === 'maxx-claw';
    const bc = isMaxx ? 'bm' : `b${a.status[0].toLowerCase()}`;
    return `
    <div class="arow" id="arow-${a.id}">
      <div class="adot" style="background:${a.color};box-shadow:0 0 8px ${a.color}80"></div>
      <div class="ainf">

        <div class="arole">${a.role}</div>
      </div>
      <div class="abadge ${bc}" id="abadge-${a.id}">${a.status}</div>
    </div>`;
  }).join('');
}

// ── METERS ──────────────────────────────────────────
function buildMeters() {
  $('meters').innerHTML = METERS.map(m => `
    <div class="mrow">
      <div class="mlabel"><span>${m.lbl}</span><span id="mv-${m.lbl}">${m.v}%</span></div>
      <div class="mtrack"><div class="mfill ${m.cls}" id="mf-${m.lbl}" style="width:${m.v}%"></div></div>
    </div>`).join('');
}
function startMeters() {
  setInterval(() => {
    METERS.forEach(m => {
      m.v = Math.max(4, Math.min(96, m.v + (Math.random()-.5)*9));
      const v = Math.round(m.v);
      $(`mf-${m.lbl}`).style.width = v+'%';
      $(`mv-${m.lbl}`).textContent = v+'%';
    });
  }, 2200);
}

// ── KEYBOARD ────────────────────────────────────────
function buildKeyboard() {
  $('kb').innerHTML = KEYS.map(row => `
    <div class="krow">${row.map(k => {
      const w = KEY_W[k]||1;
      const s = w>6?`min-width:${w*30}px`:w>1?`min-width:${w*26}px`:'';
      return `<div class="key" data-k="${k}" style="${s}">${k}</div>`;
    }).join('')}</div>`).join('');

  document.addEventListener('keydown', e => {
    const k = e.key===' '?'SPACE':e.key.toUpperCase();
    document.querySelectorAll(`.key[data-k="${k}"]`).forEach(el=>el.classList.add('kdown'));
  });
  document.addEventListener('keyup', e => {
    const k = e.key===' '?'SPACE':e.key.toUpperCase();
    document.querySelectorAll(`.key[data-k="${k}"]`).forEach(el=>el.classList.remove('kdown'));
  });
  setInterval(() => {
    const all = document.querySelectorAll('.key');
    const k = all[Math.random()*all.length|0];
    k.classList.add('klit');
    setTimeout(() => k.classList.remove('klit'), 170);
  }, 260);
}

// ── TERMINAL ────────────────────────────────────────
function buildTerminal() {
  const p = $('tp-term');
  TERM_INIT.forEach(l => {
    const d = document.createElement('div');
    if (l.pr !== undefined) {
      d.innerHTML = `<span class="tprompt">${l.pr} </span><span class="tcmd">${l.cmd}</span>`;
    } else if (l.arc !== undefined) {
      d.className='tarc'; d.textContent=l.arc;
    } else {
      d.className='tout'; d.textContent=l.out;
    }
    p.appendChild(d);
  });
  const cl = document.createElement('div');
  cl.innerHTML = `<span class="tprompt">ophtxn@node-01:~$</span> <span class="tcursor"></span>`;
  p.appendChild(cl);
}

let typing=false, tIdx=0;
function startTermLive() {
  setInterval(async () => {
    if(typing) return; typing=true;
    const p = $('tp-term');
    const cursor = p.querySelector('.tcursor');
    if(!cursor){ typing=false; return; }
    const line = TERM_LIVE[tIdx++ % TERM_LIVE.length];
    const cs = document.createElement('span');
    cs.className='tcmd';
    cursor.parentElement.insertBefore(cs, cursor);
    for(const ch of line){ cs.textContent+=ch; await sleep(26+Math.random()*18); }
    cursor.remove();
    const out = document.createElement('div');
    out.className='tout';
    out.textContent=`> dispatched  [${new Date().toTimeString().slice(0,8)}]`;
    p.appendChild(out);
    const nl = document.createElement('div');
    nl.innerHTML=`<span class="tprompt">ophtxn@node-01:~$</span> <span class="tcursor"></span>`;
    p.appendChild(nl);
    p.scrollTop=p.scrollHeight; typing=false;
  }, 4200);
}

  const wsEl=$('workstations');

      </div>`;
  });
  renderRobots();

  let drag=false,sx=0,sy=0,rx=22,ry=-12;
  const inner=$('room-inner');
  p.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sy=e.clientY});

    if(!drag)return;
    ry+=(e.clientX-sx)*.35; rx-=(e.clientY-sy)*.35;
    rx=Math.max(-5,Math.min(45,rx));
    inner.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
    sx=e.clientX;sy=e.clientY;
  });
  window.addEventListener('mouseup',()=>drag=false);
}

function renderRobots() {
  const el=$('robots'); if(!el) return;
  el.innerHTML=AGENTS.map((a,i)=>{
    const pos=agentPos[i]; const c=a.color;
    return `<div class="robot" id="rb-${a.id}" style="left:${pos.x+6}px;top:${pos.y-12}px">

function startAgentBehavior() {
  setInterval(()=>{
    const i=Math.random()*AGENTS.length|0;
    const nw=Math.random()*WS.length|0;
    agentPos[i]={...WS[nw]};
    const rb=$(`rb-${AGENTS[i].id}`);
    if(rb){rb.style.left=(WS[nw].x+6)+'px';rb.style.top=(WS[nw].y-12)+'px';}
    if(Math.random()>.55){
      const st=['ACTIVE','IDLE','SYNC'][Math.random()*3|0];
      AGENTS[i].status=st;
      const b=$(`abadge-${AGENTS[i].id}`);
      if(b){
        // MAXX CLAW keeps amber badge regardless of status label
        const isMaxx = AGENTS[i].id==='maxx-claw';
        b.textContent=st;
        b.className=`abadge ${isMaxx?'bm':'b'+st[0].toLowerCase()}`;
      }
    }
  },5000);
}

          <ellipse cx="${n.x}" cy="${n.y}" rx="24" ry="7" fill="none" stroke="${n.color}" stroke-width=".5" opacity=".06">

            <animate attributeName="opacity" values=".1;0;.1" dur="${1.8+Math.random()}s" repeatCount="indefinite"/>
          </ellipse>
          <circle cx="${n.x}" cy="${n.y}" r="15" fill="rgba(3,8,12,.88)" stroke="${n.color}" stroke-width="1.5"/>
          <text x="${n.x}" y="${n.y+4}" text-anchor="middle"
            fill="${n.color}" font-family="Share Tech Mono" font-size="7">${n.name.split(' ')[0]}</text>`).join('')}
      </svg>
      <div>
        <div style="color:var(--brt);font-size:9px;letter-spacing:1px;margin-bottom:8px;font-weight:600;font-family:'Space Grotesk',sans-serif">ACTIVE CONNECTIONS</div>
        ${AGENTS.map(a=>`
          <div class="nrow">
            <span style="color:${a.color};font-weight:600;font-size:10px;font-family:'Space Grotesk',sans-serif">${a.name}</span>
            <span style="color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:9px">${20+Math.random()*80|0} pkt/s</span>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── TABS ────────────────────────────────────────────
function initTabs() {
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
      document.querySelectorAll('.tpane').forEach(p=>p.classList.remove('on'));
      tab.classList.add('on');
      $(`tp-${tab.dataset.t}`).classList.add('on');
    });
  });
}

// ═══════════════════════════════════════════════════════
//  GO
// ═══════════════════════════════════════════════════════
runBoot();
</script>
</body>
</html>
