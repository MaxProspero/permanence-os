<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPHTXN // COMMAND CENTER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#03080c;
  --g1:#00ff9d;   /* green */
  --c1:#00d4ff;   /* cyan */
  --p1:#ff2d78;   /* pink */
  --go:#ffd700;   /* gold */
  --pu:#b464ff;   /* purple */
  --or:#ff8c00;   /* orange */
  --tx:#6aa8bc;   /* dim text */
  --brt:#d0e8f0;  /* bright text */
  --glass:rgba(7,18,28,0.72);
  --gborder:rgba(0,212,255,0.12);
  --gborder2:rgba(0,255,157,0.15);
  --rad:12px;
}

html,body{
  width:100%;height:100%;background:var(--bg);
  color:var(--tx);overflow:hidden;user-select:none;
  font-family:'Inter',sans-serif;
}

/* deep grid bg */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,212,255,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,.035) 1px, transparent 1px);
  background-size:40px 40px;
}

/* scanlines */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.045) 2px,rgba(0,0,0,.045) 4px);
}

/* corner brackets */
.cbr{position:fixed;width:22px;height:22px;pointer-events:none;z-index:900;opacity:.7}
.cbr.tl{top:6px;left:6px;border-top:1.5px solid var(--c1);border-left:1.5px solid var(--c1)}
.cbr.tr{top:6px;right:6px;border-top:1.5px solid var(--c1);border-right:1.5px solid var(--c1)}
.cbr.bl{bottom:6px;left:6px;border-bottom:1.5px solid var(--c1);border-left:1.5px solid var(--c1)}
.cbr.br{bottom:6px;right:6px;border-bottom:1.5px solid var(--c1);border-right:1.5px solid var(--c1)}

/* ══════════ BOOT ══════════ */
#boot{
  position:fixed;inset:0;background:#000;z-index:1000;
  display:flex;flex-direction:column;padding:52px 64px;
  font-family:'Share Tech Mono',monospace;font-size:13px;line-height:2.1;
}
#boot-logo{
  font-family:'Orbitron',monospace;font-weight:900;font-size:40px;
  color:var(--g1);letter-spacing:12px;text-shadow:0 0 40px rgba(0,255,157,.65);
  margin-bottom:2px;
}
#boot-sub{font-size:10px;color:var(--tx);letter-spacing:5px;margin-bottom:36px;opacity:.7}
#boot-log{flex:1;overflow:hidden}
.bl{opacity:0;transition:opacity .07s ease}
.bl.on{opacity:1}
.bl-ok{color:var(--g1)}.bl-info{color:var(--tx)}.bl-sys{color:var(--c1)}.bl-err{color:var(--p1)}
#bbar-wrap{margin-top:24px}
#bbar-lbl{font-size:10px;color:var(--g1);margin-bottom:8px;letter-spacing:2px}
#bbar-track{width:100%;height:1px;background:#0d2233;border-radius:4px;overflow:hidden}
#bbar-fill{height:100%;width:0%;background:var(--g1);box-shadow:0 0 12px var(--g1);transition:width .07s linear}
#boot.out{animation:bOut .65s ease forwards}
@keyframes bOut{to{opacity:0;pointer-events:none}}

/* ══════════ APP GRID ══════════ */
#app{
  position:relative;z-index:1;
  width:100vw;height:100vh;
  display:grid;
  grid-template-rows:44px 1fr 152px;
  grid-template-columns:236px 1fr 212px;
  gap:6px;padding:6px;
  opacity:0;transition:opacity .9s ease;
}
#app.on{opacity:1}

/* ══════════ GLASS PANEL ══════════ */
.pnl{
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--gborder);
  border-radius:var(--rad);
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}
/* uiverse-style animated neon border glow on hover */
.pnl::before{
  content:'';position:absolute;inset:-1px;border-radius:calc(var(--rad) + 1px);
  background:linear-gradient(135deg,rgba(0,212,255,.0),rgba(0,255,157,.0));
  transition:background .4s ease;pointer-events:none;z-index:0;
}
.pnl:hover::before{
  background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(0,255,157,.06));
}
.pnl>*{position:relative;z-index:1}

.ph{
  padding:8px 12px;border-bottom:1px solid var(--gborder);
  font-size:9px;color:var(--c1);letter-spacing:2.5px;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
  font-family:'Share Tech Mono',monospace;
}
.pb{flex:1;overflow-y:auto;padding:8px 10px;font-size:11px}
.pb::-webkit-scrollbar{width:2px}
.pb::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px}

/* ══════════ TOP BAR ══════════ */
#topbar{
  grid-column:1/-1;
  background:rgba(3,8,12,.8);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid var(--gborder);
  border-radius:var(--rad);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
}
.brand{
  font-family:'Orbitron',monospace;font-weight:700;font-size:15px;
  color:var(--g1);letter-spacing:5px;text-shadow:0 0 16px rgba(0,255,157,.5);
}
.hud-mid{display:flex;gap:16px;align-items:center;font-size:11px;font-family:'Share Tech Mono',monospace}
.hdiv{width:1px;height:14px;background:rgba(0,212,255,.15)}
.hud-right{display:flex;gap:16px;align-items:center;font-size:10px;font-family:'Share Tech Mono',monospace}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.sg{background:var(--g1);box-shadow:0 0 8px var(--g1);animation:spulse 2.2s infinite}
.sc{background:var(--c1);box-shadow:0 0 8px var(--c1)}
@keyframes spulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ══════════ LEFT PANEL ══════════ */
#pl{grid-row:2;grid-column:1}
.arow{
  display:flex;align-items:center;gap:9px;padding:8px 2px;
  border-bottom:1px solid rgba(13,34,51,.5);cursor:pointer;
  border-radius:6px;padding:7px 4px;
  transition:background .18s ease;
}
.arow:last-child{border:none}
.arow:hover{background:rgba(0,212,255,.04)}
.adot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ainf{flex:1}
/* Apple SF-style typography hierarchy */
.aname{font-size:12px;color:var(--brt);font-weight:600;letter-spacing:.3px}
.arole{font-size:9px;color:var(--tx);font-weight:400;margin-top:1px}
/* uiverse pill badge */
.abadge{
  font-size:8px;padding:3px 8px;border-radius:999px;letter-spacing:1.5px;
  font-family:'Share Tech Mono',monospace;font-weight:400;
  transition:all .2s ease;
}
.ba{background:rgba(0,255,157,.1);color:var(--g1);border:1px solid rgba(0,255,157,.25);box-shadow:0 0 8px rgba(0,255,157,.12)}
.bi{background:rgba(107,168,188,.06);color:var(--tx);border:1px solid rgba(107,168,188,.15)}
.bs{background:rgba(0,212,255,.1);color:var(--c1);border:1px solid rgba(0,212,255,.25);box-shadow:0 0 8px rgba(0,212,255,.12)}

#meters-wrap{padding:10px;border-top:1px solid var(--gborder);flex-shrink:0}
.sys-label{font-size:8px;color:var(--tx);letter-spacing:2px;font-family:'Share Tech Mono',monospace;margin-bottom:8px;opacity:.7}
.mrow{margin-bottom:9px}
.mlabel{display:flex;justify-content:space-between;font-size:9px;color:var(--tx);margin-bottom:4px;font-family:'Share Tech Mono',monospace}
/* Apple-style capsule meter */
.mtrack{height:4px;background:rgba(255,255,255,.05);border-radius:999px;overflow:hidden}
.mfill{height:100%;border-radius:999px;transition:width 1.4s cubic-bezier(.25,.46,.45,.94)}
.fg{background:linear-gradient(90deg,#00cc7a,var(--g1));box-shadow:0 0 8px rgba(0,255,157,.4)}
.fc{background:linear-gradient(90deg,#00a8d0,var(--c1));box-shadow:0 0 8px rgba(0,212,255,.4)}
.fp{background:linear-gradient(90deg,#cc1a5a,var(--p1));box-shadow:0 0 8px rgba(255,45,120,.4)}
.fgo{background:linear-gradient(90deg,#ccaa00,var(--go));box-shadow:0 0 8px rgba(255,215,0,.4)}

/* ══════════ CENTER PANEL ══════════ */
#pc{grid-row:2;grid-column:2;display:flex;flex-direction:column}

/* Apple segmented control tabs */
.tabbar{
  display:flex;padding:6px;gap:2px;border-bottom:1px solid var(--gborder);flex-shrink:0;
}
.tab{
  flex:1;padding:5px 10px;font-size:9px;letter-spacing:2px;color:var(--tx);
  cursor:pointer;border-radius:8px;transition:all .2s ease;text-align:center;
  font-family:'Share Tech Mono',monospace;
}
.tab.on{
  background:rgba(0,212,255,.12);color:var(--c1);
  border:1px solid rgba(0,212,255,.2);box-shadow:0 0 12px rgba(0,212,255,.08);
}
.tab:hover:not(.on){background:rgba(255,255,255,.03);color:var(--brt)}
.tpane{display:none;flex:1;overflow:hidden}
.tpane.on{display:flex;flex-direction:column}

/* terminal */
#tp-term{overflow-y:auto;padding:12px 14px;font-size:12px;line-height:1.8;font-family:'Share Tech Mono',monospace}
#tp-term::-webkit-scrollbar{width:2px}
#tp-term::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px}
.tprompt{color:var(--g1)}.tcmd{color:var(--brt)}.tout{color:var(--tx);opacity:.75;font-size:11px}
.tcursor{display:inline-block;width:8px;height:14px;background:var(--g1);vertical-align:text-bottom;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* agents 3d */
#tp-agents{align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:grab}
#tp-agents:active{cursor:grabbing}
#room{position:relative;width:560px;height:340px;perspective:950px;flex-shrink:0}
#room-inner{width:100%;height:100%;transform-style:preserve-3d;transform:rotateX(22deg) rotateY(-12deg)}
#floor{
  position:absolute;width:480px;height:320px;left:40px;top:60px;
  transform-style:preserve-3d;transform:rotateX(84deg);
  background:linear-gradient(rgba(0,212,255,.1) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.1) 1px,transparent 1px);
  background-size:40px 40px;border:1px solid rgba(0,212,255,.2);
}
.ws{position:absolute;width:64px;height:52px}
.ws-screen{position:absolute;width:42px;height:28px;bottom:28px;left:11px;
  background:linear-gradient(135deg,#001020,#002844);border:1px solid;
  display:flex;align-items:center;justify-content:center;font-size:6px;letter-spacing:1px;border-radius:3px}
.ws-desk{position:absolute;width:64px;height:8px;bottom:16px;background:#0d1e2e;
  border:1px solid #0d3050;border-radius:2px;box-shadow:0 0 10px rgba(0,212,255,.12)}
.robot{position:absolute;transform-style:preserve-3d;transition:left 1.8s cubic-bezier(.25,.46,.45,.94),top 1.8s cubic-bezier(.25,.46,.45,.94)}
.rh{position:absolute;width:18px;height:15px;top:0;left:5px;border:2px solid;background:rgba(0,0,0,.5);border-radius:3px}
.reye{position:absolute;width:4px;height:4px;border-radius:50%;top:4px}
.reye.l{left:2px}.reye.r{right:2px}
.rant{position:absolute;width:2px;height:8px;top:-10px;left:50%;transform:translateX(-50%)}
.rant-dot{width:5px;height:5px;border-radius:50%;position:absolute;top:-3px;left:-1.5px;animation:spulse 1.5s infinite}
.rb{position:absolute;width:24px;height:24px;top:17px;left:2px;border:2px solid;background:rgba(0,0,0,.4);border-radius:3px}
.ra{position:absolute;width:6px;height:18px;top:19px;border:1px solid;background:rgba(0,0,0,.3);border-radius:2px}
.ra.l{left:-5px}.ra.r{right:-5px}
.rl{position:absolute;width:8px;height:14px;top:43px;border:1px solid;background:rgba(0,0,0,.3);border-radius:2px}
.rl.l{left:4px}.rl.r{right:4px}

/* network pane */
#tp-net{overflow-y:auto;padding:12px 14px}
.nrow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(13,34,51,.5);font-size:10px}
.nname{color:var(--brt);font-weight:500}.ncpu{color:var(--g1);font-family:'Share Tech Mono',monospace;font-size:9px}

/* ══════════ RIGHT PANEL ══════════ */
#pr{grid-row:2;grid-column:3}
.prow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;
  border-bottom:1px solid rgba(13,34,51,.5);font-size:10px}
.pname{color:var(--brt);font-weight:500;font-size:10px}.pcpu{color:var(--g1);font-family:'Share Tech Mono',monospace;font-size:9px}
.nirow{padding:5px 0;border-bottom:1px solid rgba(13,34,51,.5)}
.nilabel{font-size:8px;color:var(--tx);font-family:'Share Tech Mono',monospace;letter-spacing:1px}
.nival{color:var(--c1);font-size:12px;font-weight:600;font-family:'Share Tech Mono',monospace}

/* ══════════ KEYBOARD ══════════ */
#kb{
  grid-row:3;grid-column:1/-1;
  background:rgba(4,10,16,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--gborder);border-radius:var(--rad);
  padding:8px 10px 10px;display:flex;flex-direction:column;gap:5px;
}
.krow{display:flex;gap:4px;justify-content:center}
/* Apple keyboard style keys */
.key{
  height:31px;min-width:31px;padding:0 7px;
  background:rgba(15,28,40,.9);
  border:1px solid rgba(0,212,255,.1);
  border-bottom:2px solid rgba(0,212,255,.18);
  border-radius:7px;
  font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--tx);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .07s ease;letter-spacing:.3px;
  box-shadow:0 1px 0 rgba(0,0,0,.4);
}
.key:hover{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.22);color:var(--brt)}
/* uiverse-style glow on active */
.key.kdown{
  background:rgba(0,212,255,.16);border-color:var(--c1);color:var(--c1);
  box-shadow:0 0 14px rgba(0,212,255,.35),inset 0 0 6px rgba(0,212,255,.08);
  transform:translateY(1px);
}
.key.klit{
  background:rgba(0,255,157,.08);border-color:rgba(0,255,157,.35);color:var(--g1);
  box-shadow:0 0 10px rgba(0,255,157,.25);
}

/* ══════════ UIVERSE GLOW BUTTON ══════════ */
/* inspired by uiverse.io neon button style */
.glow-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 16px;border-radius:999px;
  background:rgba(0,255,157,.08);
  border:1px solid rgba(0,255,157,.3);
  color:var(--g1);font-size:9px;letter-spacing:2px;
  font-family:'Share Tech Mono',monospace;cursor:pointer;
  transition:all .25s ease;
  box-shadow:0 0 0 0 rgba(0,255,157,.0);
}
.glow-btn:hover{
  background:rgba(0,255,157,.15);
  box-shadow:0 0 20px rgba(0,255,157,.3),0 0 40px rgba(0,255,157,.1),inset 0 0 10px rgba(0,255,157,.05);
  border-color:rgba(0,255,157,.6);
}
.glow-btn-cyan{
  background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.3);color:var(--c1);
}
.glow-btn-cyan:hover{
  background:rgba(0,212,255,.15);
  box-shadow:0 0 20px rgba(0,212,255,.3),0 0 40px rgba(0,212,255,.1);
  border-color:rgba(0,212,255,.6);
}
</style>
</head>
<body>

<div class="cbr tl"></div><div class="cbr tr"></div>
<div class="cbr bl"></div><div class="cbr br"></div>

<!-- ══════════ BOOT ══════════ -->
<div id="boot">
  <div id="boot-logo">OPHTXN OS</div>
  <div id="boot-sub">COMMAND CENTER // BUILD 2.0.1</div>
  <div id="boot-log"></div>
  <div id="bbar-wrap">
    <div id="bbar-lbl">INITIALIZING... 0%</div>
    <div id="bbar-track"><div id="bbar-fill"></div></div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="brand">OPHTXN</div>
    <div class="hud-mid">
      <span id="hclock" style="color:var(--brt)">--:--:--</span>
      <div class="hdiv"></div>
      <span>HOST: ophtxn-node-01</span>
      <div class="hdiv"></div>
      <span>KERNEL: permanence-2.0.1</span>
    </div>
    <div class="hud-right">
      <span><span class="sdot sg"></span>NET ONLINE</span>
      <span><span class="sdot sc"></span>6 AGENTS</span>
      <span id="hup" style="color:rgba(0,212,255,.35)">UP 00:00:00</span>
      <a href="rooms.html" style="text-decoration:none">
        <div class="glow-btn glow-btn-cyan" style="padding:4px 12px;font-size:8px">ROOMS</div>
      </a>
    </div>
  </div>

  <!-- LEFT: AGENTS + METERS -->
  <div class="pnl" id="pl">
    <div class="ph"><span>AGENT ROSTER</span><span style="color:var(--g1)" id="acount">6 ONLINE</span></div>
    <div class="pb" id="alist"></div>
    <div id="meters-wrap">
      <div class="sys-label">SYSTEM</div>
      <div id="meters"></div>
    </div>
  </div>

  <!-- CENTER: TABS -->
  <div class="pnl" id="pc">
    <div class="tabbar">
      <div class="tab on" data-t="term">TERMINAL</div>
      <div class="tab" data-t="agents">AGENTS_3D</div>
      <div class="tab" data-t="net">NETWORK</div>
    </div>
    <div class="tpane on" id="tp-term"></div>
    <div class="tpane" id="tp-agents"></div>
    <div class="tpane" id="tp-net"></div>
  </div>

  <!-- RIGHT: PROCESSES + NET I/O -->
  <div class="pnl" id="pr">
    <div class="ph"><span>PROCESSES</span><span id="pcount" style="color:var(--tx)">8 PROC</span></div>
    <div class="pb" id="plist" style="overflow-y:auto"></div>
    <div style="border-top:1px solid var(--gborder);flex-shrink:0">
      <div class="ph" style="font-size:8px">NETWORK I/O</div>
      <div class="pb" id="nlist" style="overflow-y:auto"></div>
    </div>
  </div>

  <!-- KEYBOARD -->
  <div id="kb"></div>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════
const AGENTS = [
  {id:'atlas', name:'ATLAS',  role:'Orchestrator', color:'#3978ff', status:'ACTIVE'},

  {id:'nexus', name:'NEXUS',  role:'Networking',   color:'#00d4ff', status:'IDLE'},
];

const BOOT_LINES = [
  {t:'BIOS VERSION 2.0.1 — OPHTXN SYSTEMS',      c:'bl-info'},
  {t:'[  0.000] CPU: OPHTXN-CORE ×8 @ 3.6GHz',  c:'bl-ok'},
  {t:'[  0.001] RAM: 32768MB DDR5 ECC',           c:'bl-ok'},
  {t:'[  0.003] NVMe: PERMANENCE-STORE 2TB',      c:'bl-ok'},
  {t:'[  0.012] NET: MESH-ETH0 1000Mbps UP',      c:'bl-ok'},
  {t:'[  0.020] Mounting PERMANENCE_FS ...',      c:'bl-info'},
  {t:'[  0.022] /sys/perm mounted OK',            c:'bl-ok'},
  {t:'[  0.030] Loading agent runtime v2.0 ...', c:'bl-info'},
  {t:'[  0.041] Spawning ATLAS  (orchestrator)',  c:'bl-sys'},
  {t:'[  0.042] Spawning SAGE   (analysis)',      c:'bl-sys'},
  {t:'[  0.043] Spawning CIPHER (encryption)',    c:'bl-sys'},
  {t:'[  0.044] Spawning ECHO   (comms)',         c:'bl-sys'},
  {t:'[  0.045] Spawning NOVA   (generation)',    c:'bl-sys'},
  {t:'[  0.046] Spawning NEXUS  (networking)',    c:'bl-sys'},
  {t:'[  0.060] All agents nominal',              c:'bl-ok'},
  {t:'[  0.070] Starting command center UI ...',  c:'bl-info'},
  {t:'[  0.099] OPHTXN OS ready. Welcome back.', c:'bl-sys'},
];

const KEYS = [
  ['ESC','F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12','DEL'],
  ['`','1','2','3','4','5','6','7','8','9','0','-','=','BKSP'],
  ['TAB','Q','W','E','R','T','Y','U','I','O','P','[',']','\\'],
  ['CAPS','A','S','D','F','G','H','J','K','L',';',"'",'ENTER'],
  ['SHIFT','Z','X','C','V','B','N','M',',','.','/','SHIFT↑'],
  ['CTRL','ALT','⌘','SPACE','⌘','ALT','←','↑','↓','→'],
];
const KEY_W = {BKSP:1.9,TAB:1.9,CAPS:2.1,ENTER:2.7,SHIFT:2.8,'SHIFT↑':2.8,CTRL:1.7,ALT:1.5,'⌘':1.7,SPACE:7.5,'\\':1.5};

const TERM_INIT = [
  {pr:'ophtxn@node-01:~$', cmd:'agent-ctl status --all'},
  {out:'● atlas   ACTIVE  pid:1001  cpu:12%  mem:256MB'},
  {out:'● sage    ACTIVE  pid:1002  cpu:8%   mem:192MB'},
  {out:'○ cipher  IDLE    pid:1003  cpu:0%   mem:128MB'},
  {out:'◎ echo    SYNC    pid:1004  cpu:4%   mem:160MB'},
  {out:'● nova    ACTIVE  pid:1005  cpu:22%  mem:384MB'},
  {out:'○ nexus   IDLE    pid:1006  cpu:1%   mem:96MB'},
  {pr:'ophtxn@node-01:~$', cmd:'perm-store info'},
  {out:'PERMANENCE_FS v2.0  mounted  1.4TB / 2.0TB  OK'},
  {pr:'ophtxn@node-01:~$', cmd:'net status --verbose'},
  {out:'MESH  ↑ UP  192.168.1.1  1000Mbps'},
  {out:'VPN   ↑ UP  10.0.0.1    stable  ping:4ms'},
  {out:'EXT   ↑ UP  8.8.8.8     ping:12ms'},
  {pr:'ophtxn@node-01:~$', cmd:''},
];

const TERM_LIVE = [
  'nova generate --model claude-sonnet-4-6 --prompt "daily brief"',
  'atlas orchestrate --workflow morning-sync',
  'sage analyze --source /sys/perm/data --depth 3',
  'echo broadcast --channel ops --msg "agents nominal"',
  'perm-store sync --incremental',
  'nexus map --topology full',
  'cipher rotate-keys --agent all',
];

const PROCS = [
  {n:'atlas-orch',c:12},{n:'sage-anlyz',c:8},{n:'nova-gen',c:22},
  {n:'echo-comms',c:4},{n:'perm-store',c:3},{n:'net-mesh',c:1},
  {n:'cmd-center',c:2},{n:'kernel',c:0},
];

const METERS = [
  {lbl:'CPU',cls:'fg',v:34},{lbl:'MEM',cls:'fc',v:61},
  {lbl:'NET',cls:'fp',v:18},{lbl:'DSK',cls:'fgo',v:47},
];

const WS = [
  {x:50,y:50},{x:210,y:50},{x:370,y:50},
  {x:50,y:210},{x:210,y:210},{x:370,y:210},
];

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
const sleep = ms => new Promise(r => setTimeout(r, ms));
const $ = id => document.getElementById(id);
let agentPos = AGENTS.map((_,i) => ({...WS[i]}));

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
async function runBoot() {
  const log = $('boot-log');
  const bar = $('bbar-fill');
  const lbl = $('bbar-lbl');

  for (let i = 0; i < BOOT_LINES.length; i++) {
    const d = document.createElement('div');
    d.className = `bl ${BOOT_LINES[i].c}`;
    d.textContent = BOOT_LINES[i].t;
    log.appendChild(d);
    requestAnimationFrame(() => d.classList.add('on'));
    const p = Math.round(((i+1)/BOOT_LINES.length)*100);
    bar.style.width = p+'%';
    lbl.textContent = `INITIALIZING... ${p}%`;
    await sleep(72 + Math.random()*52);
  }

  await sleep(380);
  lbl.textContent = 'BOOT COMPLETE — LAUNCHING INTERFACE';
  await sleep(420);
  $('boot').classList.add('out');
  $('app').classList.add('on');
  setTimeout(() => { $('boot').style.display='none'; }, 750);
  startApp();
}

// ═══════════════════════════════════════════════════════
//  APP INIT
// ═══════════════════════════════════════════════════════
function startApp() {
  buildAgentList(); buildMeters(); buildKeyboard();
  buildTerminal(); buildProcesses(); buildNetIO();
  buildAgents3D(); buildNetPane();
  startClock(); startMeters(); startTermLive(); startAgentBehavior();
  initTabs();
}

// ── CLOCK ───────────────────────────────────────────
const t0 = Date.now();
function startClock() {
  setInterval(() => {
    $('hclock').textContent = new Date().toTimeString().slice(0,8);
    const up = (Date.now()-t0)/1000|0;
    const pad = n => String(n).padStart(2,'0');
    $('hup').textContent = `UP ${pad(up/3600|0)}:${pad(up%3600/60|0)}:${pad(up%60)}`;
  }, 1000);
}

// ── AGENTS ──────────────────────────────────────────
function buildAgentList() {
  $('alist').innerHTML = AGENTS.map(a => `
    <div class="arow" id="arow-${a.id}">
      <div class="adot" style="background:${a.color};box-shadow:0 0 8px ${a.color}80"></div>
      <div class="ainf">
        <div class="aname">${a.name}</div>
        <div class="arole">${a.role}</div>
      </div>
      <div class="abadge b${a.status[0].toLowerCase()}" id="abadge-${a.id}">${a.status}</div>
    </div>`).join('');
}

// ── METERS ──────────────────────────────────────────
function buildMeters() {
  $('meters').innerHTML = METERS.map(m => `
    <div class="mrow">
      <div class="mlabel"><span>${m.lbl}</span><span id="mv-${m.lbl}">${m.v}%</span></div>
      <div class="mtrack"><div class="mfill ${m.cls}" id="mf-${m.lbl}" style="width:${m.v}%"></div></div>
    </div>`).join('');
}
function startMeters() {
  setInterval(() => {
    METERS.forEach(m => {
      m.v = Math.max(4, Math.min(96, m.v + (Math.random()-.5)*9));
      const v = Math.round(m.v);
      $(`mf-${m.lbl}`).style.width = v+'%';
      $(`mv-${m.lbl}`).textContent = v+'%';
    });
  }, 2200);
}

// ── KEYBOARD ────────────────────────────────────────
function buildKeyboard() {
  $('kb').innerHTML = KEYS.map(row => `
    <div class="krow">${row.map(k => {
      const w = KEY_W[k]||1;
      const s = w>6?`min-width:${w*30}px`:w>1?`min-width:${w*26}px`:'';
      return `<div class="key" data-k="${k}" style="${s}">${k}</div>`;
    }).join('')}</div>`).join('');

  document.addEventListener('keydown', e => {
    const k = e.key===' '?'SPACE':e.key.toUpperCase();
    document.querySelectorAll(`.key[data-k="${k}"]`).forEach(el=>el.classList.add('kdown'));
  });
  document.addEventListener('keyup', e => {
    const k = e.key===' '?'SPACE':e.key.toUpperCase();
    document.querySelectorAll(`.key[data-k="${k}"]`).forEach(el=>el.classList.remove('kdown'));
  });
  setInterval(() => {
    const all = document.querySelectorAll('.key');
    const k = all[Math.random()*all.length|0];
    k.classList.add('klit');
    setTimeout(() => k.classList.remove('klit'), 170);
  }, 260);
}

// ── TERMINAL ────────────────────────────────────────
function buildTerminal() {
  const p = $('tp-term');
  TERM_INIT.forEach(l => {
    const d = document.createElement('div');
    if (l.pr !== undefined) {
      d.innerHTML = `<span class="tprompt">${l.pr} </span><span class="tcmd">${l.cmd}</span>`;
    } else { d.className='tout'; d.textContent=l.out; }
    p.appendChild(d);
  });
  const cl = document.createElement('div');
  cl.innerHTML = `<span class="tprompt">ophtxn@node-01:~$</span> <span class="tcursor"></span>`;
  p.appendChild(cl);
}

let typing=false, tIdx=0;
function startTermLive() {
  setInterval(async () => {
    if(typing) return; typing=true;
    const p = $('tp-term');
    const cursor = p.querySelector('.tcursor');
    if(!cursor){ typing=false; return; }
    const line = TERM_LIVE[tIdx++ % TERM_LIVE.length];
    const cs = document.createElement('span');
    cs.className='tcmd';
    cursor.parentElement.insertBefore(cs, cursor);
    for(const ch of line){ cs.textContent+=ch; await sleep(28+Math.random()*18); }
    cursor.remove();
    const out = document.createElement('div');
    out.className='tout';
    out.textContent='> dispatched to runtime — awaiting result';
    p.appendChild(out);
    const nl = document.createElement('div');
    nl.innerHTML=`<span class="tprompt">ophtxn@node-01:~$</span> <span class="tcursor"></span>`;
    p.appendChild(nl);
    p.scrollTop=p.scrollHeight; typing=false;
  }, 4200);
}

// ── PROCESSES ───────────────────────────────────────
function buildProcesses() {
  $('plist').innerHTML = PROCS.map((p,i)=>`
    <div class="prow">
      <span class="pname">${p.n}</span>
      <span class="pcpu" id="pc-${i}">${p.c}%</span>
    </div>`).join('');
  setInterval(()=>{
    PROCS.forEach((p,i)=>{
      p.c=Math.max(0,Math.min(99,p.c+Math.round((Math.random()-.5)*5)));
      const el=$(`pc-${i}`); if(el) el.textContent=p.c+'%';
    });
  },2000);
}

function buildNetIO() {
  $('nlist').innerHTML=[
    {l:'↑ TX',v:'2.4 MB/s'},{l:'↓ RX',v:'8.1 MB/s'},
    {l:'PING',v:'12ms'},{l:'PKT%',v:'99.9%'},
  ].map(n=>`<div class="nirow"><div class="nilabel">${n.l}</div><div class="nival">${n.v}</div></div>`).join('');
}

// ── 3D AGENTS ───────────────────────────────────────
function buildAgents3D() {
  const p = $('tp-agents');
  p.innerHTML=`<div id="room"><div id="room-inner">
    <div id="floor"></div>
    <div id="workstations"></div>
    <div id="robots"></div>
  </div></div>`;
  const wsEl=$('workstations');
  WS.forEach((pos,i)=>{
    const a=AGENTS[i];
    wsEl.innerHTML+=`
      <div class="ws" style="left:${pos.x}px;top:${pos.y}px">
        <div class="ws-screen" style="border-color:${a.color};box-shadow:0 0 8px ${a.color}33">
          <span style="color:${a.color};opacity:.8;font-size:6px;font-family:'Share Tech Mono',monospace">${a.name}</span>
        </div>
        <div class="ws-desk"></div>
      </div>`;
  });
  renderRobots();
  let drag=false,sx=0,sy=0,rx=22,ry=-12;
  const inner=$('room-inner');
  p.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sy=e.clientY});
  window.addEventListener('mousemove',e=>{
    if(!drag)return;
    ry+=(e.clientX-sx)*.35; rx-=(e.clientY-sy)*.35;
    rx=Math.max(-5,Math.min(45,rx));
    inner.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
    sx=e.clientX;sy=e.clientY;
  });
  window.addEventListener('mouseup',()=>drag=false);
}

function renderRobots() {
  const el=$('robots'); if(!el) return;
  el.innerHTML=AGENTS.map((a,i)=>{
    const pos=agentPos[i];const c=a.color;
    return `<div class="robot" id="rb-${a.id}" style="left:${pos.x+6}px;top:${pos.y-12}px;color:${c}">
      <div class="rant" style="background:${c}"><div class="rant-dot" style="background:${c};box-shadow:0 0 6px ${c}"></div></div>
      <div class="rh" style="border-color:${c};box-shadow:0 0 8px ${c}33">
        <div class="reye l" style="background:${c};box-shadow:0 0 4px ${c}"></div>
        <div class="reye r" style="background:${c};box-shadow:0 0 4px ${c}"></div>
      </div>
      <div class="rb" style="border-color:${c};box-shadow:0 0 6px ${c}22"></div>
      <div class="ra l" style="border-color:${c}"></div><div class="ra r" style="border-color:${c}"></div>
      <div class="rl l" style="border-color:${c}"></div><div class="rl r" style="border-color:${c}"></div>
    </div>`;
  }).join('');
}

function startAgentBehavior() {
  setInterval(()=>{
    const i=Math.random()*AGENTS.length|0;
    const nw=Math.random()*WS.length|0;
    agentPos[i]={...WS[nw]};
    const rb=$(`rb-${AGENTS[i].id}`);
    if(rb){rb.style.left=(WS[nw].x+6)+'px';rb.style.top=(WS[nw].y-12)+'px';}
    if(Math.random()>.55){
      const st=['ACTIVE','IDLE','SYNC'][Math.random()*3|0];
      AGENTS[i].status=st;
      const b=$(`abadge-${AGENTS[i].id}`);
      if(b){b.textContent=st;b.className=`abadge b${st[0].toLowerCase()}`;}
    }
  },5000);
}

// ── NETWORK PANE ────────────────────────────────────
function buildNetPane() {
  const p=$('tp-net');
  const nodes=AGENTS.map((a,i)=>({x:80+(i%3)*180,y:60+Math.floor(i/3)*100,...a}));
  const edges=[[0,1],[1,2],[3,4],[4,5],[0,3],[1,4],[2,5],[0,4],[1,5]];
  p.innerHTML=`
    <div style="padding:12px 14px;display:flex;flex-direction:column;gap:14px;flex:1">
      <div style="color:var(--c1);font-size:9px;letter-spacing:2.5px;font-family:'Share Tech Mono',monospace">MESH TOPOLOGY</div>
      <svg width="520" height="210" style="overflow:visible;flex-shrink:0">
        ${edges.map(([a,b])=>`
          <line x1="${nodes[a].x}" y1="${nodes[a].y}" x2="${nodes[b].x}" y2="${nodes[b].y}"
            stroke="rgba(0,212,255,.15)" stroke-width="1" stroke-dasharray="4 4">
            <animate attributeName="stroke-dashoffset" values="0;-8" dur="0.9s" repeatCount="indefinite"/>
          </line>`).join('')}
        ${nodes.map(n=>`
          <circle cx="${n.x}" cy="${n.y}" r="18" fill="rgba(3,8,12,.85)" stroke="${n.color}" stroke-width="1.5"/>
          <circle cx="${n.x}" cy="${n.y}" r="18" fill="none" stroke="${n.color}" stroke-width="1" opacity=".2">
            <animate attributeName="r" values="18;28;18" dur="2.8s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values=".25;0;.25" dur="2.8s" repeatCount="indefinite"/>
          </circle>
          <text x="${n.x}" y="${n.y+4}" text-anchor="middle"
            fill="${n.color}" font-family="Share Tech Mono" font-size="8">${n.name}</text>`).join('')}
      </svg>
      <div>
        <div style="color:var(--brt);font-size:9px;letter-spacing:1px;margin-bottom:8px;font-weight:600">ACTIVE CONNECTIONS</div>
        ${AGENTS.map(a=>`
          <div class="nrow">
            <span style="color:${a.color};font-weight:600;font-size:11px">${a.name}</span>
            <span style="color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:9px">${20+Math.random()*80|0} pkt/s</span>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── TABS ────────────────────────────────────────────
function initTabs() {
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
      document.querySelectorAll('.tpane').forEach(p=>p.classList.remove('on'));
      tab.classList.add('on');
      $(`tp-${tab.dataset.t}`).classList.add('on');
    });
  });
}

// ═══════════════════════════════════════════════════════
//  GO
// ═══════════════════════════════════════════════════════
runBoot();
</script>
</body>
</html>
